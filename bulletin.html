<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Configuration du Bulletin - GestNotes</title>
    <style>
        /* Styles pour la zone de configuration (Interface utilisateur) */
        .config-section {
            background-color: #f5f5f5;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Styles pour le rendu du Bulletin (Aperçu / Impression) */
        .bulletin-header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        /* Zone du logo adapté */
        .bulletin-logo-zone {
            flex: 0 0 120px; /* Largeur fixe maximum pour le logo */
            max-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bulletin-logo-zone img {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain; /* Garde les proportions du logo intactes */
        }

        /* Zone du texte de l'en-tête */
        .bulletin-text-zone {
            flex: 1;
            text-align: center;
            padding: 0 20px;
        }
        .bulletin-text-zone h1 {
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
        }
        .bulletin-text-zone p {
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        
        /* Masquer l'aperçu du logo s'il n'y a pas d'image */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="config-section">
        <h3>Configuration de l'en-tête du bulletin</h3>
        
        <div class="form-group">
            <label for="headerText">Nom ou En-tête de l'Établissement :</label>
            <input type="text" id="headerText" placeholder="Ex: ÉCOLE PRIMAIRE EXCELLENCE - CLASSE DE 6ème" style="width: 100%; padding: 8px;" oninput="updateHeader()">
        </div>

        <div class="form-group">
            <label for="logoInput">Logo de l'école (Format recommandé : Carré ou PNG transparent) :</label>
            <input type="file" id="logoInput" accept="image/*" onchange="previewLogo(event)">
        </div>
    </div>

    <hr>
