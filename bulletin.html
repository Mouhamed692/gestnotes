<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Bulletin de Notes - GestNotes</title>
    <style>
        /* Configuration de base */
        body {
            font-family: Arial, sans-serif;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            background-color: #f1f5f9;
        }

        .bulletin-wrapper {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* BOUTON RETOUR FONCTIONNEL */
        .btn-back {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .btn-back:hover {
            color: #2563eb;
            transform: translateX(-5px);
        }

        .btn-back svg {
            width: 24px;
            height: 24px;
        }

        /* Styles Impression & Interface */
        .input-panel {
            background: #fffbeb;
            padding: 15px;
            border: 2px solid #fbbf24;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-print {
            background-color: #059669;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .bulletin-wrapper { box-shadow: none; margin: 0; max-width: 100%; }
            @page { size: A4 landscape; margin: 10mm; }
        }

        /* Structure du bulletin */
        .header-bulletin { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .flag { width: 50px; height: 35px; display: flex; border: 1px solid #000; }
        .flag div { flex: 1; }
        .green { background: #00853f; }
        .yellow { background: #fdef42; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        .red { background: #e31b23; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        .col-label { text-align: left; font-weight: bold; background: #f8fafc; }
        
        .footer-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .check-table td { text-align: left; padding: 4px; }
        .check-box { width: 25px; border: 1px solid #000; text-align: center; font-weight: bold; }
    </style>
</head>

<body>

    <div class="bulletin-wrapper no-print" style="background: transparent; box-shadow: none; padding: 0;">
        <a href="index.html" class="btn-back">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Retour à GestNotes (Données enregistrées)
        </a>
    </div>

    <div class="bulletin-wrapper no-print">
        <div class="input-panel">
            <label style="font-weight: bold;">En-tête de l'école :</label><br>
            <textarea id="header-input" rows="3" style="width:100%; margin-top:10px;">IA PIKINE / GUEDIAWAYE&#10;IEF PIKINE&#10;ÉCOLE PRIVÉE</textarea>
            <button class="btn-print" onclick="window.print()">Imprimer le Bulletin</button>
        </div>
    </div>

    <div class="bulletin-wrapper" id="bulletin-content">
        <div class="header-bulletin">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="flag">
                    <div class="green"></div>
                    <div class="yellow">★</div>
                    <div class="red"></div>
                </div>
                <div id="header-display" style="font-size: 11px; font-weight: bold;">IA PIKINE / GUEDIAWAYE<br>IEF PIKINE<br>ÉCOLE PRIVÉE</div>
            </div>
            <h1 style="text-decoration: underline; font-size: 20px;">BULLETIN DE NOTES</h1>
            <div style="text-align: right; font-size: 12px;">
                Année Scolaire: 2025-2026<br>
                <span id="txt-periode"></span>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div>
                Élève : <strong id="txt-nom"></strong><br>
                Matricule : <strong id="txt-mat"></strong>
            </div>
            <div style="text-align: right;">
                Classe : <strong id="txt-classe"></strong><br>
                Effectif : <strong id="txt-eff"></strong>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2">Disciplines</th>
                    <th colspan="2">Devoirs</th>
                    <th rowspan="2">Comp.</th>
                    <th rowspan="2">Moy/20</th>
                    <th rowspan="2">Coef</th>
                    <th rowspan="2">Points</th>
                </tr>
                <tr>
                    <th>D1</th>
                    <th>D2</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
            <tfoot>
                <tr style="background: #f1f5f9; font-weight: bold;">
                    <td colspan="4">TOTAUX</td>
                    <td id="res-moy"></td>
                    <td id="res-coef"></td>
                    <td id="res-pts"></td>
                </tr>
            </tfoot>
        </table>

        <div class="footer-section">
            <table class="check-table">
                <tr><td>Satisfaisant</td><td class="check-box" id="c1"></td></tr>
                <tr><td>Insuffisant</td><td class="check-box" id="c2"></td></tr>
            </table>
            <table class="check-table">
                <tr><td>Félicitations</td><td class="check-box" id="c3"></td></tr>
                <tr><td>Tableau d'Honneur</td><td class="check-box" id="c4"></td></tr>
            </table>
        </div>
    </div>

    <script>
        // Synchronisation de l'en-tête
        const hIn = document.getElementById('header-input');
        const hOut = document.getElementById('header-display');
        hIn.addEventListener('input', () => hOut.innerHTML = hIn.value.replace(/\n/g, '<br>'));

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const classId = params.get('class');
            const studentId = params.get('student');
            const period = params.get('period') || "1";

            // Chargement des données enregistrées
            const raw = localStorage.getItem('gestnotes_v4');
            if (!raw) return;
            const data = JSON.parse(raw);
            const classData = data.classes[classId];
            const student = classData.students.find(s => s.id === studentId);
            const scores = classData.grades[period][studentId] || {};

            // Remplissage textes
            document.getElementById('txt-nom').innerText = student.lastName + " " + student.firstName;
            document.getElementById('txt-mat').innerText = student.matricule || '-';
            document.getElementById('txt-classe').innerText = classId;
            document.getElementById('txt-eff').innerText = classData.students.length;
            document.getElementById('txt-periode').innerText = period + (period == 1 ? "er" : "ème") + " Semestre";

            let totalC = 0, totalP = 0;
            const tbody = document.getElementById('table-body');

            classData.subjects.forEach(sub => {
                const g = scores[sub.id] || {d1:'', d2:'', c:''};
                const n1 = parseFloat(g.d1) || 0;
                const n2 = parseFloat(g.d2) || n1;
                const nc = parseFloat(g.c) || 0;

                const moy = ((n1 + n2) / 2 + (nc * 2)) / 3;
                const pts = moy * sub.coef;
                totalC += sub.coef;
                totalP += pts;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-label">${sub.name}</td>
                    <td>${g.d1}</td><td>${g.d2}</td><td>${g.c}</td>
                    <td>${moy.toFixed(2)}</td><td>${sub.coef}</td>
                    <td>${pts.toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });

            const genAvg = totalP / totalC;
            document.getElementById('res-coef').innerText = totalC;
            document.getElementById('res-pts').innerText = totalP.toFixed(2);
            document.getElementById('res-moy').innerText = genAvg.toFixed(2);

            // Cocher les cases auto
            if(genAvg >= 10) document.getElementById('c1').innerText = "X";
            if(genAvg >= 14) document.getElementById('c3').innerText = "X";
        };
    </script>
</body>
</html>
