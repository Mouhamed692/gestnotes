<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes - Système Académique</title>
    <style>
        :root {
            --primary: #1e1b4b;
            --accent: #4f46e5;
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* En-tête bleu foncé identique à vos captures */
        .header-top {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container { max-width: 1300px; margin: 20px auto; padding: 0 15px; }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Style des inputs pour saisie rapide mobile */
        .input-grade {
            width: 80px;
            height: 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .input-grade:focus { border-color: var(--accent); outline: none; background: #f5f3ff; }

        /* Bouton retour (Flèche) */
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            margin-right: 20px;
        }

        /* Responsivité pour mobile */
        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            thead { display: none; }
            tr { display: block; border: 1px solid #e2e8f0; border-radius: 15px; margin-bottom: 15px; padding: 15px; }
            td { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border: none !important; border-bottom: 1px solid #f1f5f9 !important; }
            td::before { content: attr(data-label); font-weight: bold; color: #64748b; }
        }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; color: white; }
        .btn-blue { background: #4338ca; }
    </style>
</head>
<body>

<div class="header-top">
    <div style="display: flex; align-items: center;">
        <a href="index.html" class="btn-back">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div style="background: #10b981; padding: 5px 10px; border-radius: 8px; font-weight: 900; margin-right: 15px;">GN</div>
        <span style="letter-spacing: 1px; font-weight: bold;">SYSTÈME ACADÉMIQUE INTÉGRÉ</span>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-blue" onclick="sauvegarder()">SAUVEGARDER</button>
        <button class="btn btn-blue" onclick="restaurer()">RESTAURER</button>
    </div>
</div>

<div class="container">
    <div class="dashboard-layout">
        <div class="card">
            <h3 style="margin-top:0; display: flex; justify-content: space-between;">
                LISTE DES ÉLÈVES <span id="nb-eleves" style="background: #4f46e5; color:white; padding: 2px 10px; border-radius: 50%; font-size: 14px;">0</span>
            </h3>
            <div id="liste-noms" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>

        <div class="card">
            <div style="display: flex; gap: 15px; margin-bottom: 25px;">
                <select id="sel-class" class="input-grade" style="width:100%; text-align: left; padding-left: 15px;" onchange="init()"></select>
                <select id="sel-period" class="input-grade" style="width:100%; text-align: left; padding-left: 15px;" onchange="init()">
                    <option value="1">1er Semestre</option>
                    <option value="2">2ème Semestre</option>
                </select>
                <div style="background: #eef2ff; padding: 5px 20px; border-radius: 15px; text-align: center; min-width: 150px;">
                    <div style="font-size: 10px; color: var(--accent); font-weight: 800;">MOYENNE GÉNÉRALE</div>
                    <div id="moy-globale" style="font-size: 22px; font-weight: 900;">0.00/20</div>
                </div>
            </div>

            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; color: #94a3b8; font-size: 11px; letter-spacing: 1px;">
                        <th>ÉLÈVE</th>
                        <th>DEVOIR 1</th>
                        <th>DEVOIR 2</th>
                        <th>COMPOSITION</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="table-corps"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Récupération de vos données
    let DATA = JSON.parse(localStorage.getItem('gestnotes_v4')) || { classes: {} };

    function init() {
        const selClass = document.getElementById('sel-class');
        const listeNoms = document.getElementById('liste-noms');
        const tableCorps = document.getElementById('table-corps');
        const periode = document.getElementById('sel-period').value;

        // Remplissage sélecteur de classe si vide
        if(selClass.options.length === 0) {
            Object.keys(DATA.classes).forEach(c => {
                selClass.add(new Option(c.replace('_',' '), c));
            });
        }

        const classeActuelle = selClass.value;
        if(!classeActuelle || !DATA.classes[classeActuelle]) return;

        const eleves = DATA.classes[classeActuelle].students;
        document.getElementById('nb-eleves').innerText = eleves.length;

        // Affichage liste gauche
        listeNoms.innerHTML = "";
        eleves.forEach(e => {
            const d = document.createElement('div');
            d.style = "padding: 15px; border: 1px solid #f1f5f9; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 13px;";
            d.innerText = e.lastName + " " + e.firstName;
            listeNoms.appendChild(d);
        });

        // Affichage tableau saisie
        tableCorps.innerHTML = "";
        eleves.forEach(e => {
            const notes = DATA.classes[classeActuelle].grades[periode][e.id]?.maths || {d1:'', d2:'', c:''};
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-label="Élève"><strong>${e.lastName}</strong></td>
                <td data-label="Devoir 1"><input type="number" inputmode="decimal" class="input-grade" value="${notes.d1}" onchange="maj('${e.id}','d1',this.value)"></td>
                <td data-label="Devoir 2"><input type="number" inputmode="decimal" class="input-grade" value="${notes.d2}" onchange="maj('${e.id}','d2',this.value)"></td>
                <td data-label="Composition"><input type="number" inputmode="decimal" class="input-grade" value="${notes.c}" onchange="maj('${e.id}','c',this.value)"></td>
                <td data-label="Action"><button class="btn" style="background:var(--accent); font-size:12px;" onclick="location.href='bulletin.html?class=${classeActuelle}&student=${e.id}&period=${periode}'">PDF</button></td>
            `;
            tableCorps.appendChild(tr);
        });

        // Navigation automatique Entrée
        const inputs = document.querySelectorAll('.input-grade');
        inputs.forEach((inp, i) => {
            inp.onkeydown = (ev) => { if(ev.key === "Enter") inputs[i+1]?.focus(); };
        });
    }

    function maj(id, champ, val) {
        const c = document.getElementById('sel-class').value;
        const p = document.getElementById('sel-period').value;
        if(!DATA.classes[c].grades[p][id]) DATA.classes[c].grades[p][id] = { maths: {d1:'', d2:'', c:''} };
        DATA.classes[c].grades[p][id].maths[champ] = val;
        localStorage.setItem('gestnotes_v4', JSON.stringify(DATA));
    }

    window.onload = init;
</script>
</body>
</html>
