<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .toast-leave {
            animation: fadeOut 0.4s ease-out forwards;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="text-slate-800 md:h-screen flex flex-col md:overflow-hidden">

    <header class="bg-indigo-700 text-white shadow-md z-20 shrink-0">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full lg:w-auto text-center sm:text-left">
                <div class="bg-white/20 p-2.5 rounded-lg hidden sm:block">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div class="w-full sm:w-auto">
                    <h1 class="text-2xl font-bold">GestNotes</h1>
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 mt-1">
                        <input type="text" id="setting-year" title="Année scolaire"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-24 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                        <select id="setting-semester" title="Période"
                            class="bg-white/10 text-white border border-white/20 rounded px-2 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                            </select>
                        <input type="number" id="setting-effectif" title="Nombre total d'élèves (Effectif)"
                            placeholder="Effectif"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-20 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/20 w-full lg:w-auto">
                <span class="font-medium text-sm uppercase tracking-wider text-indigo-100 font-bold">Structure</span>
                <div class="flex items-center gap-2 w-full sm:w-auto justify-center">
                    <select id="class-select" title="Niveau général"
                        class="bg-white text-indigo-900 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 text-sm">
                        <optgroup label="Enseignement Primaire" class="text-slate-500 font-normal">
                            <option value="CP">CP</option>
                            <option value="CE1">CE1</option>
                            <option value="CE2">CE2</option>
                            <option value="CM1">CM1</option>
                            <option value="CM2">CM2</option>
                        </optgroup>
                        <optgroup label="Enseignement Secondaire" class="text-slate-500 font-normal">
                            <option value="6ème" selected>6ème</option>
                            <option value="5ème">5ème</option>
                            <option value="4ème">4ème</option>
                            <option value="3ème">3ème</option>
                            <option value="Seconde">Seconde</option>
                            <option value="Première">Première</option>
                            <option value="Terminale">Terminale</option>
                        </optgroup>
                    </select>

                    <select id="section-select" title="Classe / Série"
                        class="bg-white text-indigo-900 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 text-sm">
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 shrink-0">
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[360px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-500 w-5"></i> Liste des élèves
                    </h2>
                    <span id="students-count" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-student-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-student-first" placeholder="Prénom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">
                        <input type="text" id="new-student-last" placeholder="Nom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">
                        <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex justify-center items-center gap-1">
                            <i class="fa-solid fa-plus"></i> <span class="sm:hidden">Ajouter</span>
                        </button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="students-list" class="space-y-1"></ul>
                </div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[360px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2" id="subject-section-title">
                        <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières & Coefficients
                    </h2>
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="loadStandardSubjects()" title="Ajouter les matières officielles"
                            class="text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold px-2.5 py-1 rounded border border-emerald-200 transition-colors flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-bolt"></i> Standards
                        </button>
                        <span id="subjects-count" class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-subject-form" class="flex flex-col gap-2">
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" id="new-subject-name" placeholder="Nom de la matière" required
                                class="flex-[2] rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                            <div class="flex gap-2 flex-1">
                                <input type="number" id="new-subject-coef" placeholder="Coef" title="Coefficient" step="0.5" min="0.5" required
                                    class="w-full rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                                <button type="submit"
                                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center justify-center">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <div id="subjects-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px] overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-slate-50/50 shrink-0">
                <div>
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-table-list text-indigo-600"></i> Grille de Saisie des Notes
                    </h2>
                    <p class="text-xs text-slate-500 mt-0.5">Saisie directe : Devoirs (D1, D2) et Composition (Comp.).</p>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                    <button onclick="window.printAllReportCards()"
                        class="bg-slate-800 hover:bg-slate-900 text-white px-3.5 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-print"></i> Tout imprimer
                    </button>
                    <button onclick="window.exportAllCSV()"
                        class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-3.5 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-file-csv"></i> Exporter CSV
                    </button>
                    <button onclick="clearCurrentGrades()"
                        class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 px-3.5 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
                        title="Réinitialiser toutes les notes de cette classe">
                        <i class="fa-solid fa-trash-can"></i> Effacer notes
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative">
                <table class="w-full text-left text-sm border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 uppercase text-xs font-bold tracking-wider border-b border-slate-200 sticky top-0 z-10">
                            <th class="py-3 px-4 sticky left-0 bg-slate-100 z-20 min-w-[180px] border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">Élève</th>
                            <th class="py-3 px-4 min-w-[200px] border-r border-slate-200">Discipline / Évaluations</th>
                            <th class="py-3 px-3 text-center w-24">Moy. Gen</th>
                            <th class="py-3 px-3 text-center w-16">Rang</th>
                            <th class="py-3 px-3 text-center w-20">Absences</th>
                            <th class="py-3 px-3 text-center w-20">Retards</th>
                            <th class="py-3 px-4 text-center w-36 sticky right-0 bg-slate-100 z-20 shadow-[-2px_0_5px_rgba(0,0,0,0.05)]">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="grades-table-body" class="divide-y divide-slate-200 bg-white">
                        </tbody>
                </table>
                <div id="empty-state" class="hidden flex-col items-center justify-center p-12 text-slate-400 gap-3">
                    <i class="fa-solid fa-folder-open text-4xl text-slate-300"></i>
                    <p class="text-sm">Aucun élève enregistré dans cette section.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // --- CONFIGURATION PAR DÉFAUT & STRUCTURES ---
        const SECTIONS_CONFIG = {
            "CP": ["A", "B"], "CE1": ["A", "B"], "CE2": ["A", "B"], "CM1": ["A", "B"], "CM2": ["A", "B"],
            "6ème": ["M1", "M2", "A", "B"], "5ème": ["A", "B"], "4ème": ["A", "B"], "3ème": ["A", "B"],
            "Seconde": ["L", "S"], "Première": ["L1", "L2", "S1", "S2"], "Terminale": ["L1", "L2", "S1", "S2"]
        };

        const STANDARDS_SUBJECTS = {
            "primaire": [
                { name: "Langage et Communication", coef: 2 },
                { name: "Mathématiques", coef: 2 },
                { name: "Éducation Science / Techno", coef: 1 },
                { name: "Éducation Sociale", coef: 1 },
                { name: "Arts Plastiques / Éduc. Musicale", coef: 1 },
                { name: "Éducation Physique", coef: 1 }
            ],
            "college": [
                { name: "Français", coef: 5 },
                { name: "Mathématiques", coef: 4 },
                { name: "Sciences de la Vie et de la Terre", coef: 2 },
                { name: "Sciences Physiques", coef: 2 },
                { name: "Histoire-Géographie", coef: 3 },
                { name: "Anglais", coef: 3 },
                { name: "Éducation Physique & Sportive", coef: 2 }
            ],
            "lycee_s": [
                { name: "Mathématiques", coef: 6 },
                { name: "Sciences Physiques", coef: 6 },
                { name: "Sciences de la Vie et de la Terre", coef: 4 },
                { name: "Français", coef: 3 },
                { name: "Philosophie", coef: 2 },
                { name: "Histoire-Géographie", coef: 2 },
                { name: "Anglais", coef: 2 }
            ],
            "lycee_l": [
                { name: "Français", coef: 5 },
                { name: "Philosophie", coef: 5 },
                { name: "Histoire-Géographie", coef: 4 },
                { name: "Anglais", coef: 4 },
                { name: "Mathématiques", coef: 2 },
                { name: "Sciences de la Vie et de la Terre", coef: 2 }
            ]
        };

        // --- ÉTAT DE L'APPLICATION ---
        let appState = {
            settings: { year: "2025-2026", period: "1", effectif: "" },
            classes: {} // Clé: "Niveau_Section" -> { students: [], subjects: [] }
        };

        let currentClass = "6ème";
        let currentSection = "M1";
        let currentFullKey = "6ème_M1";

        // --- INITIALISATION ---
        document.addEventListener("DOMContentLoaded", () => {
            loadLocalStorage();
            initSettingsForm();
            setupEventListeners();
            updateSectionsDropdown();
            syncCurrentKeys();
            renderAll();
        });

        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border text-sm font-medium max-w-sm pointer-events-auto ${
                type === "error" ? "bg-rose-50 text-rose-800 border-rose-200" : "bg-emerald-50 text-emerald-800 border-emerald-200"
            }`;
            const icon = type === "error" ? "fa-circle-exclamation text-rose-500" : "fa-circle-check text-emerald-500";
            toast.innerHTML = `<i class="fa-solid ${icon} text-base shrink-0"></i><div class="flex-1">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace("toast-enter", "toast-leave");
                toast.addEventListener("animationend", () => toast.remove());
            }, 3500);
        }

        function saveLocalStorage() {
            localStorage.setItem("gestnotes_state_v3", JSON.stringify(appState));
        }

        function loadLocalStorage() {
            const raw = localStorage.getItem("gestnotes_state_v3");
            if (raw) {
                try { appState = JSON.parse(raw); } catch (e) { console.error("Erreur de restauration", e); }
            }
            if (!appState.settings) appState.settings = { year: "2025-2026", period: "1", effectif: "" };
            if (!appState.classes) appState.classes = {};
        }

        function initSettingsForm() {
            document.getElementById("setting-year").value = appState.settings.year || "2025-2026";
            document.getElementById("setting-effectif").value = appState.settings.effectif || "";
            updatePeriodSelectOptions();
        }

        function updatePeriodSelectOptions() {
            const select = document.getElementById("setting-semester");
            const isPrimaire = ["CP", "CE1", "CE2", "CM1", "CM2"].includes(currentClass);
            select.innerHTML = "";

            if (isPrimaire) {
                select.innerHTML = `
                    <option value="1" class="text-slate-800">1er Trimestre</option>
                    <option value="2" class="text-slate-800">2ème Trimestre</option>
                    <option value="3" class="text-slate-800">3ème Trimestre</option>
                `;
            } else {
                select.innerHTML = `
                    <option value="1" class="text-slate-800">1er Semestre</option>
                    <option value="2" class="text-slate-800">2ème Semestre</option>
                `;
            }

            if (["1", "2", "3"].includes(appState.settings.period)) {
                if (!isPrimaire && appState.settings.period === "3") appState.settings.period = "2";
                select.value = appState.settings.period;
            } else {
                select.value = "1";
                appState.settings.period = "1";
            }
        }

        function setupEventListeners() {
            document.getElementById("setting-year").addEventListener("input", (e) => {
                appState.settings.year = e.target.value;
                saveLocalStorage();
            });

            document.getElementById("setting-semester").addEventListener("change", (e) => {
                appState.settings.period = e.target.value;
                saveLocalStorage();
            });

            document.getElementById("setting-effectif").addEventListener("input", (e) => {
                appState.settings.effectif = e.target.value;
                saveLocalStorage();
                calculateRanksAndRenderGrades();
            });

            document.getElementById("class-select").addEventListener("change", (e) => {
                currentClass = e.target.value;
                updatePeriodSelectOptions();
                updateSectionsDropdown();
                syncCurrentKeys();
                renderAll();
            });

            document.getElementById("section-select").addEventListener("change", (e) => {
                currentSection = e.target.value;
                syncCurrentKeys();
                renderAll();
            });

            document.getElementById("add-student-form").addEventListener("submit", (e) => {
                e.preventDefault();
                const first = document.getElementById("new-student-first").value.trim();
                const last = document.getElementById("new-student-last").value.trim();
                if (!first || !last) return;

                const newStudent = {
                    id: "stu_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                    firstName: first,
                    lastName: last.toUpperCase(),
                    grades: {}, absences: 0, retards: 0
                };

                initClassKeyStructure();
                appState.classes[currentFullKey].students.push(newStudent);
                appState.classes[currentFullKey].students.sort((a, b) => a.lastName.localeCompare(b.lastName));
                
                saveLocalStorage();
                document.getElementById("add-student-form").reset();
                document.getElementById("new-student-first").focus();
                showToast(`Élève <b>${newStudent.lastName}</b> ajouté avec succès !`);
                renderAll();
            });

            document.getElementById("add-subject-form").addEventListener("submit", (e) => {
                e.preventDefault();
                const name = document.getElementById("new-subject-name").value.trim();
                const coef = parseFloat(document.getElementById("new-subject-coef").value);
                if (!name || isNaN(coef) || coef <= 0) return;

                initClassKeyStructure();
                const exists = appState.classes[currentFullKey].subjects.some(s => s.name.toLowerCase() === name.toLowerCase());
                if (exists) return showToast("Cette matière existe déjà.", "error");

                appState.classes[currentFullKey].subjects.push({
                    id: "sub_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                    name: name, coef: coef
                });

                saveLocalStorage();
                document.getElementById("add-subject-form").reset();
                document.getElementById("new-subject-name").focus();
                showToast(`Matière <b>${name}</b> ajoutée.`);
                renderAll();
            });
        }

        function updateSectionsDropdown() {
            const sectionSelect = document.getElementById("section-select");
            sectionSelect.innerHTML = "";
            const list = SECTIONS_CONFIG[currentClass] || ["A"];
            list.forEach(sec => {
                const opt = document.createElement("option");
                opt.value = sec; opt.textContent = sec;
                sectionSelect.appendChild(opt);
            });
            currentSection = sectionSelect.value || "A";
        }

        function syncCurrentKeys() {
            currentFullKey = `${currentClass}_${currentSection}`;
        }

        function initClassKeyStructure() {
            if (!appState.classes[currentFullKey]) {
                appState.classes[currentFullKey] = { students: [], subjects: [] };
            }
        }

        // --- ACTIONS MATIÈRES ET NOTES ---
        window.loadStandardSubjects = function() {
            initClassKeyStructure();
            let set = STANDARDS_SUBJECTS.college;
            if (["CP", "CE1", "CE2", "CM1", "CM2"].includes(currentClass)) set = STANDARDS_SUBJECTS.primaire;
            else if (["Seconde", "Première", "Terminale"].includes(currentClass)) {
                set = currentSection.startsWith("S") ? STANDARDS_SUBJECTS.lycee_s : STANDARDS_SUBJECTS.lycee_l;
            }

            appState.classes[currentFullKey].subjects = [];
            set.forEach(sub => {
                appState.classes[currentFullKey].subjects.push({
                    id: "sub_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4),
                    name: sub.name, coef: sub.coef
                });
            });

            saveLocalStorage();
            showToast("Modèle de matières appliqué.");
            renderAll();
        };

        window.deleteSubject = function(subId) {
            if (!confirm("Supprimer cette matière ainsi que toutes ses notes rattachées ?")) return;
            if (appState.classes[currentFullKey]) {
                appState.classes[currentFullKey].subjects = appState.classes[currentFullKey].subjects.filter(s => s.id !== subId);
                appState.classes[currentFullKey].students.forEach(st => { delete st.grades[subId]; });
                saveLocalStorage();
                showToast("Matière supprimée.");
                renderAll();
            }
        };

        window.deleteStudent = function(stuId) {
            if (!confirm("Voulez-vous retirer cet élève de la base ?")) return;
            if (appState.classes[currentFullKey]) {
                appState.classes[currentFullKey].students = appState.classes[currentFullKey].students.filter(s => s.id !== stuId);
                saveLocalStorage();
                showToast("Élève retiré.");
                renderAll();
            }
        };

        window.clearCurrentGrades = function() {
            if (!confirm("Effacer toutes les notes d'évaluation de la classe active ?")) return;
            if (appState.classes[currentFullKey]) {
                appState.classes[currentFullKey].students.forEach(st => { st.grades = {}; });
                saveLocalStorage();
                showToast("Toutes les notes ont été effacées.");
                renderAll();
            }
        };

        // --- CALCULS ET RENDU ---
        function calculateStudentAverage(student, subjects) {
            if (!subjects || subjects.length === 0) return null;
            let totalWeighted = 0;
            let totalCoef = 0;
            let countMatiere = 0;

            subjects.forEach(sub => {
                const g = student.grades[sub.id];
                if (g) {
                    let sum = 0, c = 0;
                    if (g.d1 !== undefined && g.d1 !== null) { sum += g.d1; c++; }
                    if (g.d2 !== undefined && g.d2 !== null) { sum += g.d2; c++; }
                    
                    let subAvg = null;
                    if (c > 0) {
                        const devAvg = sum / c;
                        if (g.comp !== undefined && g.comp !== null) {
                            subAvg = (devAvg + g.comp) / 2;
                        } else {
                            subAvg = devAvg;
                        }
                    } else if (g.comp !== undefined && g.comp !== null) {
                        subAvg = g.comp;
                    }

                    if (subAvg !== null) {
                        totalWeighted += subAvg * sub.coef;
                        totalCoef += sub.coef;
                        countMatiere++;
                    }
                }
            });

            return totalCoef > 0 ? (totalWeighted / totalCoef) : null;
        }

        function calculateRanksAndRenderGrades() {
            const data = appState.classes[currentFullKey] || { students: [], subjects: [] };
            const students = data.students || [];
            const subjects = data.subjects || [];

            // Étape 1 : Calculer toutes les moyennes individuelles
            const calculatedMap = {};
            students.forEach(st => {
                calculatedMap[st.id] = calculateStudentAverage(st, subjects);
            });

            // Étape 2 : Établir le classement
            const validAvgs = Object.values(calculatedMap).filter(v => v !== null).sort((a, b) => b - a);
            const ranksMap = {};
            students.forEach(st => {
                const avg = calculatedMap[st.id];
                if (avg === null) {
                    ranksMap[st.id] = "-";
                } else {
                    const r = validAvgs.indexOf(avg) + 1;
                    const countSame = validAvgs.filter(v => v === avg).length;
                    ranksMap[st.id] = r + (countSame > 1 ? " ex" : "");
                }
            });

            // Étape 3 : Génération HTML
            const tbody = document.getElementById("grades-table-body");
            const emptyState = document.getElementById("empty-state");
            tbody.innerHTML = "";

            if (students.length === 0) {
                emptyState.classList.remove("hidden");
                emptyState.classList.add("flex");
                return;
            }
            emptyState.classList.remove("flex");
            emptyState.classList.add("hidden");

            students.forEach(st => {
                const genAvg = calculatedMap[st.id];
                const displayAvg = genAvg !== null ? genAvg.toFixed(2).replace(".", ",") : "-";
                const rank = ranksMap[st.id];

                // Première ligne : Métadonnées générales de l'élève
                const trHeader = document.createElement("tr");
                trHeader.className = "bg-slate-50/60 font-semibold text-slate-900 border-t-2 border-slate-200";
                trHeader.innerHTML = `
                    <td class="py-2.5 px-4 sticky left-0 bg-slate-50 font-bold border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">
                        ${st.lastName} ${st.firstName}
                    </td>
                    <td class="py-2.5 px-4 text-xs text-slate-500 italic">Moyenne Générale et Assiduité</td>
                    <td class="py-2.5 px-3 text-center text-indigo-700 font-bold text-base bg-indigo-50/30">${displayAvg}</td>
                    <td class="py-2.5 px-3 text-center text-amber-800 font-bold">${rank}</td>
                    <td class="py-2.5 px-1 text-center">
                        <input type="number" value="${st.absences || 0}" min="0" onchange="updateAttendance('${st.id}', 'absences', this.value)"
                            class="w-14 text-center border border-slate-300 rounded p-1 text-xs focus:ring-1 focus:ring-indigo-500">
                    </td>
                    <td class="py-2.5 px-1 text-center">
                        <input type="number" value="${st.retards || 0}" min="0" onchange="updateAttendance('${st.id}', 'retards', this.value)"
                            class="w-14 text-center border border-slate-300 rounded p-1 text-xs focus:ring-1 focus:ring-indigo-500">
                    </td>
                    <td class="py-2.5 px-4 text-center sticky right-0 bg-slate-50 shadow-[-2px_0_5px_rgba(0,0,0,0.05)]">
                        <button onclick="window.printReportCard('${st.id}')" class="text-indigo-600 hover:text-indigo-900 text-xs font-bold inline-flex items-center gap-1 bg-white border border-slate-200 px-2 py-1 rounded shadow-sm hover:bg-slate-50">
                            <i class="fa-solid fa-file-invoice"></i> Bulletin
                        </button>
                        <button onclick="deleteStudent('${st.id}')" class="text-rose-600 hover:text-rose-900 ml-2" title="Retirer l'élève">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(trHeader);

                // Lignes de saisie par matière rattachée
                if (subjects.length === 0) {
                    const trEmpty = document.createElement("tr");
                    trEmpty.innerHTML = `<td colspan="7" class="py-2 px-4 text-xs text-center text-slate-400">Aucune discipline configurée.</td>`;
                    tbody.appendChild(trEmpty);
                } else {
                    subjects.forEach(sub => {
                        const g = st.grades[sub.id] || { d1: "", d2: "", comp: "" };
                        const trSub = document.createElement("tr");
                        trSub.className = "hover:bg-slate-50/50 text-xs transition-colors";
                        trSub.innerHTML = `
                            <td class="py-1.5 px-4 sticky left-0 bg-white border-r border-slate-100 shadow-[2px_0_5px_rgba(0,0,0,0.05)] text-slate-400 font-medium">${st.lastName}</td>
                            <td class="py-1.5 px-4 border-r border-slate-100">
                                <div class="flex justify-between items-center">
                                    <span class="font-medium text-slate-700">${sub.name}</span>
                                    <span class="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-bold">Coef ${sub.coef}</span>
                                </div>
                            </td>
                            <td colspan="4" class="py-1 px-3">
                                <div class="flex items-center gap-3 py-0.5">
                                    <div class="flex items-center gap-1">
                                        <span class="text-[10px] uppercase text-slate-400 w-4">D1:</span>
                                        <input type="text" placeholder="-" value="${g.d1 !== undefined ? String(g.d1).replace('.', ',') : ''}" 
                                            onchange="saveGradeField('${st.id}', '${sub.id}', 'd1', this)"
                                            class="w-12 border border-slate-200 rounded px-1.5 py-1 text-center font-semibold focus:border-indigo-500 focus:outline-none">
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <span class="text-[10px] uppercase text-slate-400 w-4">D2:</span>
                                        <input type="text" placeholder="-" value="${g.d2 !== undefined ? String(g.d2).replace('.', ',') : ''}" 
                                            onchange="saveGradeField('${st.id}', '${sub.id}', 'd2', this)"
                                            class="w-12 border border-slate-200 rounded px-1.5 py-1 text-center font-semibold focus:border-indigo-500 focus:outline-none">
                                    </div>
                                    <div class="flex items-center gap-1 border-l pl-3 border-slate-200">
                                        <span class="text-[10px] uppercase text-slate-500 font-bold w-9">Comp.:</span>
                                        <input type="text" placeholder="-" value="${g.comp !== undefined ? String(g.comp).replace('.', ',') : ''}" 
                                            onchange="saveGradeField('${st.id}', '${sub.id}', 'comp', this)"
                                            class="w-12 border border-slate-300 rounded px-1.5 py-1 text-center font-bold bg-emerald-50/50 text-emerald-900 focus:border-emerald-500 focus:outline-none">
                                    </div>
                                </div>
                            </td>
                            <td class="sticky right-0 bg-white shadow-[-2px_0_5px_rgba(0,0,0,0.05)] border-l border-slate-100"></td>
                        `;
                        tbody.appendChild(trSub);
                    });
                }
            });
        }

        window.saveGradeField = function(stuId, subId, field, inputElem) {
            let rawVal = inputElem.value.trim().replace(",", ".");
            
            if (rawVal === "") {
                if (appState.classes[currentFullKey]) {
                    const st = appState.classes[currentFullKey].students.find(s => s.id === stuId);
                    if (st && st.grades[subId]) {
                        delete st.grades[subId][field];
                        saveLocalStorage();
                    }
                }
                calculateRanksAndRenderGrades();
                return;
            }

            let parsed = parseFloat(rawVal);
            if (isNaN(parsed) || parsed < 0 || parsed > 20) {
                inputElem.classList.add("border-rose-500", "bg-rose-50");
                showToast("La note saisie doit obligatoirement être comprise entre 0 et 20.", "error");
                return;
            }

            inputElem.classList.remove("border-rose-500", "bg-rose-50");
            initClassKeyStructure();
            const st = appState.classes[currentFullKey].students.find(s => s.id === stuId);
            if (st) {
                if (!st.grades[subId]) st.grades[subId] = {};
                st.grades[subId][field] = parsed;
                saveLocalStorage();
            }

            // Recalcul instantané sans reconstruire le focus complet de la grille
            calculateRanksAndRenderGrades();
        };

        window.updateAttendance = function(stuId, field, value) {
            const val = parseInt(value, 10);
            if (appState.classes[currentFullKey]) {
                const st = appState.classes[currentFullKey].students.find(s => s.id === stuId);
                if (st) {
                    st[field] = isNaN(val) || val < 0 ? 0 : val;
                    saveLocalStorage();
                }
            }
        };

        function renderAll() {
            initClassKeyStructure();
            const currentData = appState.classes[currentFullKey];

            // 1. Badge compteurs
            document.getElementById("students-count").textContent = currentData.students.length;
            document.getElementById("subjects-count").textContent = currentData.subjects.length;

            // 2. Intitulé Matières
            document.getElementById("subject-section-title").innerHTML = `
                <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières (${currentClass} ${currentSection})
            `;

            // 3. Render blocs de badges matières
            const containerSub = document.getElementById("subjects-list");
            containerSub.innerHTML = "";
            if (currentData.subjects.length === 0) {
                containerSub.innerHTML = `<p class="text-xs text-slate-400 p-2 italic col-span-2">Aucune matière enregistrée.</p>`;
            } else {
                currentData.subjects.forEach(sub => {
                    const div = document.createElement("div");
                    div.className = "bg-slate-50 border border-slate-200 rounded-lg p-2 flex justify-between items-center text-xs shadow-sm";
                    div.innerHTML = `
                        <div class="truncate mr-2">
                            <span class="font-semibold text-slate-700 block truncate" title="${sub.name}">${sub.name}</span>
                            <span class="text-[10px] text-emerald-700 font-bold">Coefficient: ${sub.coef}</span>
                        </div>
                        <button onclick="deleteSubject('${sub.id}')" class="text-slate-400 hover:text-rose-600 transition-colors shrink-0 p-1">
                            <i class="fa-solid fa-circle-xmark text-sm"></i>
                        </button>
                    `;
                    containerSub.appendChild(div);
                });
            }

            // 4. Lancement grille principale
            calculateRanksAndRenderGrades();
        }

        // --- EXPORTS SÉCURISÉS ---
        window.printReportCard = function (studentId) {
            window.open(`bulletin.html?class=${encodeURIComponent(currentFullKey)}&student=${encodeURIComponent(studentId)}`, '_blank');
        };

        window.printAllReportCards = function () {
            const students = appState.classes[currentFullKey]?.students || [];
            if (students.length === 0) return showToast("Aucun élève dans la classe actuelle.", "error");
            if (students.length > 6 && !confirm(`Ouvrir simultanément ${students.length} onglets d'impression ?`)) return;
            students.forEach((s, i) => setTimeout(() => printReportCard(s.id), i * 250));
            showToast("Génération des formulaires lancée...");
        };

        window.exportCSV = function (studentId) {
            const data = appState.classes[currentFullKey];
            const student = data.students.find(s => s.id === studentId);
            if (!student) return;

            let csv = "\uFEFF"; // BOM UTF-8
            csv += "Discipline;Devoir 1;Devoir 2;Composition;Moyenne;Coefficient;Points Coef;Appréciation\n";

            data.subjects.forEach(sub => {
                const g = student.grades[sub.id] || {};
                const d1 = g.d1 !== undefined ? g.d1 : "";
                const d2 = g.d2 !== undefined ? g.d2 : "";
                const comp = g.comp !== undefined ? g.comp : "";
                
                let sum = 0, c = 0;
                if (d1 !== "") { sum += d1; c++; }
                if (d2 !== "") { sum += d2; c++; }
                
                let subAvg = "", ptsCoef = "", app = "";
                if (c > 0) {
                    const dev = sum / c;
                    const m = comp !== "" ? (dev + comp) / 2 : dev;
                    subAvg = m.toFixed(2).replace('.', ',');
                    ptsCoef = (m * sub.coef).toFixed(2).replace('.', ',');
                    app = m >= 16 ? "Excellent" : m >= 14 ? "Très Bien" : m >= 12 ? "Bien" : m >= 10 ? "Passable" : "Insuffisant";
                }

                csv += `"${sub.name}";${d1};${d2};${comp};${subAvg};${sub.coef};${ptsCoef};"${app}"\n`;
            });

            csv += `\nAnnée Scolaire;${appState.settings.year}\nPériode;${appState.settings.period}\nÉlève;${student.lastName} ${student.firstName}\nAbsences;${student.absences || 0}\nRetards;${student.retards || 0}\n`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Bulletin_${currentFullKey}_${student.lastName}_${student.firstName}.csv`;
            link.click();
        };

        window.exportAllCSV = function () {
            const students = appState.classes[currentFullKey]?.students || [];
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");
            students.forEach((s, i) => setTimeout(() => exportCSV(s.id), i * 250));
            showToast("Téléchargement des fichiers CSV démarré.");
        };
    </script>
</body>
