<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes Pro - Auto-Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .student-item { display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .btn-delete-student { display: none; color: #f87171; padding: 4px; border-radius: 6px; }
        .student-item:hover .btn-delete-student { display: block; }
        .grade-input {
            width: 50px; height: 40px; border: 2px solid #e2e8f0; background: #f8fafc;
            text-align: center; font-weight: 800; font-size: 14px; border-radius: 10px; transition: all 0.2s;
        }
        @media (min-width: 640px) {
            .grade-input { width: 60px; height: 45px; font-size: 16px; }
        }
        .grade-input:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .grade-row-item:nth-child(odd) { background-color: #ffffff; }
        .grade-row-item:nth-child(even) { background-color: #f1f5f9; }
    </style>
</head>
<body>
    
    <nav class="bg-indigo-950 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg font-black italic text-white text-xs">GN</div>
                <h1 class="text-xs font-black uppercase tracking-widest text-emerald-400">Multi-Périodes PRO</h1>
            </div>
            <div class="flex gap-2 w-full sm:w-auto justify-end">
                <button onclick="exportData()" class="flex-1 sm:flex-none bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg text-[9px] font-bold uppercase">Exporter</button>
                <button onclick="document.getElementById('importFile').click()" class="flex-1 sm:flex-none bg-indigo-600 px-3 py-2 rounded-lg text-[9px] font-bold uppercase text-center">Importer</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-3 sm:p-4 lg:p-8">
        
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 sm:gap-4 mb-6 bg-white p-4 sm:p-6 rounded-3xl shadow-sm border border-slate-200 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Classe / Niveau</label>
                <select id="class-level" onchange="changeLevel()" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-xs sm:text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-indigo-500">
                    <optgroup label="Primaire">
                        <option value="CI">CI</option><option value="CP">CP</option><option value="CE1">CE1</option>
                        <option value="CE2">CE2</option><option value="CM1">CM1</option><option value="CM2">CM2</option>
                    </optgroup>
                    <optgroup label="Moyen">
                        <option value="6ÉME" selected>6ÉME</option><option value="5ÉME">5ÉME</option>
                        <option value="4ÉME">4ÉME</option><option value="3ÉME">3ÉME</option>
                    </optgroup>
                    <optgroup label="Secondaire">
                        <option value="SECONDE">SECONDE</option><option value="PREMIERE">PREMIERE</option><option value="TERMINALE">TERMINALE</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Série / Section</label>
                <select id="class-section" onchange="changeLevel()" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-xs sm:text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="A" selected>A</option><option value="B">B</option><option value="C">C</option>
                    <option value="S1">S1</option><option value="S2">S2</option><option value="L1">L1</option>
                    <option value="L2">L2</option><option value="STEG">STEG</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Effectif</label>
                <input type="number" id="input-effectif" placeholder="0" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-xs sm:text-sm font-bold outline-none" onchange="saveEffectif()">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Période</label>
                <select id="semester" onchange="updatePeriod()" class="w-full bg-indigo-600 text-white border-none rounded-2xl p-3 text-xs sm:text-sm font-black shadow-lg"></select>
            </div>

            <div class="col-span-2 sm:col-span-3 lg:col-span-1 bg-emerald-50 rounded-2xl p-3 flex flex-col justify-center text-center border border-emerald-100 mt-2 sm:mt-0">
                <p class="text-[9px] font-black text-emerald-500 uppercase">Moyenne Classe</p>
                <p id="class-avg-display" class="text-xl sm:text-2xl font-black text-emerald-900">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-6">
                    <h2 class="font-black text-slate-800 text-[10px] uppercase mb-4 tracking-widest">Liste des Élèves</h2>
                    <div class="flex flex-col gap-2 mb-6">
                        <input type="text" id="new-student-lastname" placeholder="NOM" class="w-full bg-slate-100 border-none rounded-xl p-3 text-xs font-bold outline-none uppercase">
                        <div class="flex gap-2">
                            <input type="text" id="new-student-firstname" placeholder="PRÉNOM" class="flex-1 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold outline-none uppercase">
                            <button onclick="addStudent()" class="bg-indigo-600 text-white w-12 h-12 rounded-xl font-black shadow-lg hover:bg-indigo-700 transition flex items-center justify-center text-xl">+</button>
                        </div>
                    </div>
                    <ul id="student-list" class="space-y-2 max-h-[300px] lg:max-h-[450px] overflow-y-auto pr-1"></ul>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-6">
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-4">
                        <h2 class="font-black text-slate-800 text-[10px] uppercase tracking-widest">Configuration des Matières</h2>
                        <button onclick="autoLoadSubjects()" class="w-full sm:w-auto text-left bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:bg-indigo-100 transition">
                            ⚡ Charger Matières Standard
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 mb-4" id="subjects-config-list"></div>
                    
                    <div class="flex flex-col sm:flex-row gap-2 p-2 bg-slate-50 rounded-2xl border border-slate-100">
                        <input type="text" id="new-sub-name" list="standard-subjects" placeholder="CHOISIR OU TAPER UNE MATIÈRE" class="flex-1 bg-transparent border-none p-2 text-xs font-bold outline-none uppercase">
                        <datalist id="standard-subjects">
                            <option value="LANGUE ET COMMUNICATION"></option>
                            <option value="MATHÉMATIQUES"></option>
                            <option value="DÉCOUVERTE DU MONDE"></option>
                            <option value="DÉVELOPPEMENT DURABLE"></option>
                            <option value="ÉDUCATION ARTISTIQUE"></option>
                            <option value="ÉDUCATION PHYSIQUE"></option>
                            <option value="ARABE"></option>
                            <option value="FRANÇAIS"></option>
                            <option value="ANGLAIS"></option>
                            <option value="HISTOIRE-GÉO"></option>
                            <option value="SVT"></option>
                            <option value="PHYSIQUE-CHIMIE"></option>
                            <option value="EPS"></option>
                            <option value="ARTS"></option>
                            <option value="PHILOSOPHIE"></option>
                        </datalist>
                        
                        <div class="flex gap-2 w-full sm:w-auto">
                            <input type="number" id="new-sub-coef" placeholder="Coef" class="flex-1 sm:w-16 bg-white border-none rounded-lg p-2 text-xs font-bold text-center outline-none">
                            <button onclick="addSubject()" class="bg-emerald-500 text-white px-4 py-2 sm:py-0 rounded-xl font-black text-[10px] uppercase shadow-md whitespace-nowrap">Ajouter</button>
                        </div>
                    </div>
                </div>

                <div id="editor-panel" class="hidden">
                    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                        <div class="p-4 sm:p-5 bg-slate-900 text-white flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div>
                                <h2 id="current-student-display" class="text-base sm:text-lg font-black uppercase tracking-tight text-emerald-400">---</h2>
                                <p id="current-class-display" class="text-slate-400 text-[9px] font-black uppercase tracking-widest"></p>
                            </div>
                            <button onclick="printReport()" class="w-full sm:w-auto bg-indigo-500 hover:bg-indigo-400 px-4 py-2.5 rounded-xl font-black text-[10px] transition uppercase text-center">Bulletin PDF</button>
                        </div>
                        
                        <div class="p-3 sm:p-6 bg-slate-50 overflow-x-auto space-y-3" id="grades-grid-container">
                            <div class="flex flex-col gap-3" id="grades-grid"></div>
                            
                            <div id="student-summary-row" class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4 bg-indigo-950 text-white rounded-2xl border border-indigo-900 shadow-md min-w-[320px] mt-4">
                                <div class="font-black text-[12px] uppercase tracking-wider text-indigo-300">
                                    MOYENNE GÉNÉRALE DE L'ÉLÈVE
                                </div>
                                <div class="flex items-center gap-2 justify-end">
                                    <div class="flex flex-col items-center">
                                        <span id="student-summary-label" class="text-[8px] text-emerald-400 font-black uppercase mb-0.5">MOYENNE</span>
                                        <span id="student-avg-display" class="w-20 py-2 bg-emerald-500 text-slate-950 font-black text-center text-base rounded-xl shadow-inner block">0.00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="welcome-msg" class="bg-white rounded-3xl p-10 sm:p-16 text-center border-2 border-dashed border-slate-200">
                    <p class="text-slate-400 font-bold uppercase text-[9px] tracking-widest italic">Sélectionnez un élève pour saisir les notes. Appuyez sur ENTRÉE pour passer à l'élève suivant.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let appState = JSON.parse(localStorage.getItem('gestnotes_v4')) || { classes: {} };
        let currentClassId = "";
        let currentStudentId = null;
        let currentPeriod = "1";

        const DEFAULT_SUBJECTS = {
            primaire: [
                {name: "LANGUE ET COMMUNICATION", coef: 40},
                {name: "MATHÉMATIQUES", coef: 40}, 
                {name: "DÉCOUVERTE DU MONDE", coef: 40}, 
                {name: "DÉVELOPPEMENT DURABLE", coef: 20},
                {name: "ÉDUCATION ARTISTIQUE", coef: 10}, 
                {name: "ÉDUCATION PHYSIQUE", coef: 10},
                {name: "ARABE", coef: 10}
            ],
            moyen: [
                {name: "FRANÇAIS", coef: 5}, {name: "MATHÉMATIQUES", coef: 5}, 
                {name: "ANGLAIS", coef: 3}, {name: "HISTOIRE-GÉO", coef: 3},
                {name: "SVT", coef: 2}, {name: "PHYSIQUE-CHIMIE", coef: 2},
                {name: "EPS", coef: 1}, {name: "ARTS", coef: 1}
            ],
            secondaire: [
                {name: "PHILOSOPHIE", coef: 4}, {name: "FRANÇAIS", coef: 4},
                {name: "MATHÉMATIQUES", coef: 5}, {name: "ANGLAIS", coef: 3},
                {name: "HISTOIRE-GÉO", coef: 3}, {name: "EPS", coef: 1}
            ]
        };

        function saveToStorage() {
            localStorage.setItem('gestnotes_v4', JSON.stringify(appState));
        }

        function isPrimaire() {
            const level = document.getElementById('class-level').value;
            return ["CI", "CP", "CE1", "CE2", "CM1", "CM2"].includes(level);
        }

        function updatePeriodDropdownOptions() {
            const periodSelect = document.getElementById('semester');
            const oldVal = periodSelect.value;
            
            if (isPrimaire()) {
                periodSelect.innerHTML = `
                    <option value="1">1er Trimestre</option>
                    <option value="2">2ème Trimestre</option>
                    <option value="3">3ème Trimestre</option>
                `;
            } else {
                periodSelect.innerHTML = `
                    <option value="1">1er Semestre</option>
                    <option value="2">2ème Semestre</option>
                `;
            }
            
            if ([...periodSelect.options].some(o => o.value === oldVal)) {
                periodSelect.value = oldVal;
            } else {
                periodSelect.value = "1";
            }
            currentPeriod = periodSelect.value;
        }

        function autoLoadSubjects() {
            const level = document.getElementById('class-level').value;
            let list = [];
            
            if (isPrimaire()) list = DEFAULT_SUBJECTS.primaire;
            else if (["6ÉME", "5ÉME", "4ÉME", "3ÉME"].includes(level)) list = DEFAULT_SUBJECTS.moyen;
            else list = DEFAULT_SUBJECTS.secondaire;

            if (confirm(`Charger les ${list.length} matières standard pour le niveau ${level} ?`)) {
                appState.classes[currentClassId].subjects = list.map(s => ({ id: 'sub_' + Math.random(), ...s }));
                saveToStorage();
                renderSubjectsConfig();
                if(currentStudentId) renderGradesFields();
            }
        }

        function changeLevel() {
            currentClassId = `${document.getElementById('class-level').value}_${document.getElementById('class-section').value}`;
            
            updatePeriodDropdownOptions();
            
            if (!appState.classes[currentClassId]) {
                appState.classes[currentClassId] = { students: [], subjects: [], grades: { "1": {}, "2": {}, "3": {} }, effectif: "" };
            }
            
            const coefInput = document.getElementById('new-sub-coef');
            if (isPrimaire()) {
                coefInput.placeholder = "Max (ex: 40)";
            } else {
                coefInput.placeholder = "Coef";
            }

            document.getElementById('input-effectif').value = appState.classes[currentClassId].effectif || "";
            renderSubjectsConfig(); renderStudents(); renderStats();
            if(currentStudentId) selectStudent(currentStudentId);
        }

        function saveEffectif() { if (currentClassId) appState.classes[currentClassId].effectif = document.getElementById('input-effectif').value; saveToStorage(); }
        function updatePeriod() { currentPeriod = document.getElementById('semester').value; if(currentStudentId) selectStudent(currentStudentId); renderStats(); saveToStorage(); }

        function addSubject() {
            const nameInput = document.getElementById('new-sub-name');
            const name = nameInput.value.trim().toUpperCase();
            const defaultVal = isPrimaire() ? 40 : 1;
            const coef = parseFloat(document.getElementById('new-sub-coef').value) || defaultVal;
            
            if(!name) return;
            
            appState.classes[currentClassId].subjects.push({ id: 'sub_' + Date.now(), name, coef });
            saveToStorage(); 
            renderSubjectsConfig(); 
            
            nameInput.value = ''; 
            document.getElementById('new-sub-coef').value = '';
            
            if(currentStudentId) renderGradesFields();
        }

        function renderSubjectsConfig() {
            const list = document.getElementById('subjects-config-list');
            const subjects = appState.classes[currentClassId]?.subjects || [];
            const labelType = isPrimaire() ? "Max" : "x";
            
            list.innerHTML = subjects.map(s => `
                <div class="flex items-center bg-indigo-50 border border-indigo-100 rounded-full px-3 py-1 gap-2">
                    <span class="text-[9px] font-black text-indigo-900 uppercase">${s.name} (${labelType}${s.coef})</span>
                    <button onclick="removeSubject('${s.id}')" class="text-red-500 font-bold hover:text-red-700">×</button>
                </div>`).join('');
        }

        function removeSubject(subId) {
            if(!confirm("Supprimer ?")) return;
            appState.classes[currentClassId].subjects = appState.classes[currentClassId].subjects.filter(s => s.id !== subId);
            saveToStorage(); renderSubjectsConfig(); if(currentStudentId) renderGradesFields(); renderStats();
        }

        function calculateSingleMoyenne(d1, d2, c, maxBars = 20) {
            const vD1 = d1 !== '' ? parseFloat(d1) : null;
            const vD2 = d2 !== '' ? parseFloat(d2) : vD1;
            const vComp = c !== '' ? parseFloat(c) : null;

            if (vD1 === null && vComp === null) return '--';

            if (isPrimaire()) {
                const noteMensuelle = vD1 !== null ? (vD2 !== null ? (vD1 + vD2) / 2 : vD1) : 0;
                const noteFinale = vComp !== null ? (noteMensuelle + vComp) / 2 : noteMensuelle;
                return noteFinale.toFixed(2);
            } else {
                const moyDev = vD1 !== null ? (vD2 !== null ? (vD1 + vD2) / 2 : vD1) : 0;
                const finalMoy = vComp !== null ? (moyDev + (vComp * 2)) / 3 : moyDev;
                return finalMoy.toFixed(2);
            }
        }

        function calculateCurrentStudentAverage() {
            const classData = appState.classes[currentClassId];
            if (!classData || !currentStudentId) return "0.00";

            if (isPrimaire()) {
                let totalPointsObtenus = 0;
                let totalBaremesMax = 0;

                classData.subjects.forEach(sub => {
                    const g = classData.grades[currentPeriod][currentStudentId]?.[sub.id] || {d1:'', d2:'', c:''};
                    const mS = calculateSingleMoyenne(g.d1, g.d2, g.c, sub.coef);
                    if (mS !== '--') {
                        totalPointsObtenus += parseFloat(mS);
                        totalBaremesMax += sub.coef;
                    }
                });
                return totalBaremesMax > 0 ? ((totalPointsObtenus / totalBaremesMax) * 10).toFixed(2) : "0.00";
            } else {
                let p = 0, c = 0;
                classData.subjects.forEach(sub => {
                    const g = classData.grades[currentPeriod][currentStudentId]?.[sub.id] || {d1:'', d2:'', c:''};
                    const vD1 = g.d1 !== '' ? parseFloat(g.d1) : null;
                    const vD2 = g.d2 !== '' ? parseFloat(g.d2) : vD1;
                    const vComp = g.c !== '' ? parseFloat(g.c) : null;

                    if (vD1 !== null || vComp !== null) {
                        const mS = (((vD1||0) + (vD2||vD1||0))/2 + (vComp||0)*2)/3;
                        p += mS * sub.coef; c += sub.coef;
                    }
                });
                return c > 0 ? (p / c).toFixed(2) : "0.00";
            }
        }

        function updateVal(subId, type, val, inputElement) {
            const periodGrades = appState.classes[currentClassId].grades[currentPeriod];
            if(!periodGrades[currentStudentId]) periodGrades[currentStudentId] = {};
            if(!periodGrades[currentStudentId][subId]) periodGrades[currentStudentId][subId] = {d1:'', d2:'', c:''};
            
            periodGrades[currentStudentId][subId][type] = val;
            saveToStorage(); 
            renderStats();

            const row = inputElement.closest('.grade-row-item');
            const d1 = row.querySelector('.input-d1').value;
            const d2 = row.querySelector('.input-d2').value;
            const c = row.querySelector('.input-c').value;
            const maxBars = parseFloat(row.dataset.coef);
            
            row.querySelector('.input-moy').value = calculateSingleMoyenne(d1, d2, c, maxBars);
            
            document.getElementById('student-avg-display').textContent = calculateCurrentStudentAverage();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const students = appState.classes[currentClassId]?.students || [];
                const currentIndex = students.findIndex(s => s.id === currentStudentId);
                
                if (currentIndex !== -1 && currentIndex < students.length - 1) {
                    const nextStudent = students[currentIndex + 1];
                    let activeClassName = "";
                    if (document.activeElement.classList.contains('input-d1')) activeClassName = '.input-d1';
                    else if (document.activeElement.classList.contains('input-d2')) activeClassName = '.input-d2';
                    else if (document.activeElement.classList.contains('input-c')) activeClassName = '.input-c';
                    
                    const activeRowIndex = [...document.querySelectorAll('.grade-row-item')].indexOf(document.activeElement.closest('.grade-row-item'));

                    selectStudent(nextStudent.id);
                    
                    setTimeout(() => {
                        const rows = document.querySelectorAll('.grade-row-item');
                        if (rows[activeRowIndex] && activeClassName) {
                            const targetInput = rows[activeRowIndex].querySelector(activeClassName);
                            if (targetInput) {
                                targetInput.focus();
                                targetInput.select();
                            }
                        }
                    }, 50);
                }
            }
        }

        function renderGradesFields() {
            const container = document.getElementById('grades-grid');
            const classData = appState.classes[currentClassId];
            const periodGrades = classData.grades[currentPeriod];
            
            container.innerHTML = classData.subjects.map(sub => {
                const g = periodGrades[currentStudentId]?.[sub.id] || { d1: '', d2: '', c: '' };
                const initialMoy = calculateSingleMoyenne(g.d1, g.d2, g.c, sub.coef);
                
                const pD1 = isPrimaire() ? "Ev1" : "D1";
                const pD2 = isPrimaire() ? "Ev2" : "D2";
                const pC = isPrimaire() ? "Comp" : "CP";
                const labelMoy = isPrimaire() ? `/${sub.coef}` : "Moy";

                return `
                    <div class="grade-row-item flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-3 bg-white rounded-2xl border border-slate-100 shadow-sm min-w-[320px]" data-coef="${sub.coef}">
                        <div class="font-bold text-slate-700 text-[11px] uppercase tracking-wide truncate max-w-[180px]">
                            ${sub.name} <span class="text-indigo-400 font-normal text-[9px]">${isPrimaire() ? '(Sur ' + sub.coef + ')' : ''}</span>
                        </div>
                        <div class="flex items-center gap-2 justify-end">
                            <input type="number" step="0.25" class="input-d1 grade-input" placeholder="${pD1}" value="${g.d1}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'd1', this.value, this)" onkeydown="handleKeyDown(event)">
                            <input type="number" step="0.25" class="input-d2 grade-input" placeholder="${pD2}" value="${g.d2}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'd2', this.value, this)" onkeydown="handleKeyDown(event)">
                            <input type="number" step="0.25" class="input-c grade-input bg-indigo-50" placeholder="${pC}" value="${g.c}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'c', this.value, this)" onkeydown="handleKeyDown(event)">
                            <div class="flex flex-col items-center ml-1">
                                <span class="text-[8px] text-indigo-500 font-black uppercase mb-0.5">${labelMoy}</span>
                                <input type="text" value="${initialMoy}" disabled class="input-moy w-12 h-10 bg-indigo-900 text-emerald-400 font-black text-center text-xs rounded-xl border-none cursor-not-allowed">
                            </div>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('student-summary-label').textContent = isPrimaire() ? "NOTE /10" : "MOY /20";
            document.getElementById('student-avg-display').textContent = calculateCurrentStudentAverage();
        }

        function addStudent() {
            const lastNameInput = document.getElementById('new-student-lastname');
            const firstNameInput = document.getElementById('new-student-firstname');
            
            const lastName = lastNameInput.value.trim().toUpperCase();
            const firstName = firstNameInput.value.trim().toUpperCase();
            
            if(!lastName || !firstName) {
                alert("Veuillez remplir le Nom ET le Prénom.");
                return;
            }
            
            appState.classes[currentClassId].students.push({ 
                id: 'std_' + Date.now(), 
                lastName: lastName,
                firstName: firstName 
            });
            
            lastNameInput.value = ''; 
            firstNameInput.value = ''; 
            saveToStorage(); 
            renderStudents(); 
            renderStats();
        }

        function selectStudent(id) {
            currentStudentId = id;
            const student = appState.classes[currentClassId].students.find(s => s.id === id);
            if(!student) return;
            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('editor-panel').classList.remove('hidden');
            
            const typePeriodeLabel = isPrimaire() ? "Trimestre " : "Semestre ";
            document.getElementById('current-student-display').textContent = `${student.firstName} ${student.lastName}`;
            document.getElementById('current-class-display').textContent = currentClassId.replace('_', ' ') + " - " + typePeriodeLabel + currentPeriod;
            renderGradesFields(); renderStudents();
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            const students = appState.classes[currentClassId]?.students || [];
            list.innerHTML = students.map(s => `
                <li class="student-item p-3 rounded-xl cursor-pointer mb-2 ${currentStudentId === s.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border border-slate-100 hover:bg-indigo-50'}">
                    <span onclick="selectStudent('${s.id}')" class="font-bold text-[10px] uppercase flex-1">${s.firstName} ${s.lastName}</span>
                    <button onclick="deleteStudent('${s.id}')" class="btn-delete-student hover:bg-red-50">×</button>
                </li>`).join('');
        }

        function deleteStudent(id) {
            if(confirm("Supprimer l'élève ?")) {
                appState.classes[currentClassId].students = appState.classes[currentClassId].students.filter(s => s.id !== id);
                if(currentStudentId === id) { currentStudentId = null; document.getElementById('welcome-msg').classList.remove('hidden'); document.getElementById('editor-panel').classList.add('hidden'); }
                saveToStorage(); renderStudents(); renderStats();
            }
        }

        function renderStats() {
            const classData = appState.classes[currentClassId];
            if(!classData || !classData.students.length) {
                document.getElementById('class-avg-display').textContent = "0.00";
                return;
            }
            
            let totalMoyennesClasse = 0;

            classData.students.forEach(s => {
                if (isPrimaire()) {
                    let totalPointsObtenus = 0;
                    let totalBaremesMax = 0;

                    classData.subjects.forEach(sub => {
                        const g = classData.grades[currentPeriod]?.[s.id]?.[sub.id] || {d1:'', d2:'', c:''};
                        const mS = calculateSingleMoyenne(g.d1, g.d2, g.c, sub.coef);
                        if (mS !== '--') {
                            totalPointsObtenus += parseFloat(mS);
                            totalBaremesMax += sub.coef;
                        }
                    });
                    const moyenneEleve = totalBaremesMax > 0 ? (totalPointsObtenus / totalBaremesMax) * 10 : 0;
                    totalMoyennesClasse += moyenneEleve;
                } else {
                    let p = 0, c = 0;
                    classData.subjects.forEach(sub => {
                        const g = classData.grades[currentPeriod]?.[s.id]?.[sub.id] || {d1:0,d2:0,c:0};
                        const mS = (((parseFloat(g.d1)||0) + (parseFloat(g.d2)||parseFloat(g.d1)||0))/2 + (parseFloat(g.c)||0)*2)/3;
                        p += mS * sub.coef; c += sub.coef;
                    });
                    totalMoyennesClasse += (c > 0 ? p/c : 0);
                }
            });

            document.getElementById('class-avg-display').textContent = (totalMoyennesClasse / classData.students.length).toFixed(2);
        }

        // ==========================================
        //  FONCTIONS D'IMPORTATION / EXPORTATION LOCALES
        // ==========================================
        function exportData() {
            if (!appState || Object.keys(appState.classes).length === 0) {
                alert("Il n'y a aucune donnée à exporter pour le moment.");
                return;
            }
            
            // Formatage du nom du fichier pour la secrétaire (Ex: Sauvegarde_GestNotes_2026-05-16.json)
            const dateStr = new Date().toISOString().split('T')[0];
            const filename = `Sauvegarde_GestNotes_${dateStr}.json`;
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", filename);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    
                    // Validation rapide de la structure du fichier JSON importé
                    if (importedState && typeof importedState === 'object' && importedState.classes) {
                        if (confirm("Attention : l'importation de ce fichier va remplacer toutes vos données actuelles sur ce navigateur. Voulez-vous continuer ?")) {
                            appState = importedState;
                            saveToStorage();
                            
                            // Réinitialisation de l'affichage avec la classe actuellement sélectionnée
                            changeLevel();
                            alert("Données importées avec succès !");
                        }
                    } else {
                        alert("Erreur : Le fichier sélectionné n'est pas un fichier de sauvegarde valide GestNotes.");
                    }
                } catch (err) {
                    alert("Erreur lors de la lecture du fichier. Assurez-vous qu'il s'agit d'un fichier .json valide.");
                }
                // Réinitialise le champ input file pour pouvoir importer le même fichier deux fois si nécessaire
                document.getElementById('importFile').value = "";
            };
            reader.readAsText(file);
        }

        function printReport() {
            // Logique de redirection ou impression vers bulletin.html
            window.open('bulletin.html', '_blank');
        }

        // Initialisation au chargement de la page
        window.onload = function() {
            changeLevel();
        }
    </script>
</body>
</html>
