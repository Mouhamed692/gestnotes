<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes Pro - Système Complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print { .no-print { display: none !important; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- BARRE DE NAVIGATION -->
    <nav class="bg-indigo-800 text-white p-4 shadow-xl no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white text-indigo-800 p-2 rounded-lg font-bold text-xl shadow-inner">GN</div>
                <h1 class="text-xl font-bold tracking-tight">GestNotes <span class="font-light opacity-75">Administration</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="exportData()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                    📥 Sauvegarder
                </button>
                <button onclick="document.getElementById('importFile').click()" class="bg-indigo-900 hover:bg-black px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                    📤 Restaurer
                </button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-6">
        
        <!-- EN-TÊTE & CONFIGURATION -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 no-print">
            <div class="col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-wider">Paramètres de la session</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Année Scolaire</label>
                        <input type="text" id="school-year" onchange="saveSettings()" class="w-full border-slate-200 border rounded-xl p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Semestre</label>
                        <select id="semester" onchange="saveSettings()" class="w-full border-slate-200 border rounded-xl p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="1">1er Semestre</option>
                            <option value="2">2ème Semestre</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Classe</label>
                        <input type="text" id="class-name" onchange="saveSettings()" class="w-full border-slate-200 border rounded-xl p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
            </div>
            
            <!-- STATS RAPIDES -->
            <div id="stats-summary" class="bg-indigo-900 rounded-2xl p-6 text-white shadow-lg flex flex-col justify-center">
                <!-- Rempli par JS -->
            </div>
        </div>

        <!-- CENTRE D'IMPRESSION -->
        <div class="bg-orange-50 border border-orange-200 p-4 rounded-2xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4 no-print">
            <div class="flex items-center gap-3 text-orange-800">
                <span class="text-2xl">🖨️</span>
                <div>
                    <h4 class="font-bold">Actions d'impression</h4>
                    <p class="text-xs opacity-80">Générez les documents pour toute la classe en un clic.</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="printAllReports()" class="bg-orange-600 hover:bg-orange-700 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-md flex items-center gap-2 text-sm">
                    📚 Imprimer TOUS les Bulletins
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- COLONNE GAUCHE : ÉLÈVES -->
            <div class="lg:col-span-4 no-print">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h2 class="font-bold text-slate-800">Liste des élèves</h2>
                        <span id="badge-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-full">0</span>
                    </div>
                    <div class="p-5">
                        <div class="flex gap-2 mb-6">
                            <input type="text" id="new-student-name" placeholder="NOM Prénom" class="flex-1 border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                            <button onclick="addStudent()" class="bg-emerald-500 hover:bg-emerald-600 text-white w-11 rounded-xl font-bold transition shadow-sm">+</button>
                        </div>
                        <ul id="student-list" class="space-y-2 max-h-[500px] overflow-y-auto custom-scrollbar pr-2"></ul>
                    </div>
                </div>
            </div>

            <!-- COLONNE DROITE : SAISIE -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden min-h-[600px]">
                    <div id="welcome-msg" class="p-20 text-center">
                        <div class="text-6xl mb-4">✍️</div>
                        <h2 class="text-2xl font-bold text-slate-800">Prêt pour la saisie ?</h2>
                        <p class="text-slate-500 mt-2">Sélectionnez un élève dans la liste pour commencer à remplir ses notes.</p>
                    </div>

                    <div id="editor-panel" class="hidden">
                        <div class="p-6 bg-indigo-50 border-b border-indigo-100 flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Saisie en cours</p>
                                <h2 id="current-student-display" class="text-2xl font-black text-indigo-900">---</h2>
                            </div>
                            <button onclick="printReport()" class="bg-white text-indigo-600 hover:bg-indigo-600 hover:text-white border-2 border-indigo-600 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 no-print">
                                🖨️ Bulletin Seul
                            </button>
                        </div>
                        
                        <div class="p-6">
                            <div class="grid grid-cols-1 gap-4" id="grades-grid">
                                <!-- JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- ÉTAT INITIAL ---
        let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || {
            settings: { year: '2025-2026', semester: '1', currentClass: '6ème A' },
            classes: {
                "6ème A": { 
                    students: [], 
                    subjects: [
                        { id: 'math', name: 'Mathématiques', coef: 4, coefD1: 1, coefD2: 1, coefC: 2 },
                        { id: 'fr', name: 'Français', coef: 5, coefD1: 1, coefD2: 1, coefC: 2 },
                        { id: 'svt', name: 'S.V.T', coef: 2, coefD1: 1, coefD2: 0, coefC: 2 },
                        { id: 'hg', name: 'Hist-Géo', coef: 2, coefD1: 1, coefD2: 0, coefC: 2 }
                    ], 
                    grades: {} 
                }
            }
        };

        let currentClassId = appState.settings.currentClass || "6ème A";
        let currentStudentId = null;

        // --- SAUVEGARDE & CONFIG ---
        function saveToStorage() {
            localStorage.setItem('gestnotes_data', JSON.stringify(appState));
            renderStats();
        }

        function saveSettings() {
            appState.settings.year = document.getElementById('school-year').value;
            appState.settings.semester = document.getElementById('semester').value;
            const newClassName = document.getElementById('class-name').value;
            
            if(newClassName !== currentClassId) {
                if(!appState.classes[newClassName]) {
                    appState.classes[newClassName] = { ...appState.classes[currentClassId], students: [], grades: {} };
                }
                currentClassId = newClassName;
                appState.settings.currentClass = newClassName;
            }
            saveToStorage();
            renderStudents();
        }

        // --- ÉLÈVES ---
        function addStudent() {
            const input = document.getElementById('new-student-name');
            if(!input.value.trim()) return;
            
            const newStudent = {
                id: 'std_' + Date.now(),
                firstName: input.value.split(' ').slice(1).join(' ') || '-',
                lastName: input.value.split(' ')[0].toUpperCase(),
                birthDate: '2010-01-01',
                matricule: 'REG-' + Math.floor(1000 + Math.random() * 9000)
            };

            appState.classes[currentClassId].students.push(newStudent);
            input.value = '';
            saveToStorage();
            renderStudents();
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            const students = appState.classes[currentClassId].students;
            document.getElementById('badge-count').textContent = students.length;
            
            list.innerHTML = students.map(s => `
                <li onclick="selectStudent('${s.id}')" class="group p-4 border border-slate-100 rounded-xl cursor-pointer transition-all hover:shadow-md hover:border-indigo-300 flex justify-between items-center ${currentStudentId === s.id ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-white text-slate-700'}">
                    <span class="font-bold text-sm">${s.lastName} ${s.firstName}</span>
                    <button onclick="event.stopPropagation(); deleteStudent('${s.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500 hover:text-white rounded transition text-xs">✕</button>
                </li>
            `).join('');
        }

        function deleteStudent(id) {
            if(confirm("Supprimer cet élève et ses notes ?")) {
                appState.classes[currentClassId].students = appState.classes[currentClassId].students.filter(s => s.id !== id);
                delete appState.classes[currentClassId].grades[id];
                if(currentStudentId === id) {
                    currentStudentId = null;
                    document.getElementById('editor-panel').classList.add('hidden');
                    document.getElementById('welcome-msg').classList.remove('hidden');
                }
                saveToStorage();
                renderStudents();
            }
        }

        // --- SAISIE ---
        function selectStudent(id) {
            currentStudentId = id;
            const student = appState.classes[currentClassId].students.find(s => s.id === id);
            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('editor-panel').classList.remove('hidden');
            document.getElementById('current-student-display').textContent = `${student.lastName} ${student.firstName}`;
            renderGradesFields();
            renderStudents();
        }

        function renderGradesFields() {
            const classData = appState.classes[currentClassId];
            const container = document.getElementById('grades-grid');
            
            container.innerHTML = classData.subjects.map(sub => {
                const g = classData.grades[currentStudentId]?.[sub.id] || { d1:'', d2:'', c:'' };
                return `
                <div class="flex flex-col sm:flex-row items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800">${sub.name}</h4>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-indigo-500">Coefficient ${sub.coef}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-center">
                            <span class="text-[9px] font-bold text-slate-400 block mb-1">DEV 1</span>
                            <input type="number" step="0.5" value="${g.d1}" onchange="updateVal('${sub.id}', 'd1', this.value)" class="w-14 p-2 rounded-lg border border-slate-200 text-center font-bold focus:border-indigo-500 outline-none">
                        </div>
                        <div class="text-center">
                            <span class="text-[9px] font-bold text-slate-400 block mb-1">DEV 2</span>
                            <input type="number" step="0.5" value="${g.d2}" onchange="updateVal('${sub.id}', 'd2', this.value)" class="w-14 p-2 rounded-lg border border-slate-200 text-center font-bold focus:border-indigo-500 outline-none">
                        </div>
                        <div class="text-center ml-2">
                            <span class="text-[9px] font-bold text-indigo-500 block mb-1 uppercase">Compo</span>
                            <input type="number" step="0.5" value="${g.c}" onchange="updateVal('${sub.id}', 'c', this.value)" class="w-20 p-2 rounded-lg border-2 border-indigo-200 bg-white text-center font-black text-indigo-700 text-lg focus:border-indigo-500 outline-none">
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function updateVal(subId, type, val) {
            if(!appState.classes[currentClassId].grades[currentStudentId]) appState.classes[currentClassId].grades[currentStudentId] = {};
            if(!appState.classes[currentClassId].grades[currentStudentId][subId]) appState.classes[currentClassId].grades[currentStudentId][subId] = {};
            appState.classes[currentClassId].grades[currentStudentId][subId][type] = val;
            saveToStorage();
        }

        // --- STATS ---
        function renderStats() {
            const classData = appState.classes[currentClassId];
            const display = document.getElementById('stats-summary');
            if(!classData.students.length) {
                display.innerHTML = `<p class="text-center opacity-60 italic">Aucune donnée</p>`;
                return;
            }

            let moys = classData.students.map(s => {
                let pts = 0, coefs = 0;
                classData.subjects.forEach(sub => {
                    const g = classData.grades[s.id]?.[sub.id] || {};
                    if(g.c !== '') { pts += Number(g.c) * sub.coef; coefs += sub.coef; }
                });
                return coefs > 0 ? pts/coefs : 0;
            });

            const avgClass = (moys.reduce((a,b)=>a+b,0)/moys.length).toFixed(2);
            const success = ((moys.filter(m=>m>=10).length / moys.length)*100).toFixed(0);

            display.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold uppercase opacity-70 tracking-widest">Moyenne Classe</span>
                    <span class="text-3xl font-black">${avgClass}</span>
                </div>
                <div class="w-full bg-indigo-950 rounded-full h-2 mb-2">
                    <div class="bg-emerald-400 h-2 rounded-full" style="width: ${success}%"></div>
                </div>
                <div class="text-[10px] font-bold uppercase opacity-70">Taux de réussite : ${success}%</div>
            `;
        }

        // --- EXPORT / IMPORT ---
        function exportData() {
            const blob = new Blob([JSON.stringify(appState, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_gestnotes_${currentClassId}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                appState = JSON.parse(ev.target.result);
                saveToStorage();
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        // --- IMPRESSION ---
        function printReport() {
            if(!currentStudentId) return;
            window.open(`bulletin.html?class=${encodeURIComponent(currentClassId)}&student=${encodeURIComponent(currentStudentId)}`, '_blank');
        }

        function printAllReports() {
            const students = appState.classes[currentClassId].students;
            if(!students.length) return alert("Aucun élève !");
            if(confirm(`Générer ${students.length} bulletins ?`)) {
                students.forEach((s, i) => {
                    setTimeout(() => {
                        window.open(`bulletin.html?class=${encodeURIComponent(currentClassId)}&student=${encodeURIComponent(s.id)}`, '_blank');
                    }, i * 600);
                });
            }
        }

        // INITIALISATION
        window.onload = () => {
            document.getElementById('school-year').value = appState.settings.year;
            document.getElementById('semester').value = appState.settings.semester;
            document.getElementById('class-name').value = currentClassId;
            renderStudents();
            renderStats();
        };
    </script>
</body>
</html>
