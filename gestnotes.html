<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: { 'xs': '480px' },
                    colors: { indigo: { 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
    </script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        @media (max-width: 768px) {
            #grades-table, #grades-table thead, #grades-table tbody, #grades-table tr, #grades-table td { display: block; width: 100%; }
            #grades-table thead { display: none; }
            #grades-table tr { margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; }
            #grades-table td { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #f1f5f9; }
            #grades-table td::before { content: attr(data-label); font-weight: 600; color: #64748b; font-size: 0.85rem; }
            .sticky { position: static !important; }
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-700 text-white p-3 shadow-lg shrink-0">
        <div class="max-w-[1400px] mx-auto flex flex-col gap-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-1.5 rounded-lg shadow-inner text-indigo-600">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">GestNotes</h1>
                        <p class="text-[9px] uppercase tracking-widest text-indigo-200">Administration</p>
                    </div>
                </div>

                <div class="bg-indigo-800/50 p-1.5 rounded-xl border border-white/10">
                    <select id="class-select" onchange="changeClass(this.value)" 
                            class="bg-white text-indigo-900 font-bold rounded-lg px-3 py-1.5 outline-none text-sm">
                        <option value="CI">CI</option><option value="CP">CP</option>
                        <option value="CE1">CE1</option><option value="CE2">CE2</option>
                        <option value="CM1">CM1</option><option value="CM2">CM2</option>
                        <option value="6ème">6ème</option><option value="5ème">5ème</option>
                        <option value="4ème">4ème</option><option value="3ème">3ème</option>
                        <option value="Seconde">Seconde</option><option value="Première">Première</option>
                        <option value="Terminale">Terminale</option>
                    </select>
                </div>
            </div>

       <div class="flex flex-wrap items-center gap-2 bg-white/10 rounded-lg px-3 py-1.5 border border-white/20">
    <div class="flex items-center gap-1.5">
        <i class="fa-solid fa-calendar text-xs text-indigo-200"></i>
        <input type="text" id="setting-year" placeholder="2023-2024" 
               class="bg-indigo-800/40 text-white placeholder-indigo-200 rounded px-2 py-1 text-xs w-28 outline-none border border-white/10 focus:border-white/40">
    </div>
    
    <div class="flex items-center gap-1.5">
        <i class="fa-solid fa-clock text-xs text-indigo-200"></i>
        <select id="setting-semester" 
                class="bg-indigo-800/40 text-white rounded px-2 py-1 text-xs outline-none border border-white/10 cursor-pointer">
            <option value="1" class="bg-indigo-700 text-white">Semestre 1</option>
            <option value="2" class="bg-indigo-700 text-white">Semestre 2</option>
            <option value="3" class="bg-indigo-700 text-white">Semestre 3</option>
        </select>
    </div>

    <div class="flex items-center gap-1.5 ml-auto">
        <i class="fa-solid fa-users text-xs text-indigo-200"></i>
        <input type="number" id="setting-effectif" placeholder="Eff." 
               class="bg-indigo-800/40 text-white placeholder-indigo-200 rounded px-2 py-1 text-xs w-16 outline-none border border-white/10">
    </div>
</div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-3 sm:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[340px] overflow-hidden">
                <div class="p-3 border-b bg-slate-50/80 flex justify-between">
                    <h2 class="font-semibold text-sm flex items-center gap-2"><i class="fa-solid fa-users text-indigo-500"></i> Elèves</h2>
                    <span id="students-count" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3">
                    <form class="flex gap-2" onsubmit="event.preventDefault();">
                        <input type="text" id="new-student-first" placeholder="Prénom" class="flex-1 border rounded-lg px-3 py-2 text-sm">
                        <input type="text" id="new-student-last" placeholder="Nom" class="flex-1 border rounded-lg px-3 py-2 text-sm">
                        <button onclick="handleAddNewStudent()" class="bg-indigo-600 text-white px-3 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2"><ul id="students-list" class="space-y-1"></ul></div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[340px] overflow-hidden">
                <div class="p-3 border-b bg-slate-50/80 flex justify-between">
                    <h2 class="font-semibold text-sm flex items-center gap-2"><i class="fa-solid fa-book text-emerald-500"></i> Matières</h2>
                    <span id="subjects-count" class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3">
                    <form class="flex gap-2" onsubmit="event.preventDefault();">
                        <input type="text" id="new-subject-name" placeholder="Matière" class="flex-1 border rounded-lg px-3 py-2 text-sm">
                        <input type="number" id="new-subject-coef" placeholder="Coef" class="w-16 border rounded-lg px-3 py-2 text-sm">
                        <button onclick="handleAddSubject()" class="bg-emerald-600 text-white px-3 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2"><ul id="subjects-list" class="space-y-1"></ul></div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px] mb-6 relative overflow-hidden">
            <div class="p-4 border-b bg-slate-50/80 flex justify-between items-center">
                <h2 class="font-semibold flex items-center gap-2"><i class="fa-solid fa-table text-amber-500"></i> Notes</h2>
                <div class="flex gap-2">
                    <button onclick="printAllReportCards()" class="text-xs bg-amber-50 text-amber-700 px-3 py-1.5 rounded-lg border border-amber-200"><i class="fa-solid fa-print"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-auto">
                <table class="w-full text-sm text-left hidden" id="grades-table">
                    <thead id="grades-thead" class="bg-slate-100 sticky top-0 z-10"></thead>
                    <tbody id="grades-tbody" class="divide-y"></tbody>
                </table>
                <div id="grades-empty" class="p-12 text-center text-slate-400">Aucune donnée disponible.</div>
            </div>
        </section>
    </main>

    <script>
        // --- 1. ÉTAT GLOBAL (Une seule déclaration ici) ---
const defaultState = { settings: { year: '2023-2024', semester: '1' }, classes: {} };
const classNames = ["CI", "CP", "CE1", "CE2", "CM1", "CM2", "6ème", "5ème", "4ème", "3ème", "Seconde", "Première", "Terminale"];
classNames.forEach(c => defaultState.classes[c] = { students: [], subjects: [], grades: {}, effectif: '' });

let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || defaultState;
let currentClass = document.getElementById('class-select').value;

// --- 2. FONCTIONS DE SAUVEGARDE ET UTILITAIRES ---
function saveState() { localStorage.setItem('gestnotes_data', JSON.stringify(appState)); }
function generateId() { return Math.random().toString(36).substr(2, 9); }

// --- 3. GESTION DES ÉLÈVES ---
function handleAddNewStudent() {
    const firstName = document.getElementById('new-student-first').value.trim();
    const lastName = document.getElementById('new-student-last').value.trim();
    if (!firstName || !lastName) return;
    const newStudent = { id: generateId(), firstName, lastName, matricule: '', birth: '', abs: 0, ret: 0 };
    appState.classes[currentClass].students.push(newStudent);
    document.getElementById('new-student-first').value = '';
    document.getElementById('new-student-last').value = '';
    saveState();
    render();
}

function deleteStudent(id) {
    if (confirm("Supprimer cet élève ?")) {
        appState.classes[currentClass].students = appState.classes[currentClass].students.filter(s => s.id !== id);
        saveState();
        render();
    }
}

// --- 4. GESTION DES MATIÈRES ---
function handleAddSubject() {
    const name = document.getElementById('new-subject-name').value.trim();
    const coef = parseFloat(document.getElementById('new-subject-coef').value) || 1;
    if (!name) return;
    const newSubject = { id: generateId(), name, coef };
    appState.classes[currentClass].subjects.push(newSubject);
    document.getElementById('new-subject-name').value = '';
    document.getElementById('new-subject-coef').value = '';
    saveState();
    render();
}

function deleteSubject(id) {
    if (confirm("Supprimer cette matière ?")) {
        appState.classes[currentClass].subjects = appState.classes[currentClass].subjects.filter(s => s.id !== id);
        saveState();
        render();
    }
}

// --- 5. MOTEUR DE RENDU ---
function render() {
    renderStudents();
    renderSubjects();
    // On peut ajouter renderGradesTable() ici si tu as déjà le code du tableau
}

function renderStudents() {
    const list = document.getElementById('students-list');
    const students = appState.classes[currentClass].students;
    document.getElementById('students-count').textContent = students.length;
    list.innerHTML = '';
    students.forEach(s => {
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded border-b text-sm';
        li.innerHTML = `
            <span class="font-bold uppercase text-slate-800">${s.lastName} <span class="font-normal capitalize text-slate-500">${s.firstName}</span></span>
            <button onclick="deleteStudent('${s.id}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
        `;
        list.appendChild(li);
    });
}

function renderSubjects() {
    const list = document.getElementById('subjects-list');
    const subjects = appState.classes[currentClass].subjects;
    document.getElementById('subjects-count').textContent = subjects.length;
    list.innerHTML = '';
    subjects.forEach(sub => {
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded border-b text-sm';
        li.innerHTML = `
            <span class="text-slate-800">${sub.name} <span class="bg-emerald-100 text-emerald-900 px-2 py-0.5 rounded ml-2 font-bold text-[10px]">Coef ${sub.coef}</span></span>
            <button onclick="deleteSubject('${sub.id}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
        `;
        list.appendChild(li);
    });
}

function changeClass(newClass) {
    currentClass = newClass;
    document.getElementById('setting-effectif').value = appState.classes[currentClass].effectif || '';
    render();
}

// --- 6. INITIALISATION AU CHARGEMENT ---
window.onload = function() {
    document.getElementById('setting-year').value = appState.settings.year || '2023-2024';
    document.getElementById('setting-semester').value = appState.settings.semester || '1';
    document.getElementById('setting-effectif').value = appState.classes[currentClass].effectif || '';
    render();
};
    </script>
</body>
</html>
