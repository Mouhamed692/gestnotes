<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                screens: {
                    'xs': '480px',
                    'sm': '640px',
                    'md': '768px',
                    'lg': '1024px',
                    'xl': '1280px',
                    '2xl': '1536px',
                }
            }
        }
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur SW:', err));
    });
  }
</script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .toast-leave {
            animation: fadeOut 0.4s ease-out forwards;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }

        /* Mobile optimizations */
        @media (max-width: 639px) {
            .grades-table-mobile {
                font-size: 11px;
            }
            
            .grades-table-mobile input {
                width: 32px !important;
                padding: 4px 2px !important;
                font-size: 11px !important;
            }
            
            .grades-table-mobile td,
            .grades-table-mobile th {
                padding: 4px 2px !important;
            }
            
            /* Improve touch targets */
            button, select, input {
                min-height: 36px;
            }
            
            /* Better scrolling on mobile */
            .overflow-auto {
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Small mobile devices */
        @media (max-width: 380px) {
            .grades-table-mobile input {
                width: 28px !important;
            }
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- En-tête -->
    <header class="bg-indigo-700 text-white shadow-md z-20 shrink-0">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 py-3 sm:py-4 flex flex-col gap-3 sm:gap-4">
            <!-- Ligne 1: Logo + Titre + Selecteur de classe -->
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="bg-white/20 p-2 sm:p-2.5 rounded-lg">
                        <i class="fa-solid fa-graduation-cap text-lg sm:text-xl"></i>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-bold">GestNotes</h1>
                </div>
                <div class="no-print fixed top-4 left-4 z-50">
    <a href="gestnotes.html" class="flex items-center justify-center w-10 h-10 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition-all duration-300 group">
        <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
    </a>
</div>

<style>
    /* On cache le bouton lors de l'impression du bulletin */
    @media print {
        .no-print {
            display: none !important;
        }
    }
</style>
                
                <div class="flex items-center gap-2 sm:gap-3 bg-white/10 px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg backdrop-blur-sm border border-white/20">
                    <label for="class-select" class="font-medium text-xs sm:text-sm uppercase tracking-wider text-indigo-100 hidden xs:inline">Niveau</label>
                    <select id="class-select"
                        class="bg-white text-indigo-900 rounded px-2 sm:px-4 py-1 sm:py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 text-sm sm:text-base">
                        <option value="CI" CI</option>
                        <option value="CP">CP</option>
                        <option value="CE1">CE1</option>
                         <option value="CE2">CE2</option>
                        <option value="CM1">CM1</option>
                        <option value="CM2">CM2</option>
                        <option value="6ème"selected> >6ème</option>
                        <option value="5ème">5ème</option>
                        <option value="4ème">4ème</option>
                        <option value="3ème">3ème</option>
                        <option value="Seconde">Seconde</option>
                        <option value="Première">Première</option>
                        <option value="Terminale">Terminale</option>
                    </select>
                </div>
            </div>
            
            <!-- Ligne 2: Parametres (annee, semestre, effectif) -->
            <div class="flex flex-wrap items-center gap-2 bg-white/5 rounded-lg px-2 sm:px-3 py-2 border border-white/10">
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-calendar text-xs text-indigo-200"></i>
                    <input type="text" id="setting-year" title="Année scolaire" placeholder="2023-2024"
                        class="bg-white/10 text-white placeholder-white/50 border border-white/20 rounded px-2 py-1 text-xs w-20 sm:w-24 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                </div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-clock text-xs text-indigo-200 hidden sm:inline"></i>
                    <select id="setting-semester" title="Semestre"
                        class="bg-white/10 text-white border border-white/20 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                        <option value="1" class="text-slate-800">Semestre 1</option>
                        <option value="2" class="text-slate-800">Semestre 2</option>
                        <option value="3" class="text-slate-800">Semestre 3</option>

                </div>

                    <i class="fa-solid fa-users text-xs text-indigo-200 hidden sm:inline"></i>
                    <input type="number" id="setting-effectif" title="Nombre total d'élèves (Effectif)"

                </div>

        </div>
    </header>

    <!-- Contenu Principal -->

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 shrink-0">
            <!-- 1. Gestion des Élèves -->

                <div class="p-2 sm:p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">

                    <span id="students-count"

                        <i class="fa-solid fa-print mr-1"></i> <span class="hidden xs:inline">Imprimer</span>

                    <button onclick="exportAllCSV()"

                    <div class="flex-1">

    <!-- Modal Édition Matière -->
    <div id="subject-modal"
        class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-2 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-4 sm:p-6 border border-slate-100 max-h-[90vh] overflow-y-auto">
            <h3 class="text-base sm:text-lg font-bold mb-3 sm:mb-4 text-slate-800 border-b pb-2">

                            <input type="number" id="edit-sub-d1" class="w-full border border-emerald-200 rounded p-1.5 text-sm text-center">
                        </div>
                        <div class="flex-1 text-center">
                            <label class="text-[9px] sm:text-[10px] font-bold text-slate-500 uppercase block mb-1">D2</label>
                            <input type="number" id="edit-sub-d2" class="w-full border border-emerald-200 rounded p-1.5 text-sm text-center">
                        </div>
                        <div class="flex-1 text-center">
                            <label class="text-[9px] sm:text-[10px] font-bold text-slate-500 uppercase block mb-1">Compo</label>

            <div class="mt-4 sm:mt-6 flex justify-end gap-2">

                    class="px-3 sm:px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                <button onclick="saveSubjectModal()"
                    class="px-3 sm:px-4 py-2 text-sm font-bold bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 shadow-sm transition-colors">Enregistrer</button>
            </div>
        </div>

    <div id="toast-container" class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 left-4 sm:left-auto z-50 flex flex-col gap-2 sm:gap-3 pointer-events-none"></div>

    <script>
        // --- ÉTAT ET MIGRATION ---
        const defaultState = { settings: { year: '2023-2024', semester: '1' }, classes: {} };
const classNames = ["CI", "CP", "CE1", "CE2", "CM1", "CM2", "6ème", "5ème", "4ème", "3ème", "Seconde", "Première", "Terminale"];
        classNames.forEach(c => defaultState.classes[c] = { students: [], subjects: [], grades: {} });

        let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || defaultState;
        if (!appState.settings) appState.settings = { year: '2023-2024', semester: '1' };

        // Migration automatique des données vers le nouveau format
        Object.keys(appState.classes).forEach(cls => {
            const data = appState.classes[cls];
            if (!data.students) data.students = [];
            if (!data.subjects) data.subjects = [];
            if (!data.grades) data.grades = {};
            if (data.effectif === undefined) data.effectif = '';

            data.subjects.forEach(sub => {
                if (sub.coefD1 === undefined) sub.coefD1 = 1;
                if (sub.coefD2 === undefined) sub.coefD2 = 1;
                if (sub.coefC === undefined) sub.coefC = 2;
            });

            Object.keys(data.grades).forEach(sId => {
                Object.keys(data.grades[sId]).forEach(subId => {
                    const val = data.grades[sId][subId];
                    if (typeof val === 'number' || typeof val === 'string') {
                        // Migration de l'ancienne note unique vers la composition (ou D1 au choix)
                        data.grades[sId][subId] = { d1: '', d2: '', c: val };
                    }
                });
            });
        });

        let currentClass = document.getElementById('class-select').value;
        document.getElementById('setting-year').value = appState.settings.year;
        document.getElementById('setting-semester').value = appState.settings.semester;

        document.getElementById('setting-year').addEventListener('change', e => { appState.settings.year = e.target.value; saveState(); });
        document.getElementById('setting-semester').addEventListener('change', e => { appState.settings.semester = e.target.value; saveState(); });

        document.getElementById('setting-effectif').value = appState.classes[currentClass].effectif || '';
        document.getElementById('setting-effectif').addEventListener('input', e => {
            appState.classes[currentClass].effectif = e.target.value;
            saveState();
        });

        function saveState() { localStorage.setItem('gestnotes_data', JSON.stringify(appState)); }
        function generateId() { return Math.random().toString(36).substr(2, 9); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = { success: 'bg-slate-800 border-emerald-500', error: 'bg-slate-800 border-red-500', info: 'bg-slate-800 border-indigo-500' };

                    let avgDisplay = sc > 0 ? (sp / sc).toFixed(2) : '--';
                    let avgClass = sc > 0 ? ((sp / sc) >= 10 ? 'text-emerald-600' : 'text-red-500') : 'text-slate-300';

                    html += `
                        <td class="px-2 py-2 border-b border-slate-100 border-l text-center">

        // --- GESTION DES NOTES (SANS PERTE DE FOCUS) ---
        window.updateGrade = function (studentId, subjectId, type, value, inputEl) {
            const data = appState.classes[currentClass];
            if (!data.grades[studentId]) data.grades[studentId] = {};
            if (!data.grades[studentId][subjectId]) data.grades[studentId][subjectId] = { d1: '', d2: '', c: '' };

            value = value.toString().trim();
            let numValue = '';
            if (value !== '') {
                numValue = parseFloat(value.replace(',', '.'));
                if (isNaN(numValue)) { showToast('Format invalide', 'error'); inputEl.value = data.grades[studentId][subjectId][type]; return; }
                if (numValue < 0) numValue = 0; if (numValue > 20) numValue = 20;
                numValue = Math.round(numValue * 100) / 100;
                inputEl.value = numValue;
            } else { inputEl.value = ''; }

            data.grades[studentId][subjectId][type] = numValue;
            saveState();
            updateDOMAverages(studentId, subjectId);
        };

        function updateDOMAverages(studentId, subjectId) {
            const data = appState.classes[currentClass];
            const sub = data.subjects.find(s => s.id === subjectId);
            const g = data.grades[studentId][subjectId];

            // Update Subject Average
            let sp = 0, sc = 0;
            if (g.d1 !== '') { sp += Number(g.d1) * sub.coefD1; sc += sub.coefD1; }
            if (g.d2 !== '') { sp += Number(g.d2) * sub.coefD2; sc += sub.coefD2; }
            if (g.c !== '') { sp += Number(g.c) * sub.coefC; sc += sub.coefC; }

            const avgSpan = document.getElementById(`avg-${studentId}-${subjectId}`);
            if (sc > 0) {
                const val = sp / sc;
                avgSpan.textContent = val.toFixed(2);
                avgSpan.className = val >= 10 ? 'text-emerald-600' : 'text-red-500';
            } else { avgSpan.textContent = '--'; avgSpan.className = 'text-slate-300'; }

            // Update General Average
            let totP = 0, totC = 0;
            data.subjects.forEach(s => {
                const sg = data.grades[studentId][s.id] || {};
                let lsp = 0, lsc = 0;
                if (sg.d1 !== '') { lsp += Number(sg.d1) * s.coefD1; lsc += s.coefD1; }
                if (sg.d2 !== '') { lsp += Number(sg.d2) * s.coefD2; lsc += s.coefD2; }
                if (sg.c !== '') { lsp += Number(sg.c) * s.coefC; lsc += s.coefC; }
                if (lsc > 0) { totP += (lsp / lsc) * s.coef; totC += s.coef; }
            });

            const genAvgSpan = document.getElementById(`genavg-${studentId}`);
            if (totC > 0) {
                const val = totP / totC;
                genAvgSpan.textContent = val.toFixed(2);
                genAvgSpan.className = `px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block ${val >= 10 ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-red-700 bg-red-100 border-red-200'}`;
            } else {
                genAvgSpan.textContent = '—';
                genAvgSpan.className = 'px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block text-slate-300 border-transparent';
            }
        }

        // --- CALCULS ET EXPORT CSV ---
        function getAppreciation(note) {
            if (note === null || note === undefined) return "";
            if (note < 4) return "Très Faible";
            if (note < 8) return "Faible";
            if (note < 10) return "Insuffisant";
            if (note < 12) return "Passable";
            if (note < 14) return "A. Bien";
            if (note < 16) return "Bien";
            return "Excellent";
        }

        function getClassRanks(classId) {
            const data = appState.classes[classId];
            const averages = data.students.map(student => {
                let tP = 0, tC = 0;
                data.subjects.forEach(sub => {
                    const g = data.grades[student.id]?.[sub.id] || {};
                    let p = 0, c = 0;
                    if (g.d1 !== '' && g.d1 !== undefined) { p += Number(g.d1) * sub.coefD1; c += sub.coefD1; }
                    if (g.d2 !== '' && g.d2 !== undefined) { p += Number(g.d2) * sub.coefD2; c += sub.coefD2; }
                    if (g.c !== '' && g.c !== undefined) { p += Number(g.c) * sub.coefC; c += sub.coefC; }
                    if (c > 0) { tP += (p / c) * sub.coef; tC += sub.coef; }
                });
                return { id: student.id, avg: tC > 0 ? (tP / tC) : null };
            });

            averages.sort((a, b) => {
                if (a.avg === null) return 1; if (b.avg === null) return -1;
                return b.avg - a.avg;
            });

            const ranks = {}; let currentRank = 1;
            averages.forEach((item, index) => {
                if (index > 0 && item.avg !== averages[index - 1].avg) currentRank = index + 1;
                ranks[item.id] = { avg: item.avg, rank: item.avg !== null ? currentRank : '-' };
            });
            return ranks;
        }

        window.exportCSV = function (studentId) {
            const data = appState.classes[currentClass];
            const student = data.students.find(s => s.id === studentId);
            const ranks = getClassRanks(currentClass);
            const stats = ranks[studentId];
            const year = appState.settings.year;
            const semester = appState.settings.semester;

            let csv = '\ufeff'; // BOM pour Excel
            csv += `Classe;${currentClass}\n`;
            csv += `Année scolaire;${year};Semestre;${semester}\n`;
            csv += `Élève;${student.firstName} ${student.lastName};Matricule;${student.matricule || ''};Né(e) le;${student.birthDate || ''};\n`;
            csv += `;;Nbre élèves;${data.students.length};Rang classe;${stats.rank}\n\n`;

            csv += `Discipline;Devoir1;Devoir2;Composition;Moyenne/20;Coefficient;Moy × Coef;Appréciation\n`;

            let totalCoef = 0, totalPoints = 0;

            data.subjects.forEach(sub => {
                const g = data.grades[studentId]?.[sub.id] || {};
                let p = 0, c = 0;
                const d1 = g.d1 !== undefined && g.d1 !== '' ? Number(g.d1) : '';
                const d2 = g.d2 !== undefined && g.d2 !== '' ? Number(g.d2) : '';
                const comp = g.c !== undefined && g.c !== '' ? Number(g.c) : '';

                if (d1 !== '') { p += d1 * sub.coefD1; c += sub.coefD1; }
                if (d2 !== '') { p += d2 * sub.coefD2; c += sub.coefD2; }
                if (comp !== '') { p += comp * sub.coefC; c += sub.coefC; }

                let sAvgStr = '', mxcStr = '', app = '';
                if (c > 0) {
                    const sAvg = p / c;
                    sAvgStr = sAvg.toFixed(2).replace('.', ',');
                    const mxc = sAvg * sub.coef;
                    mxcStr = mxc.toFixed(2).replace('.', ',');
                    totalCoef += sub.coef; totalPoints += mxc;
                    app = getAppreciation(sAvg);
                }

                const fD1 = d1 !== '' ? d1.toString().replace('.', ',') : '';
                const fD2 = d2 !== '' ? d2.toString().replace('.', ',') : '';
                const fC = comp !== '' ? comp.toString().replace('.', ',') : '';

                csv += `${sub.name};${fD1};${fD2};${fC};${sAvgStr};${sub.coef};${mxcStr};${app}\n`;
            });

            csv += `TOTAL;;;;;${totalCoef};${totalPoints.toFixed(2).replace('.', ',')};\n`;
            const gAvgStr = stats.avg !== null ? stats.avg.toFixed(2).replace('.', ',') : '';
            csv += `Moyenne générale;;;${gAvgStr}/20;Rang;${stats.rank};Absences;${student.absences || 0};Retards;${student.retards || 0}\n`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Bulletin_${currentClass}_${student.lastName.replace(/\s/g, '')}_${student.firstName.replace(/\s/g, '')}.csv`;
            link.click();
        };

        };

        window.printAllReportCards = function () {
            const students = appState.classes[currentClass].students;
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");

            if (students.length > 5 && !confirm("Vous allez ouvrir " + students.length + " onglets d'impression. Continuer ?")) {
                return;
            }

            students.forEach((s, i) => {
                setTimeout(() => printReportCard(s.id), i * 300);
            });
            showToast("Ouverture des bulletins pour impression...");
        };

        els.classSelect.value = currentClass;
        render();


    </script>
</body>

</html>
