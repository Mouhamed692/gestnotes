<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations Toasts */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-leave { animation: fadeOut 0.4s ease-out forwards; }

        /* Fixation de la colonne élève sur desktop uniquement */
        @media (min-width: 768px) {
            .sticky-left-column {
                position: sticky;
                left: 0;
                z-index: 20;
                background-color: white !important;
                box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.1);
            }
            .sticky-header-first {
                position: sticky;
                left: 0;
                z-index: 40;
                background-color: #f1f5f9 !important;
            }
        }

        /* Mode Impression */
        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible !important; }
            main { padding: 0 !important; }
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-700 text-white shadow-md z-30 shrink-0 no-print">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fa-solid fa-graduation-cap text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight">GestNotes</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="text" id="setting-year" placeholder="2023-2024" class="bg-white/10 text-white border border-white/20 rounded px-2 py-0.5 text-[10px] w-20 outline-none focus:bg-white/20">
                        <select id="setting-semester" class="bg-white/10 text-white border border-white/20 rounded px-1 py-0.5 text-[10px] outline-none">
                            <option value="1" class="text-slate-800">Semestre 1</option>
                            <option value="2" class="text-slate-800">Semestre 2</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto bg-white/10 p-2 rounded-xl border border-white/20 backdrop-blur-sm">
                <label for="class-select" class="text-[10px] font-bold uppercase tracking-wider text-indigo-100 ml-1">Niveau</label>
                <select id="class-select" onchange="changeClass(this.value)" class="flex-1 md:w-40 bg-white text-indigo-900 rounded-lg px-3 py-1.5 font-bold text-sm outline-none cursor-pointer">
                    <option value="CI">CI</option>
                    <option value="CP">CP</option>
                    <option value="CE1">CE1</option>
                    <option value="CE2">CE2</option>
                    <option value="CM1">CM1</option>
                    <option value="CM2">CM2</option>
                    <option value="6ème" selected>6ème</option>
                    <option value="5ème">5ème</option>
                    <option value="4ème">4ème</option>
                    <option value="3ème">3ème</option>
                    <option value="Seconde">Seconde</option>
                    <option value="Première">Première</option>
                    <option value="Terminale">Terminale</option>
                </select>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 shrink-0 no-print">
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[300px] md:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-500 w-5"></i> Liste des élèves
                    </h2>
                    <span id="students-count" class="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-student-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-student-first" placeholder="Prénom" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <input type="text" id="new-student-last" placeholder="Nom" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">+</button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="students-list" class="space-y-1"></ul>
                </div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[300px] md:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières & Coefficients
                    </h2>
                    <span id="subjects-count" class="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-subject-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-subject-name" placeholder="Matière" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20">
                        <input type="number" id="new-subject-coef" placeholder="Coef" step="0.5" required class="sm:w-20 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20">
                        <button type="submit" class="bg-emerald-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-emerald-700 transition-colors">+</button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="subjects-list" class="space-y-1"></ul>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px] mb-6 overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/80 no-print">
                <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-table text-amber-500 w-5"></i> Saisie des Notes
                </h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="window.print()" class="flex-1 sm:flex-none text-xs bg-white hover:bg-slate-50 text-slate-700 font-bold px-4 py-2 rounded-lg border border-slate-200 transition-colors shadow-sm">
                        <i class="fa-solid fa-print mr-1"></i> Imprimer
                    </button>
                    <button onclick="exportAllCSV()" class="flex-1 sm:flex-none text-xs bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg shadow-sm transition-colors">
                        <i class="fa-solid fa-file-export mr-1"></i> Exporter
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative">
                <table class="w-full text-sm text-left whitespace-nowrap min-w-[800px] hidden" id="grades-table">
                    <thead class="text-[10px] text-slate-600 uppercase bg-slate-100 sticky top-0 z-30" id="grades-thead"></thead>
                    <tbody id="grades-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
                <div id="grades-empty" class="absolute inset-0 flex flex-col items-center justify-center p-12 text-slate-400">
                    <i class="fa-solid fa-clipboard-list text-5xl mb-4 opacity-20"></i>
                    <p class="font-medium">Aucun élève ou matière configuré.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
// --- CONFIGURATION INITIALE & ÉTAT ---
const defaultState = { settings: { year: '2023-2024', semester: '1' }, classes: {} };
const classNames = ["CI", "CP", "CE1", "CE2", "CM1", "CM2", "6ème", "5ème", "4ème", "3ème", "Seconde", "Première", "Terminale"];
classNames.forEach(c => defaultState.classes[c] = { students: [], subjects: [], grades: {}, effectif: '' });

let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || defaultState;

// --- MIGRATION & SÉCURISATION DES DONNÉES ---
if (!appState.settings) appState.settings = { year: '2023-2024', semester: '1' };
Object.keys(appState.classes).forEach(cls => {
    const data = appState.classes[cls];
    if (!data.students) data.students = [];
    if (!data.subjects) data.subjects = [];
    if (!data.grades) data.grades = {};
    if (data.effectif === undefined) data.effectif = '';

    data.subjects.forEach(sub => {
        if (sub.coefD1 === undefined) sub.coefD1 = 1;
        if (sub.coefD2 === undefined) sub.coefD2 = 1;
        if (sub.coefC === undefined) sub.coefC = 2;
    });

    Object.keys(data.grades).forEach(sId => {
        Object.keys(data.grades[sId]).forEach(subId => {
            const val = data.grades[sId][subId];
            if (typeof val === 'number' || typeof val === 'string') {
                data.grades[sId][subId] = { d1: '', d2: '', c: val };
            }
        });
    });
});

// --- VARIABLES GLOBALES & ÉLÉMENTS DOM ---
let currentClass = document.getElementById('class-select').value;
const els = {
    classSelect: document.getElementById('class-select'),
    studentsList: document.getElementById('students-list'),
    subjectsList: document.getElementById('subjects-list'),
    gradesTable: document.getElementById('grades-table'),
    gradesThead: document.getElementById('grades-thead'),
    gradesTbody: document.getElementById('grades-tbody'),
    gradesEmpty: document.getElementById('grades-empty'),
    yearInput: document.getElementById('setting-year'),
    semesterSelect: document.getElementById('setting-semester'),
    effectifInput: document.getElementById('setting-effectif')
};

// --- INITIALISATION DES RÉGLAGES ---
els.yearInput.value = appState.settings.year;
els.semesterSelect.value = appState.settings.semester;
// On vérifie d'abord que l'élément HTML existe ET que la classe existe dans les données
if (els.effectifInput && appState.classes[currentClass]) {
    els.effectifInput.value = appState.classes[currentClass].effectif || '';
} else {
    console.warn(`Impossible d'assigner l'effectif : l'élément input ou la classe "${currentClass}" est introuvable.`);
}

// --- ÉCOUTEURS D'ÉVÉNEMENTS GÉNÉRAUX ---
els.yearInput.addEventListener('change', e => { appState.settings.year = e.target.value; saveState(); });
els.semesterSelect.addEventListener('change', e => { appState.settings.semester = e.target.value; saveState(); });
els.effectifInput.addEventListener('input', e => { appState.classes[currentClass].effectif = e.target.value; saveState(); });
els.classSelect.addEventListener('change', (e) => {
    currentClass = e.target.value;
    els.effectifInput.value = appState.classes[currentClass].effectif || '';
    render();
});

// --- FONCTIONS UTILITAIRES ---
function saveState() { localStorage.setItem('gestnotes_data', JSON.stringify(appState)); }
function generateId() { return Math.random().toString(36).substr(2, 9); }

function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const styles = { success: 'bg-slate-800 border-emerald-500', error: 'bg-slate-800 border-red-500', info: 'bg-slate-800 border-indigo-50' };
    const icons = { success: 'fa-check text-emerald-400', error: 'fa-exclamation text-red-400', info: 'fa-info text-indigo-400' };
    toast.className = `flex items-center gap-3 px-4 py-3 rounded shadow-xl text-white border-l-4 ${styles[type]} toast-enter pointer-events-auto text-sm`;
    toast.innerHTML = `<i class="fa-solid ${icons[type]}"></i> <span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => { 
        toast.classList.replace('toast-enter', 'toast-leave'); 
        setTimeout(() => toast.remove(), 400); 
    }, 3000);
}

// --- MOTEUR DE RENDU ---
function render() {
    renderStudents();
    renderSubjects();
    renderGradesTable();
}

function renderStudents() {
    const students = appState.classes[currentClass].students;
    students.sort((a, b) => a.lastName.localeCompare(b.lastName));
    els.studentsList.innerHTML = '';
    document.getElementById('students-count').textContent = students.length;

    if (students.length === 0) {
        els.studentsList.innerHTML = `<li class="text-sm text-slate-400 p-3 text-center italic">Aucun élève</li>`;
        return;
    }

    students.forEach(student => {
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded group border border-transparent transition-colors';
        li.innerHTML = `
            <div>
                <div class="font-bold text-slate-800 uppercase text-[13px] tracking-wide">${student.lastName} <span class="capitalize text-slate-500 font-medium ml-1">${student.firstName}</span></div>
                ${student.matricule ? `<div class="text-[10px] text-slate-400">Mat: ${student.matricule}</div>` : ''}
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="openStudentModal('${student.id}')" class="text-slate-400 hover:text-indigo-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                <button onclick="deleteStudent('${student.id}')" class="text-slate-400 hover:text-red-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
            </div>`;
        els.studentsList.appendChild(li);
    });
}

function renderSubjects() {
    const subjects = appState.classes[currentClass].subjects;
    els.subjectsList.innerHTML = '';
    document.getElementById('subjects-count').textContent = subjects.length;

    if (subjects.length === 0) {
        els.subjectsList.innerHTML = `<li class="text-sm text-slate-400 p-3 text-center italic">Aucune matière</li>`;
        return;
    }

    subjects.forEach(subject => {
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded group border border-transparent transition-colors';
        li.innerHTML = `
            <div class="flex items-center gap-2">
                <span class="font-semibold text-slate-700 text-[13px]">${subject.name}</span>
                <span class="bg-emerald-50 text-emerald-700 text-[10px] px-1.5 py-0.5 rounded border border-emerald-100 font-bold">Coef ${subject.coef}</span>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="openSubjectModal('${subject.id}')" class="text-slate-400 hover:text-emerald-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-sliders text-xs"></i></button>
                <button onclick="deleteSubject('${subject.id}')" class="text-slate-400 hover:text-red-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
            </div>`;
        els.subjectsList.appendChild(li);
    });
}

function renderGradesTable() {
    const data = appState.classes[currentClass];
    const { students, subjects, grades } = data;

    if (students.length === 0 || subjects.length === 0) {
        els.gradesTable.classList.add('hidden');
        els.gradesEmpty.classList.remove('hidden');
        return;
    }
    els.gradesTable.classList.remove('hidden');
    els.gradesEmpty.classList.add('hidden');

    // Construction En-tête
    let trHead = `<tr><th class="px-4 py-3 font-bold w-48 bg-slate-100 border-b border-slate-200 sticky left-0 z-30 text-slate-700 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">Élève</th>`;
    subjects.forEach(sub => {
        trHead += `
        <th class="px-2 py-2 text-center bg-white border-b border-slate-200 border-l min-w-[160px]">
            <div class="font-bold text-slate-700 text-xs">${sub.name} <span class="text-emerald-600 font-normal">(x${sub.coef})</span></div>
            <div class="flex justify-center gap-2 mt-1 text-[9px] text-slate-400 font-normal">
                <span>D1(x${sub.coefD1})</span><span>D2(x${sub.coefD2})</span><span class="font-bold text-indigo-400">C(x${sub.coefC})</span>
            </div>
        </th>`;
    });
    trHead += `<th class="px-3 py-3 font-bold text-center bg-indigo-50 text-indigo-900 border-b border-slate-200 border-l sticky right-0 z-30">Moyenne</th></tr>`;
    els.gradesThead.innerHTML = trHead;

    // Construction Corps du tableau
    els.gradesTbody.innerHTML = '';
    const ranks = getClassRanks(currentClass);

    students.forEach(student => {
        const sGrades = grades[student.id] || {};
        let tr = document.createElement('tr');
        tr.className = 'hover:bg-indigo-50/30 transition-colors group';

        let html = `
            <td class="px-4 py-2 border-b border-slate-100 bg-white group-hover:bg-indigo-50/30 sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
                <div class="font-bold text-slate-800 uppercase text-xs truncate max-w-[160px]">${student.lastName}</div>
                <div class="capitalize text-slate-500 text-[11px] font-medium truncate max-w-[160px]">${student.firstName}</div>
            </td>`;

        subjects.forEach(sub => {
            const g = sGrades[sub.id] || { d1: '', d2: '', c: '' };
            let sp = 0, sc = 0;
            if (g.d1 !== '') { sp += Number(g.d1) * sub.coefD1; sc += sub.coefD1; }
            if (g.d2 !== '') { sp += Number(g.d2) * sub.coefD2; sc += sub.coefD2; }
            if (g.c !== '') { sp += Number(g.c) * sub.coefC; sc += sub.coefC; }
            
            const avgVal = sc > 0 ? (sp / sc).toFixed(2) : '--';
            const avgColor = sc > 0 ? (parseFloat(avgVal) >= 10 ? 'text-emerald-600' : 'text-red-500') : 'text-slate-300';

            html += `
                <td class="px-2 py-2 border-b border-slate-100 border-l text-center">
                    <div class="flex flex-col items-center gap-1">
                        <div class="flex gap-1 justify-center">
                            <input type="text" value="${g.d1}" onblur="updateGrade('${student.id}', '${sub.id}', 'd1', this.value, this)" class="w-10 px-1 py-1 border border-slate-200 rounded text-center text-xs focus:ring-1 focus:ring-indigo-400 bg-slate-50" placeholder="D1">
                            <input type="text" value="${g.d2}" onblur="updateGrade('${student.id}', '${sub.id}', 'd2', this.value, this)" class="w-10 px-1 py-1 border border-slate-200 rounded text-center text-xs focus:ring-1 focus:ring-indigo-400 bg-slate-50" placeholder="D2">
                            <input type="text" value="${g.c}" onblur="updateGrade('${student.id}', '${sub.id}', 'c', this.value, this)" class="w-10 px-1 py-1 border border-indigo-200 rounded text-center text-xs font-bold focus:ring-1 focus:ring-indigo-500 bg-indigo-50/30" placeholder="C">
                        </div>
                        <div class="text-[10px] font-bold text-slate-400">Moy: <span id="avg-${student.id}-${sub.id}" class="${avgColor}">${avgVal}</span></div>
                    </div>
                </td>`;
        });

        const stats = ranks[student.id];
        const genAvgStr = stats.avg !== null ? stats.avg.toFixed(2) : '—';
        const genClass = stats.avg !== null ? (stats.avg >= 10 ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-red-700 bg-red-100 border-red-200') : 'text-slate-300 border-transparent';

        html += `
            <td class="px-3 py-2 border-b border-slate-100 border-l text-center bg-white group-hover:bg-indigo-50/30 sticky right-0">
                <div id="genavg-${student.id}" class="px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block ${genClass}">${genAvgStr}</div>
                <div class="text-[9px] mt-1 text-slate-400 font-bold">Rang: ${stats.rank}</div>
            </td>`;

        tr.innerHTML = html;
        els.gradesTbody.appendChild(tr);
    });
}

// --- LOGIQUE DE CALCUL DES MOYENNES ---
window.updateGrade = function (studentId, subjectId, type, value, inputEl) {
    const data = appState.classes[currentClass];
    if (!data.grades[studentId]) data.grades[studentId] = {};
    if (!data.grades[studentId][subjectId]) data.grades[studentId][subjectId] = { d1: '', d2: '', c: '' };

    let cleanValue = value.toString().replace(',', '.').trim();
    let numValue = '';

    if (cleanValue !== '') {
        numValue = parseFloat(cleanValue);
        if (isNaN(numValue) || numValue < 0 || numValue > 20) {
            showToast('Note invalide (0-20)', 'error');
            inputEl.value = data.grades[studentId][subjectId][type];
            return;
        }
        numValue = Math.round(numValue * 100) / 100;
        inputEl.value = numValue;
    } else {
        inputEl.value = '';
    }

    data.grades[studentId][subjectId][type] = numValue;
    saveState();
    updateDOMAverages(studentId, subjectId);
};

function updateDOMAverages(studentId, subjectId) {
    const data = appState.classes[currentClass];
    const sub = data.subjects.find(s => s.id === subjectId);
    const g = data.grades[studentId][subjectId];

    // Mise à jour moyenne matière
    let sp = 0, sc = 0;
    if (g.d1 !== '') { sp += Number(g.d1) * sub.coefD1; sc += sub.coefD1; }
    if (g.d2 !== '') { sp += Number(g.d2) * sub.coefD2; sc += sub.coefD2; }
    if (g.c !== '') { sp += Number(g.c) * sub.coefC; sc += sub.coefC; }

    const avgSpan = document.getElementById(`avg-${studentId}-${subjectId}`);
    if (sc > 0) {
        const val = sp / sc;
        avgSpan.textContent = val.toFixed(2);
        avgSpan.className = val >= 10 ? 'text-emerald-600' : 'text-red-500';
    } else {
        avgSpan.textContent = '--';
        avgSpan.className = 'text-slate-300';
    }

    // Mise à jour moyenne générale (calcul complet)
    const ranks = getClassRanks(currentClass);
    const stats = ranks[studentId];
    const genAvgSpan = document.getElementById(`genavg-${studentId}`);
    
    if (stats.avg !== null) {
        genAvgSpan.textContent = stats.avg.toFixed(2);
        genAvgSpan.className = `px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block ${stats.avg >= 10 ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-red-700 bg-red-100 border-red-200'}`;
    } else {
        genAvgSpan.textContent = '—';
        genAvgSpan.className = 'px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block text-slate-300 border-transparent';
    }
}

function getClassRanks(classId) {
    const data = appState.classes[classId];
    const averages = data.students.map(student => {
        let tP = 0, tC = 0;
        data.subjects.forEach(sub => {
            const g = data.grades[student.id]?.[sub.id] || {};
            let p = 0, c = 0;
            if (g.d1 !== '') { p += Number(g.d1) * sub.coefD1; c += sub.coefD1; }
            if (g.d2 !== '') { p += Number(g.d2) * sub.coefD2; c += sub.coefD2; }
            if (g.c !== '') { p += Number(g.c) * sub.coefC; c += sub.coefC; }
            if (c > 0) { tP += (p / c) * sub.coef; tC += sub.coef; }
        });
        return { id: student.id, avg: tC > 0 ? (tP / tC) : null };
    });

    averages.sort((a, b) => (b.avg || -1) - (a.avg || -1));
    const ranks = {};
    let curR = 1;
    averages.forEach((it, i) => {
        if (i > 0 && it.avg !== averages[i - 1].avg) curR = i + 1;
        ranks[it.id] = { avg: it.avg, rank: it.avg !== null ? curR + (curR === 1 ? 'er' : 'ème') : '-' };
    });
    return ranks;
}
