<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes Pro - Auto-Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .student-item { display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .btn-delete-student { display: none; color: #f87171; padding: 4px; border-radius: 6px; }
        .student-item:hover .btn-delete-student { display: block; }
        .grade-input {
            width: 60px; height: 45px; border: 2px solid #e2e8f0; background: #f8fafc;
            text-align: center; font-weight: 800; font-size: 16px; border-radius: 10px; transition: all 0.2s;
        }
        .grade-input:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #grades-grid > div:nth-child(odd) { background-color: #ffffff; }
        #grades-grid > div:nth-child(even) { background-color: #f1f5f9; }
    </style>
</head>
<body>
    
    <nav class="bg-indigo-950 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg font-black italic text-white text-xs">GN</div>
                <h1 class="text-xs font-black uppercase tracking-widest text-emerald-400">Multi-Périodes PRO</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg text-[9px] font-bold uppercase">Exporter</button>
                <button onclick="document.getElementById('importFile').click()" class="bg-indigo-600 px-3 py-2 rounded-lg text-[9px] font-bold uppercase">Importer</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Classe / Niveau</label>
                <select id="class-level" onchange="changeLevel()" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-indigo-500">
                    <optgroup label="Primaire">
                        <option value="CI">CI</option><option value="CP">CP</option><option value="CE1">CE1</option>
                        <option value="CE2">CE2</option><option value="CM1">CM1</option><option value="CM2">CM2</option>
                    </optgroup>
                    <optgroup label="Moyen">
                        <option value="6ÉME" selected>6ÉME</option><option value="5ÉME">5ÉME</option>
                        <option value="4ÉME">4ÉME</option><option value="3ÉME">3ÉME</option>
                    </optgroup>
                    <optgroup label="Secondaire">
                        <option value="SECONDE">SECONDE</option><option value="PREMIERE">PREMIERE</option><option value="TERMINALE">TERMINALE</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Série / Section</label>
                <select id="class-section" onchange="changeLevel()" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="A" selected>A</option><option value="B">B</option><option value="C">C</option>
                    <option value="S1">S1</option><option value="S2">S2</option><option value="L1">L1</option>
                    <option value="L2">L2</option><option value="STEG">STEG</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Effectif</label>
                <input type="number" id="input-effectif" placeholder="0" class="w-full bg-slate-50 border-none rounded-2xl p-3 text-sm font-bold outline-none" onchange="saveEffectif()">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Période</label>
                <select id="semester" onchange="updatePeriod()" class="w-full bg-indigo-600 text-white border-none rounded-2xl p-3 text-sm font-black shadow-lg">
                    <option value="1">1er Semestre</option><option value="2">2ème Semestre</option><option value="3">3ème Semestre</option>
                </select>
            </div>

            <div class="bg-emerald-50 rounded-2xl p-3 flex flex-col justify-center text-center border border-emerald-100">
                <p class="text-[9px] font-black text-emerald-500 uppercase">Moyenne Classe</p>
                <p id="class-avg-display" class="text-2xl font-black text-emerald-900">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                    <h2 class="font-black text-slate-800 text-[10px] uppercase mb-4 tracking-widest">Liste des Élèves</h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="new-student-name" placeholder="NOM PRÉNOM" class="flex-1 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold outline-none uppercase">
                        <button onclick="addStudent()" class="bg-indigo-600 text-white w-12 h-12 rounded-xl font-black shadow-lg hover:bg-indigo-700 transition">+</button>
                    </div>
                    <ul id="student-list" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></ul>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-slate-800 text-[10px] uppercase tracking-widest">Configuration des Matières</h2>
                        <button onclick="autoLoadSubjects()" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:bg-indigo-100 transition">
                            ⚡ Charger Matières Standard
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 mb-4" id="subjects-config-list"></div>
                    
                    <div class="flex gap-2 p-2 bg-slate-50 rounded-2xl border border-slate-100">
                        <select id="new-sub-name" class="flex-1 bg-transparent border-none p-2 text-xs font-bold outline-none uppercase">
                            <option value="">-- CHOISIR --</option>
                            <option value="MATHÉMATIQUES">MATHÉMATIQUES</option>
                            <option value="FRANÇAIS">FRANÇAIS</option>
                            <option value="HISTOIRE-GÉO">HISTOIRE-GÉO</option>
                            <option value="SVT">SVT</option>
                            <option value="PHYSIQUE-CHIMIE">PHYSIQUE-CHIMIE</option>
                            <option value="ANGLAIS">ANGLAIS</option>
                            <option value="PHILOSOPHIE">PHILOSOPHIE</option>
                            <option value="EPS">EPS</option>
                            <option value="ÉDUCATION CIVIQUE">ÉDUCATION CIVIQUE</option>
                            <option value="ARABE">ARABE</option>
                        </select>
                        <input type="number" id="new-sub-coef" placeholder="Coef" class="w-16 bg-white border-none rounded-lg p-2 text-xs font-bold text-center outline-none">
                        <button onclick="addSubject()" class="bg-emerald-500 text-white px-4 rounded-xl font-black text-[10px] uppercase shadow-md">Ajouter</button>
                    </div>
                </div>

                <div id="editor-panel" class="hidden">
                    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                        <div class="p-5 bg-slate-900 text-white flex justify-between items-center">
                            <div>
                                <h2 id="current-student-display" class="text-lg font-black uppercase tracking-tight text-emerald-400">---</h2>
                                <p id="current-class-display" class="text-slate-400 text-[9px] font-black uppercase tracking-widest"></p>
                            </div>
                            <button onclick="printReport()" class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-xl font-black text-[10px] transition uppercase">Bulletin PDF</button>
                        </div>
                        <div class="p-6 grid grid-cols-1 gap-3 bg-slate-50" id="grades-grid"></div>
                    </div>
                </div>

                <div id="welcome-msg" class="bg-white rounded-3xl p-16 text-center border-2 border-dashed border-slate-200">
                    <p class="text-slate-400 font-bold uppercase text-[9px] tracking-widest italic">Sélectionnez un élève pour saisir les notes</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let appState = JSON.parse(localStorage.getItem('gestnotes_v4')) || { classes: {} };
        let currentClassId = "";
        let currentStudentId = null;
        let currentPeriod = "1";

        // CONFIGURATIONS PAR DÉFAUT
        const DEFAULT_SUBJECTS = {
            primaire: [
                {name: "FRANÇAIS", coef: 2}, {name: "MATHÉMATIQUES", coef: 2}, 
                {name: "HISTOIRE-GÉO", coef: 1}, {name: "ÉD. CIVIQUE", coef: 1},
                {name: "SCIENCES", coef: 1}, {name: "ARABE", coef: 1}, {name: "EPS", coef: 1}
            ],
            moyen: [
                {name: "FRANÇAIS", coef: 5}, {name: "MATHÉMATIQUES", coef: 5}, 
                {name: "ANGLAIS", coef: 3}, {name: "HISTOIRE-GÉO", coef: 3},
                {name: "SVT", coef: 2}, {name: "PHYSIQUE-CHIMIE", coef: 2},
                {name: "EPS", coef: 1}, {name: "ARTS", coef: 1}
            ],
            secondaire: [
                {name: "PHILOSOPHIE", coef: 4}, {name: "FRANÇAIS", coef: 4},
                {name: "MATHÉMATIQUES", coef: 5}, {name: "ANGLAIS", coef: 3},
                {name: "HISTOIRE-GÉO", coef: 3}, {name: "EPS", coef: 1}
            ]
        };

        function autoLoadSubjects() {
            const level = document.getElementById('class-level').value;
            let list = [];
            
            if (["CI", "CP", "CE1", "CE2", "CM1", "CM2"].includes(level)) list = DEFAULT_SUBJECTS.primaire;
            else if (["6ÉME", "5ÉME", "4ÉME", "3ÉME"].includes(level)) list = DEFAULT_SUBJECTS.moyen;
            else list = DEFAULT_SUBJECTS.secondaire;

            if (confirm(`Charger les ${list.length} matières standard pour le niveau ${level} ?`)) {
                appState.classes[currentClassId].subjects = list.map(s => ({ id: 'sub_' + Math.random(), ...s }));
                saveToStorage();
                renderSubjectsConfig();
                if(currentStudentId) renderGradesFields();
            }
        }

        function changeLevel() {
            currentClassId = `${document.getElementById('class-level').value}_${document.getElementById('class-section').value}`;
            currentPeriod = document.getElementById('semester').value;
            if (!appState.classes[currentClassId]) {
                appState.classes[currentClassId] = { students: [], subjects: [], grades: { "1": {}, "2": {}, "3": {} }, effectif: "" };
            }
            document.getElementById('input-effectif').value = appState.classes[currentClassId].effectif || "";
            renderSubjectsConfig(); renderStudents(); renderStats();
            if(currentStudentId) selectStudent(currentStudentId);
        }

        function saveEffectif() { if (currentClassId) appState.classes[currentClassId].effectif = document.getElementById('input-effectif').value; saveToStorage(); }
        function updatePeriod() { currentPeriod = document.getElementById('semester').value; if(currentStudentId) selectStudent(currentStudentId); renderStats(); saveToStorage(); }

        function addSubject() {
            const name = document.getElementById('new-sub-name').value;
            const coef = parseFloat(document.getElementById('new-sub-coef').value) || 1;
            if(!name) return;
            appState.classes[currentClassId].subjects.push({ id: 'sub_' + Date.now(), name, coef });
            saveToStorage(); renderSubjectsConfig(); if(currentStudentId) renderGradesFields();
        }

        function renderSubjectsConfig() {
            const list = document.getElementById('subjects-config-list');
            const subjects = appState.classes[currentClassId]?.subjects || [];
            list.innerHTML = subjects.map(s => `
                <div class="flex items-center bg-indigo-50 border border-indigo-100 rounded-full px-3 py-1 gap-2">
                    <span class="text-[9px] font-black text-indigo-900 uppercase">${s.name} (x${s.coef})</span>
                    <button onclick="removeSubject('${s.id}')" class="text-red-500 font-bold hover:text-red-700">×</button>
                </div>`).join('');
        }

        function removeSubject(subId) {
            if(!confirm("Supprimer ?")) return;
            appState.classes[currentClassId].subjects = appState.classes[currentClassId].subjects.filter(s => s.id !== subId);
            saveToStorage(); renderSubjectsConfig(); if(currentStudentId) renderGradesFields(); renderStats();
        }

        function updateVal(subId, type, val) {
            const periodGrades = appState.classes[currentClassId].grades[currentPeriod];
            if(!periodGrades[currentStudentId]) periodGrades[currentStudentId] = {};
            if(!periodGrades[currentStudentId][subId]) periodGrades[currentStudentId][subId] = {d1:'', d2:'', c:''};
            periodGrades[currentStudentId][subId][type] = val;
            saveToStorage(); renderStats();
        }

        function renderGradesFields() {
            const container = document.getElementById('grades-grid');
            const classData = appState.classes[currentClassId];
            const periodGrades = classData.grades[currentPeriod];
            container.innerHTML = classData.subjects.map(sub => {
                const g = periodGrades[currentStudentId]?.[sub.id] || { d1: '', d2: '', c: '' };
                return `
                    <div class="flex items-center gap-4 p-3 bg-white rounded-2xl border border-slate-100 shadow-sm">
                        <div class="flex-1 font-bold text-slate-700 text-[11px] uppercase">${sub.name}</div>
                        <div class="flex gap-2">
                            <input type="number" step="0.25" class="grade-input" placeholder="D1" value="${g.d1}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'd1', this.value)">
                            <input type="number" step="0.25" class="grade-input" placeholder="D2" value="${g.d2}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'd2', this.value)">
                            <input type="number" step="0.25" class="grade-input bg-indigo-50" placeholder="CP" value="${g.c}" onfocus="this.select()" oninput="updateVal('${sub.id}', 'c', this.value)">
                        </div>
                    </div>`;
            }).join('');
        }

        function addStudent() {
            const input = document.getElementById('new-student-name');
            if(!input.value.trim()) return;
            appState.classes[currentClassId].students.push({ id: 'std_' + Date.now(), lastName: input.value.toUpperCase() });
            input.value = ''; saveToStorage(); renderStudents();
        }

        function selectStudent(id) {
            currentStudentId = id;
            const student = appState.classes[currentClassId].students.find(s => s.id === id);
            if(!student) return;
            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('editor-panel').classList.remove('hidden');
            document.getElementById('current-student-display').textContent = student.lastName;
            document.getElementById('current-class-display').textContent = currentClassId.replace('_', ' ') + " - Période " + currentPeriod;
            renderGradesFields(); renderStudents();
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            const students = appState.classes[currentClassId]?.students || [];
            list.innerHTML = students.map(s => `
                <li class="student-item p-3 rounded-xl cursor-pointer mb-2 ${currentStudentId === s.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border border-slate-100 hover:bg-indigo-50'}">
                    <span onclick="selectStudent('${s.id}')" class="font-bold text-[10px] uppercase flex-1">${s.lastName}</span>
                    <button onclick="deleteStudent('${s.id}')" class="btn-delete-student hover:bg-red-50">×</button>
                </li>`).join('');
        }

        function deleteStudent(id) {
            if(confirm("Supprimer l'élève ?")) {
                appState.classes[currentClassId].students = appState.classes[currentClassId].students.filter(s => s.id !== id);
                if(currentStudentId === id) { currentStudentId = null; document.getElementById('welcome-msg').classList.remove('hidden'); document.getElementById('editor-panel').classList.add('hidden'); }
                saveToStorage(); renderStudents(); renderStats();
            }
        }

        function renderStats() {
            const classData = appState.classes[currentClassId];
            if(!classData || !classData.students.length) return;
            let totalMoy = 0;
            classData.students.forEach(s => {
                let p = 0, c = 0;
                classData.subjects.forEach(sub => {
                    const g = classData.grades[currentPeriod][s.id]?.[sub.id] || {d1:0,d2:0,c:0};
                    const mS = (((parseFloat(g.d1)||0) + (parseFloat(g.d2)||parseFloat(g.d1)||0))/2 + (parseFloat(g.c)||0)*2)/3;
                    p += mS * sub.coef; c += sub.coef;
                });
                totalMoy += (c > 0 ? p/c : 0);
            });
            document.getElementById('class-avg-display').textContent = (totalMoy / classData.students.length).toFixed(2);
        }

        function saveToStorage() { localStorage.setItem('gestnotes_v4', JSON.stringify(appState)); }
        function exportData() { const blob = new Blob([JSON.stringify(appState)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "gestnotes_backup.json"; a.click(); }
        function importData(e) { const reader = new FileReader(); reader.onload = (ev) => { appState = JSON.parse(ev.target.result); changeLevel(); }; reader.readAsText(e.target.files[0]); }
        function printReport() { window.open(`bulletin.html?class=${currentClassId}&student=${currentStudentId}&period=${currentPeriod}`, '_blank'); }

        window.onload = () => changeLevel();
    </script>
</body>
</html>
