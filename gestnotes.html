<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes Pro – Administration Scolaire Multi-Cycles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-leave { animation: fadeOut 0.4s ease-out forwards; }
        
        .sticky-left-shadow {
            box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.1);
        }
        .sticky-right-shadow {
            box-shadow: -4px 0 6px -4px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-700 text-white shadow-md z-20 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-3 sm:gap-4 text-center sm:text-left w-full lg:w-auto">
                <div class="bg-white/20 p-2.5 rounded-lg hidden sm:block">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div class="w-full sm:w-auto">
                    <h1 class="text-xl sm:text-2xl font-bold">GestNotes Pro</h1>
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 mt-1">
                        <input type="text" id="setting-year" title="Année scolaire" placeholder="Ex: 2025-2026"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-24 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                        
                        <select id="setting-term" title="Période académique"
                            class="bg-white/10 text-white border border-white/20 rounded px-2 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                        </select>

                        <input type="number" id="setting-effectif" title="Nombre total d'élèves" placeholder="Effectif"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-20 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 bg-white/10 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg backdrop-blur-sm border border-white/20 w-full sm:w-auto justify-between sm:justify-start">
                <label for="class-select" class="font-medium text-xs sm:text-sm uppercase tracking-wider text-indigo-100">Classe</label>
                <select id="class-select" class="bg-white text-indigo-900 rounded px-3 py-1 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 max-w-[200px] sm:max-w-none">
                    </select>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto lg:overflow-hidden p-3 sm:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-4 sm:gap-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 shrink-0">
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[320px] sm:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm sm:text-base font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-500 w-5"></i> Liste des élèves
                    </h2>
                    <span id="students-count" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-student-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-student-first" placeholder="Prénom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">
                        <input type="text" id="new-student-last" placeholder="Nom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex justify-center items-center"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="students-list" class="space-y-1"></ul>
                </div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[320px] sm:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm sm:text-base font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> <span id="subject-section-title">Matières & Coefficients</span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="btn-load-standards" type="button" onclick="loadStandardSubjects()"
                            class="text-[10px] sm:text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold border border-emerald-200 px-2 py-0.5 rounded transition-colors uppercase">
                            <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Standards
                        </button>
                        <span id="subjects-count" class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-0.5 rounded-full flex items-center">0</span>
                    </div>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-subject-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-subject-name" placeholder="Nom de la matière" required
                            class="flex-[2] rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                        <input type="number" id="new-subject-val" placeholder="Coef" step="0.5" min="0.5" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                        <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex justify-center items-center"><i class="fa-solid fa-plus"></i></button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="subjects-list" class="space-y-1"></ul>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px] lg:h-0 mb-4 overflow-hidden relative">
            <div class="p-3 sm:p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center bg-slate-50/80 shrink-0 gap-3">
                <h2 class="text-base sm:text-lg font-semibold text-slate-800 flex flex-wrap items-center gap-1 sm:gap-2 text-center sm:text-left">
                    <i class="fa-solid fa-table text-amber-500 w-5"></i> Saisie des Notes
                    <span class="text-[10px] sm:text-xs font-normal text-slate-500 bg-white px-2 py-0.5 border rounded shadow-sm">(D1=Devoir 1, D2=Devoir 2, C=Compo)</span>
                </h2>
                <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                    <button onclick="printAllReportCards()"
                        class="text-xs sm:text-sm bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium px-3 py-1.5 rounded-lg border border-amber-200 transition-colors shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-print"></i> <span class="hidden xs:inline">Imprimer</span>
                    </button>
                    <button onclick="exportAllCSV()"
                        class="text-xs sm:text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium px-3 py-1.5 rounded-lg border border-indigo-200 transition-colors shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-file-zipper"></i> <span class="hidden xs:inline">Exporter</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative custom-scrollbar">
                <table class="w-full text-xs sm:text-sm text-left whitespace-nowrap hidden" id="grades-table">
                    <thead class="text-[10px] sm:text-xs text-slate-600 uppercase bg-slate-100 sticky top-0 z-20 shadow-sm" id="grades-thead"></thead>
                    <tbody id="grades-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
                <div id="grades-empty" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-slate-400 bg-slate-50/50">
                    <div class="bg-white p-4 sm:p-6 rounded-full shadow-sm mb-3 border border-slate-100">
                        <i class="fa-solid fa-clipboard-list text-4xl sm:text-5xl text-slate-300"></i>
                    </div>
                    <p class="text-base sm:text-lg font-medium text-slate-600 mb-1">Aucune donnée</p>
                    <p class="text-xs sm:text-sm text-center">Sélectionnez une classe, chargez les standards puis ajoutez des élèves.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="student-modal" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-5 sm:p-6 border border-slate-100">
            <h3 class="text-base sm:text-lg font-bold mb-4 text-slate-800 border-b pb-2"><i class="fa-solid fa-user-edit text-indigo-500 mr-2"></i>Détails de l'élève</h3>
            <input type="hidden" id="edit-student-id">
            <div class="space-y-3 sm:space-y-4">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Nom</label><input type="text" id="edit-student-last" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Prénom</label><input type="text" id="edit-student-first" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Matricule</label><input type="text" id="edit-student-mat" placeholder="Optionnel" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Né(e) le</label><input type="text" id="edit-student-birth" placeholder="JJ/MM/AAAA" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                </div>
                <div class="flex gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Absences (h)</label><input type="number" id="edit-student-abs" class="w-full border rounded p-1.5 text-sm mt-1 bg-white" min="0"></div>
                    <div class="flex-1"><label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Retards</label><input type="number" id="edit-student-ret" class="w-full border rounded p-1.5 text-sm mt-1 bg-white" min="0"></div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('student-modal')" class="px-3 py-1.5 sm:px-4 sm:py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                <button onclick="saveStudentModal()" class="px-3 py-1.5 sm:px-4 sm:py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm transition-colors">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="subject-modal" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-5 sm:p-6 border border-slate-100">
            <h3 class="text-base sm:text-lg font-bold mb-4 text-slate-800 border-b pb-2"><i class="fa-solid fa-book text-emerald-500 mr-2"></i>Paramètres de la matière</h3>
            <input type="hidden" id="edit-sub-id">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Nom de la matière</label>
                    <input type="text" id="edit-sub-name" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-emerald-500">
                </div>
                <div>
                    <label id="modal-sub-val-label" class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase">Coefficient</label>
                    <input type="number" step="0.5" min="0.5" id="edit-sub-val" class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-emerald-500">
                </div>
                <div class="p-3 bg-emerald-50/50 rounded-lg border border-emerald-100">
                    <label class="text-[10px] sm:text-xs font-bold text-emerald-800 uppercase block mb-2">Coefficients internes</label>
                    <div class="flex gap-2">
                        <div class="flex-1 text-center"><label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">D1</label><input type="number" id="edit-sub-d1" class="w-full border border-emerald-200 rounded p-1.5 text-xs text-center bg-white"></div>
                        <div class="flex-1 text-center"><label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">D2</label><input type="number" id="edit-sub-d2" class="w-full border border-emerald-200 rounded p-1.5 text-xs text-center bg-white"></div>
                        <div class="flex-1 text-center"><label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Compo</label><input type="number" id="edit-sub-c" class="w-full border border-emerald-200 rounded p-1.5 text-xs text-center bg-white font-bold"></div>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('subject-modal')" class="px-3 py-1.5 sm:px-4 sm:py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                <button onclick="saveSubjectModal()" class="px-3 py-1.5 sm:px-4 sm:py-2 text-sm font-bold bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 shadow-sm transition-colors">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // --- CARTOGRAPHIE SCOLAIRE AVEC SÉPARATION NIVEAU / SECTIONS ---
        const ROADMAP_CYCLES = {
            "PRIMAIRE": [
                "CI Unique", "CI A", "CI B", "CP Unique", "CP A", "CP B", 
                "CE1 Unique", "CE1 A", "CE1 B", "CE2 Unique", "CE2 A", "CE2 B", 
                "CM1 Unique", "CM1 A", "CM1 B", "CM2 Unique", "CM2 A", "CM2 B"
            ],
            "COLLEGE": [
                "6ème Unique", "6ème A", "6ème B", "5ème Unique", "5ème A", "5ème B", 
                "4ème Unique", "4ème A", "4ème B", "3ème Unique", "3ème A", "3ème B"
            ],
            "LYCEE": [
                "Seconde L Unique", "Seconde L A", "Seconde L B", "Seconde S Unique", "Seconde S A", "Seconde S B", 
                "Première L1 Unique", "Première L1 A", "Première L1 B", "Première L2 Unique", "Première L2 A", "Première L2 B", 
                "Première S1 Unique", "Première S1 A", "Première S2 Unique", "Première S2 A",
                "Terminale L1 Unique", "Terminale L1 A", "Terminale L1 B", "Terminale L2 Unique", "Terminale L2 A", "Terminale L2 B", 
                "Terminale S1 Unique", "Terminale S1 A", "Terminale S2 Unique", "Terminale S2 A"
            ]
        };

        const STANDARDS_PRESETS = {
            "PRIMAIRE": [
                { name: "Langage/Expression", val: 10 }, { name: "Lecture", val: 10 }, { name: "Calcul Mutuel", val: 10 },
                { name: "Dictée/Orthographe", val: 10 }, { name: "Écriture/Graphisme", val: 10 }, { name: "Histoire-Géo", val: 10 },
                { name: "Sciences d'Obs.", val: 10 }, { name: "Dessin/Travail Manuel", val: 10 }, { name: "Récitation/Chant", val: 10 }
            ],
            "COLLEGE": [
                { name: "Mathématiques", val: 4 }, { name: "Composition Française", val: 5 }, { name: "Anglais", val: 3 },
                { name: "Sciences Physiques", val: 2 }, { name: "SVT", val: 2 }, { name: "Histoire-Géographie", val: 2 },
                { name: "Arabe/Option", val: 2 }, { name: "EPS", val: 1 }
            ],
            "LYCEE": {
                "L": [
                    { name: "Philosophie", val: 5 }, { name: "Français", val: 4 }, { name: "Histoire-Géographie", val: 4 },
                    { name: "Anglais", val: 4 }, { name: "LV2", val: 3 }, { name: "Mathématiques", val: 2 },
                    { name: "SVT", val: 2 }, { name: "EPS", val: 1 }
                ],
                "S": [
                    { name: "Mathématiques", val: 6 }, { name: "Sciences Physiques", val: 6 }, { name: "SVT", val: 4 },
                    { name: "Philosophie", val: 2 }, { name: "Français", val: 3 }, { name: "Histoire-Géographie", val: 2 },
                    { name: "Anglais", val: 2 }, { name: "EPS", val: 1 }
                ]
            }
        };

        const defaultState = { settings: { year: '2025-2026', term: '1' }, classes: {} };
        Object.values(ROADMAP_CYCLES).flat().forEach(cls => {
            defaultState.classes[cls] = { students: [], subjects: [], grades: {}, effectif: '' };
        });

        let appState = JSON.parse(localStorage.getItem('gestnotes_data_v2')) || defaultState;
        
        // Alignement et rétrocompatibilité des structures
        if (!appState.settings) appState.settings = { year: '2025-2026', term: '1' };
        Object.values(ROADMAP_CYCLES).flat().forEach(cls => {
            if (!appState.classes[cls]) appState.classes[cls] = { students: [], subjects: [], grades: {}, effectif: '' };
        });

        function checkCycle(className) {
            if (!className) return "COLLEGE";
            if (className.match(/(CI|CP|CE1|CE2|CM1|CM2)/)) return "PRIMAIRE";
            if (className.match(/(Seconde|Première|Terminale)/)) return "LYCEE";
            return "COLLEGE";
        }

        let currentClass = localStorage.getItem('gestnotes_current_class') || "6ème Unique";
        
        function populateClassSelect() {
            const select = document.getElementById('class-select');
            let html = '';
            Object.entries(ROADMAP_CYCLES).forEach(([cycle, classes]) => {
                html += `<optgroup label="${cycle}" class="text-slate-900 font-bold bg-slate-100">`;
                classes.forEach(c => {
                    html += `<option value="${c}" ${c === currentClass ? 'selected' : ''} class="text-slate-800 font-medium bg-white">${c}</option>`;
                });
                html += `</optgroup>`;
            });
            select.innerHTML = html;
        }

        // --- GESTION ADAPTATIVE DE LA PÉRIODE (TRIMESTRE VS SEMESTRE) ---
        function updatePeriodSelector() {
            const periodSelect = document.getElementById('setting-term');
            const cycle = checkCycle(currentClass);
            let optionsHtml = '';

            if (cycle === "PRIMAIRE") {
                // Le Primaire requiert impérativement un cursus sur 3 Trimestres
                optionsHtml = `
                    <option value="1">1er Trimestre</option>
                    <option value="2">2ème Trimestre</option>
                    <option value="3">3ème Trimestre</option>
                `;
                // Ajustement si la valeur sauvegardée était un semestre inadéquat
                if (!['1', '2', '3'].includes(appState.settings.term)) appState.settings.term = '1';
            } else {
                // Le Secondaire (Collège/Lycée) se base traditionnellement sur 2 Semestres
                optionsHtml = `
                    <option value="1">1er Semestre</option>
                    <option value="2">2ème Semestre</option>
                `;
                if (!['1', '2'].includes(appState.settings.term)) appState.settings.term = '1';
            }

            periodSelect.innerHTML = optionsHtml;
            periodSelect.value = appState.settings.term;
        }

        populateClassSelect();
        currentClass = document.getElementById('class-select').value;
        updatePeriodSelector();

        document.getElementById('setting-year').value = appState.settings.year || '2025-2026';
        document.getElementById('setting-effectif').value = appState.classes[currentClass]?.effectif || '';

        document.getElementById('setting-year').addEventListener('change', e => { appState.settings.year = e.target.value; saveState(); });
        document.getElementById('setting-term').addEventListener('change', e => { appState.settings.term = e.target.value; saveState(); });
        document.getElementById('setting-effectif').addEventListener('input', e => { appState.classes[currentClass].effectif = e.target.value; saveState(); });

        function saveState() { 
            localStorage.setItem('gestnotes_data_v2', JSON.stringify(appState)); 
            localStorage.setItem('gestnotes_current_class', currentClass);
        }
        function generateId() { return Math.random().toString(36).substr(2, 9); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = { success: 'bg-slate-800 border-emerald-500', error: 'bg-slate-800 border-red-500', info: 'bg-slate-800 border-indigo-500' };
            const icons = { success: 'fa-check text-emerald-400', error: 'fa-exclamation text-red-400', info: 'fa-info text-indigo-400' };
            toast.className = `flex items-center gap-3 px-4 py-3 rounded shadow-xl text-white border-l-4 ${styles[type]} toast-enter pointer-events-auto text-sm`;
            toast.innerHTML = `<i class="fa-solid ${icons[type]}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        const els = {
            classSelect: document.getElementById('class-select'),
            studentsList: document.getElementById('students-list'),
            subjectsList: document.getElementById('subjects-list'),
            gradesTable: document.getElementById('grades-table'),
            gradesThead: document.getElementById('grades-thead'),
            gradesTbody: document.getElementById('grades-tbody'),
            gradesEmpty: document.getElementById('grades-empty'),
            newSubjectVal: document.getElementById('new-subject-val'),

        window.updateGrade = function (studentId, subjectId, type, value, inputEl) {
            const data = appState.classes[currentClass];
            const sub = data.subjects.find(s => s.id === subjectId);
            const cycle = checkCycle(currentClass);
            
            if (!data.grades[studentId]) data.grades[studentId] = {};
            if (!data.grades[studentId][subjectId]) data.grades[studentId][subjectId] = { d1: '', d2: '', c: '' };

            value = value.toString().trim();
            let numValue = '';
            
            if (value !== '') {
                numValue = parseFloat(value.replace(',', '.'));
                if (isNaN(numValue)) { showToast('Format invalide', 'error'); inputEl.value = data.grades[studentId][subjectId][type] || ''; return; }
                
                const boundMax = cycle === "PRIMAIRE" ? sub.val : 20;
                if (numValue < 0) numValue = 0; 
                if (numValue > boundMax) numValue = boundMax;
                
                numValue = Math.round(numValue * 100) / 100;
                inputEl.value = numValue;
            } else { 
                inputEl.value = ''; 
            }

            data.grades[studentId][subjectId][type] = numValue;
            saveState();
            updateDOMAverages(studentId, subjectId);
        };

        function updateDOMAverages(studentId, subjectId) {
            const data = appState.classes[currentClass];
            const sub = data.subjects.find(s => s.id === subjectId);
            const g = data.grades[studentId][subjectId];
            const cycle = checkCycle(currentClass);

            let sp = 0, sc = 0;
            if (g.d1 !== '' && g.d1 !== undefined) { sp += Number(g.d1) * (sub.coefD1 || 1); sc += (sub.coefD1 || 1); }
            if (g.d2 !== '' && g.d2 !== undefined) { sp += Number(g.d2) * (sub.coefD2 || 1); sc += (sub.coefD2 || 1); }
            if (g.c !== '' && g.c !== undefined) { sp += Number(g.c) * (sub.coefC || 2); sc += (sub.coefC || 2); }

            const avgSpan = document.getElementById(`avg-${studentId}-${subjectId}`);
            if (sc > 0) {
                const val = sp / sc;
                avgSpan.textContent = val.toFixed(2);
                const passingScore = cycle === "PRIMAIRE" ? (sub.val / 2) : 10;
                avgSpan.className = val >= passingScore ? 'text-emerald-600' : 'text-red-500';
            } else { 
                avgSpan.textContent = '--'; avgSpan.className = 'text-slate-300'; 
            }

            const ranks = getClassRanks(currentClass);
            const stats = ranks[studentId];
            const genAvgSpan = document.getElementById(`genavg-${studentId}`);
            
            if (stats && stats.avg !== null) {
                genAvgSpan.textContent = stats.avg.toFixed(2);
                genAvgSpan.className = `px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block ${stats.avg >= 10 ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-red-700 bg-red-100 border-red-200'}`;
            } else {
                genAvgSpan.textContent = '—';
                genAvgSpan.className = 'px-2 py-1 rounded font-bold text-sm border shadow-sm min-w-[60px] inline-block text-slate-300 border-transparent';
            }
        }

        function getAppreciation(note) {
            if (note === null || note === undefined) return "";
            if (note < 4) return "Très Faible";
            if (note < 8) return "Faible";
            if (note < 10) return "Insuffisant";
            if (note < 12) return "Passable";
            if (note < 14) return "A. Bien";
            if (note < 16) return "Bien";
            return "Excellent";
        }

        function getClassRanks(classId) {
            const data = appState.classes[classId];
            const cycle = checkCycle(classId);
            
            const averages = data.students.map(student => {
                let totalPoints = 0;
                let sumWeights = 0;

                data.subjects.forEach(sub => {
                    const g = data.grades[student.id]?.[sub.id] || {};
                    let p = 0, c = 0;
                    if (g.d1 !== '' && g.d1 !== undefined) { p += Number(g.d1) * (sub.coefD1 || 1); c += (sub.coefD1 || 1); }
                    if (g.d2 !== '' && g.d2 !== undefined) { p += Number(g.d2) * (sub.coefD2 || 1); c += (sub.coefD2 || 1); }
                    if (g.c !== '' && g.c !== undefined) { p += Number(g.c) * (sub.coefC || 2); c += (sub.coefC || 2); }
                    
                    if (c > 0) {
                        const localAvg = p / c;
                        if (cycle === "PRIMAIRE") {
                            totalPoints += (localAvg / sub.val) * 20;
                            sumWeights += 1;
                        } else {
                            totalPoints += localAvg * sub.val;
                            sumWeights += sub.val;
                        }
                    }
                });
                return { id: student.id, avg: sumWeights > 0 ? (totalPoints / sumWeights) : null };
            });

            averages.sort((a, b) => {
                if (a.avg === null) return 1; if (b.avg === null) return -1;
                return b.avg - a.avg;
            });

            const ranks = {}; let currentRank = 1;
            averages.forEach((item, index) => {
                if (index > 0 && item.avg !== averages[index - 1].avg) currentRank = index + 1;
                ranks[item.id] = { avg: item.avg, rank: item.avg !== null ? currentRank : '-' };
            });
            return ranks;
        }

        window.exportCSV = function (studentId) {
            const data = appState.classes[currentClass];
            const student = data.students.find(s => s.id === studentId);
            const ranks = getClassRanks(currentClass);
            const stats = ranks[studentId];
            const year = appState.settings.year;
            const term = appState.settings.term;
            const cycle = checkCycle(currentClass);
            const labelPeriode = cycle === "PRIMAIRE" ? "Trimestre" : "Semestre";

            let csv = '\ufeff'; 
            csv += `Classe;${currentClass}\n`;
            csv += `Annee scolaire;${year};${labelPeriode};${term}\n`;
            csv += `Eleve;${student.firstName} ${student.lastName};Matricule;${student.matricule || ''};Ne(e) le;${student.birthDate || ''};\n`;
            csv += `;;Nbre eleves;${data.students.length};Rang classe;${stats.rank}\n\n`;

            const valHeader = cycle === "PRIMAIRE" ? "Note Max" : "Coefficient";
            csv += `Discipline;Devoir1;Devoir2;Composition;Moyenne;${valHeader};Points;Appreciation\n`;

            let totalWeight = 0, totalPoints = 0;

            data.subjects.forEach(sub => {
                const g = data.grades[studentId]?.[sub.id] || {};
                let p = 0, c = 0;
                const d1 = g.d1 !== undefined && g.d1 !== '' ? Number(g.d1) : '';
                const d2 = g.d2 !== undefined && g.d2 !== '' ? Number(g.d2) : '';
                const comp = g.c !== undefined && g.c !== '' ? Number(g.c) : '';

                if (d1 !== '') { p += d1 * (sub.coefD1 || 1); c += (sub.coefD1 || 1); }
                if (d2 !== '') { p += d2 * (sub.coefD2 || 1); c += (sub.coefD2 || 1); }
                if (comp !== '') { p += comp * (sub.coefC || 2); c += (sub.coefC || 2); }

                let sAvgStr = '', ptsStr = '', app = '';
                if (c > 0) {
                    const sAvg = p / c;
                    sAvgStr = sAvg.toFixed(2).replace('.', ',');
                    
                    if (cycle === "PRIMAIRE") {
                        ptsStr = sAvg.toFixed(2).replace('.', ',');
                        totalPoints += (sAvg / sub.val) * 20;
                        totalWeight += 1;
                        app = getAppreciation((sAvg / sub.val) * 20);
                    } else {
                        const calculatedPoints = sAvg * sub.val;
                        ptsStr = calculatedPoints.toFixed(2).replace('.', ',');
                        totalPoints += calculatedPoints;
                        totalWeight += sub.val;
                        app = getAppreciation(sAvg);
                    }
                }

                const fD1 = d1 !== '' ? d1.toString().replace('.', ',') : '';
                const fD2 = d2 !== '' ? d2.toString().replace('.', ',') : '';
                const fC = comp !== '' ? comp.toString().replace('.', ',') : '';

                csv += `${sub.name};${fD1};${fD2};${fC};${sAvgStr};${sub.val};${ptsStr};${app}\n`;
            });

            const lblTotalWeight = cycle === "PRIMAIRE" ? "Matieres Eval." : "Total Coef";
            csv += `TOTAL;;;;;${lblTotalWeight} : ${totalWeight};${cycle === 'PRIMAIRE' ? '-' : totalPoints.toFixed(2).replace('.', ',')};\n`;
            const gAvgStr = stats.avg !== null ? stats.avg.toFixed(2).replace('.', ',') : '';
            csv += `Moyenne generale;;;${gAvgStr}/20;Rang;${stats.rank};Absences;${student.absences || 0};Retards;${student.retards || 0}\n`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Bulletin_${currentClass.replace(/\s/g, '_')}_${student.lastName.replace(/\s/g, '')}_${student.firstName.replace(/\s/g, '')}.csv`;
            link.click();
        };

        window.exportAllCSV = function () {
            const students = appState.classes[currentClass].students;
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");
            students.forEach((s, i) => setTimeout(() => exportCSV(s.id), i * 300));
            showToast("Téléchargement des bulletins lancé");
        };

        window.printReportCard = function (studentId) {
            window.open(`bulletin.html?class=${encodeURIComponent(currentClass)}&student=${encodeURIComponent(studentId)}`, '_blank');
        };

        window.printAllReportCards = function () {
            const students = appState.classes[currentClass].students;
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");
            if (students.length > 5 && !confirm("Vous allez ouvrir " + students.length + " onglets d'impression. Continuer ?")) return;
            students.forEach((s, i) => { setTimeout(() => printReportCard(s.id), i * 300); });
            showToast("Ouverture des demandes d'impression...");
        };

        render();
    </script>
</body>

</html>
