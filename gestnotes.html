<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations Toasts */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-leave { animation: fadeOut 0.4s ease-out forwards; }

        /* Fixation de la colonne élève sur desktop uniquement */
        @media (min-width: 768px) {
            .sticky-left-column {
                position: sticky;
                left: 0;
                z-index: 20;
                background-color: white !important;
                box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.1);
            }
            .sticky-header-first {
                position: sticky;
                left: 0;
                z-index: 40;
                background-color: #f1f5f9 !important;
                box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.1);
            }
        }

        /* Mode Impression */
        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible !important; }
            main { padding: 0 !important; }
            .sticky-left-column, .sticky-header-first { position: static !important; box-shadow: none !important; }
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-700 text-white shadow-md z-30 shrink-0 no-print">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fa-solid fa-graduation-cap text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight">GestNotes</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="text" id="setting-year" placeholder="2023-2024" class="bg-white/10 text-white border border-white/20 rounded px-2 py-0.5 text-[10px] w-20 outline-none focus:bg-white/20">
                        <select id="setting-semester" class="bg-white/10 text-white border border-white/20 rounded px-1 py-0.5 text-[10px] outline-none">
                            <option value="1" class="text-slate-800">Semestre 1</option>
                            <option value="2" class="text-slate-800">Semestre 2</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto bg-white/10 p-2 rounded-xl border border-white/20 backdrop-blur-sm">
                <label for="class-select" class="text-[10px] font-bold uppercase tracking-wider text-indigo-100 ml-1">Niveau</label>
                <select id="class-select" class="flex-1 md:w-32 bg-white text-indigo-900 rounded-lg px-3 py-1.5 font-bold text-sm outline-none cursor-pointer">
                    <option value="CI">CI</option>
                    <option value="CP">CP</option>
                    <option value="CE1">CE1</option>
                    <option value="CE2">CE2</option>
                    <option value="CM1">CM1</option>
                    <option value="CM2">CM2</option>
                    <option value="6ème" selected>6ème</option>
                    <option value="5ème">5ème</option>
                    <option value="4ème">4ème</option>
                    <option value="3ème">3ème</option>
                    <option value="Seconde">Seconde</option>
                    <option value="Première">Première</option>
                    <option value="Terminale">Terminale</option>
                </select>

                <div class="h-6 w-px bg-white/20 mx-1"></div>

                <label for="setting-effectif" class="text-[10px] font-bold uppercase tracking-wider text-indigo-100">Effectif</label>
                <input type="number" id="setting-effectif" placeholder="0" class="w-16 bg-white/10 text-white border border-white/20 rounded-lg px-2 py-1.5 text-sm font-bold outline-none focus:bg-white/20 text-center">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 shrink-0 no-print">
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[300px] md:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-500 w-5"></i> Liste des élèves
                    </h2>
                    <span id="students-count" class="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-student-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-student-first" placeholder="Prénom" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <input type="text" id="new-student-last" placeholder="Nom" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">+</button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="students-list" class="space-y-1"></ul>
                </div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[300px] md:h-[340px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-sm font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières & Coefficients
                    </h2>
                    <span id="subjects-count" class="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-subject-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-subject-name" placeholder="Matière" required class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20">
                        <input type="number" id="new-subject-coef" placeholder="Coef" step="0.5" required class="sm:w-20 rounded-lg border border-slate-300 px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20">
                        <button type="submit" class="bg-emerald-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-emerald-700 transition-colors">+</button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="subjects-list" class="space-y-1"></ul>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px] mb-6 overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/80 no-print">
                <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-table text-amber-500 w-5"></i> Saisie des Notes
                </h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="window.print()" class="flex-1 sm:flex-none text-xs bg-white hover:bg-slate-50 text-slate-700 font-bold px-4 py-2 rounded-lg border border-slate-200 transition-colors shadow-sm">
                        <i class="fa-solid fa-print mr-1"></i> Imprimer
                    </button>
                    <button onclick="exportAllCSV()" class="flex-1 sm:flex-none text-xs bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg shadow-sm transition-colors">
                        <i class="fa-solid fa-file-export mr-1"></i> Exporter CSV
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative">
                <table class="w-full text-sm text-left whitespace-nowrap min-w-[800px] hidden" id="grades-table">
                    <thead class="text-[10px] text-slate-600 uppercase bg-slate-100 sticky top-0 z-30" id="grades-thead"></thead>
                    <tbody id="grades-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
                <div id="grades-empty" class="absolute inset-0 flex flex-col items-center justify-center p-12 text-slate-400">
                    <i class="fa-solid fa-clipboard-list text-5xl mb-4 opacity-20"></i>
                    <p class="font-medium">Ajoutez des élèves et des matières pour commencer.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // --- 1. CONFIGURATION INITIALE & ÉTAT ---
        const defaultState = { settings: { year: '2023-2024', semester: '1' }, classes: {} };
        const classNames = ["CI", "CP", "CE1", "CE2", "CM1", "CM2", "6ème", "5ème", "4ème", "3ème", "Seconde", "Première", "Terminale"];
        classNames.forEach(c => defaultState.classes[c] = { students: [], subjects: [], grades: {}, effectif: '' });

        let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || defaultState;

        // --- 2. MIGRATION & SÉCURISATION DES DONNÉES ---
        if (!appState.settings) appState.settings = { year: '2023-2024', semester: '1' };
        Object.keys(appState.classes).forEach(cls => {
            const data = appState.classes[cls];
            if (!data.students) data.students = [];
            if (!data.subjects) data.subjects = [];
            if (!data.grades) data.grades = {};
            if (data.effectif === undefined) data.effectif = '';

            data.subjects.forEach(sub => {
                if (sub.coefD1 === undefined) sub.coefD1 = 1;
                if (sub.coefD2 === undefined) sub.coefD2 = 1;
                if (sub.coefC === undefined) sub.coefC = 2;
                if (sub.coef === undefined) sub.coef = 1;
            });
            Object.keys(data.grades).forEach(sId => {
                Object.keys(data.grades[sId]).forEach(subId => {
                    const val = data.grades[sId][subId];
                    if (typeof val === 'number' || typeof val === 'string') {
                        data.grades[sId][subId] = { d1: '', d2: '', c: val };
                    }
                });
            });
        });

        // --- 3. VARIABLES GLOBALES & ÉLÉMENTS DOM ---
        const els = {
            classSelect: document.getElementById('class-select'),
            studentsList: document.getElementById('students-list'),
            subjectsList: document.getElementById('subjects-list'),
            gradesTable: document.getElementById('grades-table'),
            gradesThead: document.getElementById('grades-thead'),
            gradesTbody: document.getElementById('grades-tbody'),
            gradesEmpty: document.getElementById('grades-empty'),
            yearInput: document.getElementById('setting-year'),
            semesterSelect: document.getElementById('setting-semester'),
            effectifInput: document.getElementById('setting-effectif'),
            addStudentForm: document.getElementById('add-student-form'),
            addSubjectForm: document.getElementById('add-subject-form')
        };
        
        let currentClass = els.classSelect ? els.classSelect.value : "6ème";

        // --- 4. INITIALISATION DE L'INTERFACE ---
        function initUI() {
            if (els.yearInput) els.yearInput.value = appState.settings.year;
            if (els.semesterSelect) els.semesterSelect.value = appState.settings.semester;
            if (els.effectifInput && appState.classes[currentClass]) {
                els.effectifInput.value = appState.classes[currentClass].effectif || '';
            }
            render();
        }

        // --- 5. ÉCOUTEURS D'ÉVÉNEMENTS GÉNÉRAUX ---
if (els.yearInput) els.yearInput.addEventListener('change', e => {
    appState.settings.year = e.target.value;
    saveState();
});

if (els.semesterSelect) els.semesterSelect.addEventListener('change', e => {
    appState.settings.semester = e.target.value;
    saveState();
});

if (els.effectifInput) {
    els.effectifInput.addEventListener('input', e => {
        appState.classes[currentClass].effectif = e.target.value;
        saveState();
    });
}

if (els.classSelect) {
    els.classSelect.addEventListener('change', (e) => {
        currentClass = e.target.value;
        if (els.effectifInput) els.effectifInput.value = appState.classes[currentClass].effectif || '';
        render();
    });
}
if (els.classSelect) {
    els.classSelect.addEventListener('change', (e) => {
        currentClass = e.target.value;
        if (els.effectifInput) els.effectifInput.value = appState.classes[currentClass].effectif || '';
        render(); // Important : recharge le tableau quand tu changes de classe
    });
}

// --- 6. FONCTIONS PRINCIPALES ---
function saveState() {
    localStorage.setItem('gestnotes_data', JSON.stringify(appState));
}

// Colle ici toutes les autres fonctions : render(), updateGrade(), etc. que je t'ai données

initUI(); // Lancement
</script>
</body>
</html>
