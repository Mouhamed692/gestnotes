<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .toast-leave {
            animation: fadeOut 0.4s ease-out forwards;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 6px -4px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="text-slate-800 md:h-screen flex flex-col md:overflow-hidden">

    <header class="bg-indigo-700 text-white shadow-md z-20 shrink-0">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full lg:w-auto text-center sm:text-left">
                <div class="bg-white/20 p-2.5 rounded-lg hidden sm:block">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div class="w-full sm:w-auto">
                    <h1 class="text-2xl font-bold">GestNotes</h1>
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 mt-1">
                        <input type="text" id="setting-year" title="Année scolaire"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-24 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                        <select id="setting-semester" title="Période"
                            class="bg-white/10 text-white border border-white/20 rounded px-2 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                            <option value="1" class="text-slate-800">Semestre / Trimestre 1</option>
                            <option value="2" class="text-slate-800">Semestre / Trimestre 2</option>
                            <option value="3" class="text-slate-800">Trimestre 3</option>
                        </select>
                        <input type="number" id="setting-effectif" title="Nombre total d'élèves (Effectif)"
                            placeholder="Effectif"
                            class="bg-white/10 text-white placeholder-white/70 border border-white/20 rounded px-2 py-0.5 text-xs w-20 focus:outline-none focus:ring-1 focus:ring-white/50 transition-colors">
                    </div>
                </div>
            </div>

            <div
                class="flex flex-col sm:flex-row items-center gap-3 bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/20 w-full lg:w-auto">
                <span class="font-medium text-sm uppercase tracking-wider text-indigo-100 font-bold">Structure</span>
                <div class="flex items-center gap-2 w-full sm:w-auto justify-center">
                    <select id="class-select" title="Niveau général"
                        class="bg-white text-indigo-900 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 text-sm">
                        <optgroup label="Enseignement Primaire" class="text-slate-500 font-normal">
                            <option value="CP">CP</option>
                            <option value="CE1">CE1</option>
                            <option value="CE2">CE2</option>
                            <option value="CM1">CM1</option>
                            <option value="CM2">CM2</option>
                        </optgroup>
                        <optgroup label="Enseignement Secondaire" class="text-slate-500 font-normal">
                            <option value="6ème" selected>6ème</option>
                            <option value="5ème">5ème</option>
                            <option value="4ème">4ème</option>
                            <option value="3ème">3ème</option>
                            <option value="Seconde">Seconde</option>
                            <option value="Première">Première</option>
                            <option value="Terminale">Terminale</option>
                        </optgroup>
                    </select>

                    <select id="section-select" title="Classe / Série"
                        class="bg-white text-indigo-900 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-bold cursor-pointer shadow-sm border-0 text-sm">
                        </select>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 max-w-[1400px] mx-auto w-full flex flex-col gap-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 shrink-0">
            <section
                class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[360px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-500 w-5"></i> Liste des élèves
                    </h2>
                    <span id="students-count"
                        class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-student-form" class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="new-student-first" placeholder="Prénom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">
                        <input type="text" id="new-student-last" placeholder="Nom" required
                            class="flex-1 rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500">

                        <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex justify-center items-center gap-1">
                            <i class="fa-solid fa-plus"></i> <span class="sm:hidden">Ajouter</span>
                        </button>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="students-list" class="space-y-1"></ul>
                </div>
            </section>

            <section
                class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[360px] overflow-hidden">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/80">
                    <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2" id="subject-section-title">
                        <i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières & Coefficients
                    </h2>
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="loadStandardSubjects()" title="Ajouter les matières officielles par défaut"
                            class="text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold px-2.5 py-1 rounded border border-emerald-200 transition-colors flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-bolt"></i> Standards
                        </button>
                        <span id="subjects-count"
                            class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                </div>
                <div class="p-3 bg-white border-b border-slate-100">
                    <form id="add-subject-form" class="flex flex-col gap-2">
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" id="new-subject-name" placeholder="Nom de la matière" required
                                class="flex-[2] rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                            <div class="flex gap-2 flex-1">
                                <input type="number" id="new-subject-coef" placeholder="Coef G."
                                    title="Coefficient pour la moyenne générale" step="0.5" min="0.5"
                                    required
                                    class="w-full rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-500">
                                <button type="submit"
                                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center justify-center">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <ul id="subjects-list" class="space-y-1"></ul>
                </div>
            </section>
        </div>

        <section
            class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[450px] mb-6 overflow-hidden relative">
            <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50/80 shrink-0 gap-3">
                <h2 class="text-base sm:text-lg font-semibold text-slate-800 flex flex-wrap items-center gap-1 sm:gap-2">
                    <i class="fa-solid fa-table text-amber-500 w-5"></i> Saisie des Notes
                    <span id="grades-table-subtitle"
                        class="text-[11px] font-normal text-slate-500 bg-white px-2 py-0.5 border rounded shadow-sm"></span>
                </h2>
                <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                    <button onclick="printAllReportCards()"
                        class="text-xs sm:text-sm bg-amber-50 hover:bg-amber-100 text-amber-700 font-medium px-3 py-1.5 rounded-lg border border-amber-200 transition-colors shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-print"></i> Imprimer
                    </button>
                    <button onclick="exportAllCSV()"
                        class="text-xs sm:text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium px-3 py-1.5 rounded-lg border border-indigo-200 transition-colors shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-file-zipper"></i> Exporter
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative w-full">
                <table class="w-full text-sm text-left whitespace-nowrap hidden" id="grades-table">
                    <thead class="text-xs text-slate-600 uppercase bg-slate-100 sticky top-0 z-20 shadow-sm"
                        id="grades-thead"></thead>
                    <tbody id="grades-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
                <div id="grades-empty"
                    class="absolute inset-0 flex flex-col items-center justify-center p-8 text-slate-400 bg-slate-50/50 text-center">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-3 border border-slate-100"><i
                            class="fa-solid fa-clipboard-list text-4xl text-slate-300"></i></div>
                    <p class="text-base font-medium text-slate-600 mb-1">Aucune donnée</p>
                    <p class="text-xs max-w-xs">Sélectionnez le niveau/série complet et ajoutez des élèves et des matières ou utilisez le bouton "Standards".</p>
                </div>
            </div>
        </section>
    </main>

    <div id="student-modal"
        class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 border border-slate-100">
            <h3 class="text-lg font-bold mb-4 text-slate-800 border-b pb-2"><i
                    class="fa-solid fa-user-edit text-indigo-500 mr-2"></i>Détails de l'élève</h3>
            <input type="hidden" id="edit-student-id">
            <div class="space-y-4">
                <div class="flex gap-3">
                    <div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase">Nom</label><input
                            type="text" id="edit-student-last"
                            class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase">Prénom</label><input
                            type="text" id="edit-student-first"
                            class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1"><label
                            class="text-xs font-bold text-slate-500 uppercase">Matricule</label><input type="text"
                            id="edit-student-mat" placeholder="Optionnel"
                            class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase">Né(e) le</label><input
                            type="text" id="edit-student-birth" placeholder="JJ/MM/AAAA"
                            class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-indigo-500"></div>
                </div>
                <div class="flex gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase">Absences</label><input
                            type="number" id="edit-student-abs"
                            class="w-full border rounded p-1.5 text-sm mt-1 bg-white" min="0"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-slate-500 uppercase">Retards</label><input
                            type="number" id="edit-student-ret"
                            class="w-full border rounded p-1.5 text-sm mt-1 bg-white" min="0"></div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('student-modal')"
                    class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                <button onclick="saveStudentModal()"
                    class="px-4 py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm transition-colors">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="subject-modal"
        class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 border border-slate-100">
            <h3 class="text-lg font-bold mb-4 text-slate-800 border-b pb-2"><i
                    class="fa-solid fa-book text-emerald-500 mr-2"></i>Paramètres de l'élément</h3>
            <input type="hidden" id="edit-sub-id">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase" id="modal-sub-label">Nom de la matière / domaine</label>
                    <input type="text" id="edit-sub-name"
                        class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Coef. Général (pour moyenne G.)</label>
                    <input type="number" step="0.5" min="0.5" id="edit-sub-coef"
                        class="w-full border rounded-lg p-2 text-sm mt-1 focus:ring-1 focus:ring-emerald-500">
                </div>
                <div class="p-3 bg-emerald-50/50 rounded-lg border border-emerald-100">
                    <label class="text-xs font-bold text-emerald-800 uppercase block mb-2" id="modal-coef-label">Coefficients internes</label>
                    <div class="flex gap-2">
                        <div class="flex-1 text-center"><label id="label-modal-d1"
                                class="text-[10px] font-bold text-slate-500 uppercase block mb-1">D1</label><input
                                type="number" id="edit-sub-d1"
                                class="w-full border border-emerald-200 rounded p-1.5 text-sm text-center"></div>
                        <div class="flex-1 text-center"><label id="label-modal-d2"
                                class="text-[10px] font-bold text-slate-500 uppercase block mb-1">D2</label><input
                                type="number" id="edit-sub-d2"
                                class="w-full border border-emerald-200 rounded p-1.5 text-sm text-center"></div>
                        <div class="flex-1 text-center"><label id="label-modal-c"
                                class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Compo</label><input
                                type="number" id="edit-sub-c"
                                class="w-full border border-emerald-200 rounded p-1.5 text-sm text-center bg-white font-bold">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('subject-modal')"
                    class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                <button onclick="saveSubjectModal()"
                    class="px-4 py-2 text-sm font-bold bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 shadow-sm transition-colors">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // --- ÉTAT GLOBAL ADAPTÉ AUX SÉRIES ---
        const defaultState = { settings: { year: '2025-2026', semester: '1' }, classes: {} };
        const classNames = ["CP", "CE1", "CE2", "CM1", "CM2", "6ème", "5ème", "4ème", "3ème", "Seconde", "Première", "Terminale"];
        
        // Séries/Sections par défaut par type de classe adaptées selon vos instructions
        function getSectionsForClass(cls) {
            if (cls === "6ème") return ["Unique"]; // Classe de 6ème sans sous-sections
            if (["CP", "CE1", "CE2", "CM1", "CM2"].includes(cls)) return ["A", "B"];
            if (["5ème", "4ème", "3ème"].includes(cls)) return ["A", "B", "C"];
            if (["Seconde"].includes(cls)) return ["S", "L"];
            if (["Première", "Terminale"].includes(cls)) return ["A", "S1", "S2", "L1", "L2", "G"]; // Ajout de la classe/série A au Lycée
            return ["A"];
        }

        let appState = JSON.parse(localStorage.getItem('gestnotes_data')) || defaultState;
        if (!appState.settings) appState.settings = { year: '2025-2026', semester: '1' };

        // Configuration initiale des conteneurs de stockage (Format de clé de stockage : "Niveau_Section")
        classNames.forEach(c => {
            const sections = getSectionsForClass(c);
            sections.forEach(s => {
                const key = `${c}_${s}`;
                if (!appState.classes[key]) {
                    appState.classes[key] = { students: [], subjects: [], grades: {}, effectif: '' };
                }
            });
        });

        // Détermination des sélecteurs courants
        let currentClass = document.getElementById('class-select').value;
        const sectionSelect = document.getElementById('section-select');

        function updateSectionSelectOptions(cls) {
            sectionSelect.innerHTML = '';
            const sections = getSectionsForClass(cls);
            sections.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                if (s === "Unique") {
                    opt.textContent = `Classe Unique`;
                } else {
                    opt.textContent = (["S1", "S2", "L1", "L2", "G", "S", "L", "A"].includes(s) && ["Seconde", "Première", "Terminale"].includes(cls)) ? `Série ${s}` : `Classe ${s}`;
                }
                sectionSelect.appendChild(opt);
            });
        }

        updateSectionSelectOptions(currentClass);
        let currentSection = sectionSelect.value;
        let currentFullKey = `${currentClass}_${currentSection}`;

        // Sync inputs settings
        document.getElementById('setting-year').value = appState.settings.year;
        document.getElementById('setting-semester').value = appState.settings.semester;
        document.getElementById('setting-effectif').value = appState.classes[currentFullKey]?.effectif || '';

        // Événements d'en-tête
        document.getElementById('setting-year').addEventListener('change', e => { appState.settings.year = e.target.value; saveState(); });
        document.getElementById('setting-semester').addEventListener('change', e => { appState.settings.semester = e.target.value; saveState(); });
        document.getElementById('setting-effectif').addEventListener('input', e => {
            if(appState.classes[currentFullKey]) appState.classes[currentFullKey].effectif = e.target.value;
            saveState();
        });

        document.getElementById('class-select').addEventListener('change', (e) => {
            currentClass = e.target.value;
            updateSectionSelectOptions(currentClass);
            currentSection = sectionSelect.value;
            currentFullKey = `${currentClass}_${currentSection}`;
            document.getElementById('setting-effectif').value = appState.classes[currentFullKey]?.effectif || '';
            render();
        });

        sectionSelect.addEventListener('change', (e) => {
            currentSection = e.target.value;
            currentFullKey = `${currentClass}_${currentSection}`;
            document.getElementById('setting-effectif').value = appState.classes[currentFullKey]?.effectif || '';
            render();
        });

        function saveState() { localStorage.setItem('gestnotes_data', JSON.stringify(appState)); }
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        function isPrimary(className) { return ["CP", "CE1", "CE2", "CM1", "CM2"].includes(className); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = { success: 'bg-slate-800 border-emerald-500', error: 'bg-slate-800 border-red-500', info: 'bg-slate-800 border-indigo-500' };
            const icons = { success: 'fa-check text-emerald-400', error: 'fa-exclamation text-red-400', info: 'fa-info text-indigo-400' };
            toast.className = `flex items-center gap-3 px-4 py-3 rounded shadow-xl text-white border-l-4 ${styles[type]} toast-enter pointer-events-auto text-sm`;
            toast.innerHTML = `<i class="fa-solid ${icons[type]}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        // --- BASE DE MATIÈRES STANDARDS (DÉFAUT) ---
        function loadStandardSubjects() {
            if (!appState.classes[currentFullKey]) return;
            
            if (appState.classes[currentFullKey].subjects.length > 0) {
                if (!confirm("Voulez-vous ajouter les matières standards ? Vos matières actuelles seront conservées.")) return;
            }

            let standards = [];

            if (isPrimary(currentClass)) {
                standards = [
                    { name: "Langue & Communication", coef: 2 },
                    { name: "Mathématiques", coef: 2 },
                    { name: "Éducation Science & Sociale", coef: 1 },
                    { name: "Éducation Développement Durable", coef: 1 },
                    { name: "Arts Plastiques / Éduc. Musique", coef: 1 }
                ];
            } else if (["6ème", "5ème", "4ème", "3ème"].includes(currentClass)) {
                standards = [
                    { name: "Français", coef: 3 },
                    { name: "Mathématiques", coef: 3 },
                    { name: "Anglais", coef: 2 },
                    { name: "Histoire-Géographie", coef: 2 },
                    { name: "Sciences de la Vie et de la Terre", coef: 2 },
                    { name: "Sciences Physiques", coef: 2 },
                    { name: "EPS", coef: 1 }
                ];
                if (["4ème", "3ème"].includes(currentClass)) {
                    standards.push({ name: "Seconde Langue (All/Esp)", coef: 2 });
                }
            } else {
                // Lycée (Selon Séries)
                if (currentSection.startsWith("S")) {
                    standards = [
                        { name: "Mathématiques", coef: 5 },
                        { name: "Sciences Physiques", coef: 5 },
                        { name: "SVT", coef: 4 },
                        { name: "Français", coef: 2 },
                        { name: "Philosophie", coef: 2 },
                        { name: "Histoire-Géographie", coef: 2 },
                        { name: "Anglais", coef: 2 }
                    ];
                } else if (currentSection.startsWith("L") || currentSection === "A") {
                    standards = [
                        { name: "Français", coef: 4 },
                        { name: "Philosophie", coef: 4 },
                        { name: "Histoire-Géographie", coef: 3 },
                        { name: "Anglais", coef: 3 },
                        { name: "Langue 2", coef: 2 },
                        { name: "Mathématiques", coef: 2 },
                        { name: "Sciences", coef: 1 }
                    ];
                } else {
                    standards = [
                        { name: "Français", coef: 3 },
                        { name: "Mathématiques", coef: 3 },
                        { name: "Histoire-Géographie", coef: 2 },
                        { name: "Anglais", coef: 2 },
                        { name: "Économie / EPS", coef: 2 }
                    ];
                }
            }

            standards.forEach(sub => {
                const exists = appState.classes[currentFullKey].subjects.some(s => s.name.toLowerCase() === sub.name.toLowerCase());
                if (!exists) {
                    appState.classes[currentFullKey].subjects.push({
                        id: generateId(),
                        name: sub.name,
                        coef: sub.coef,
                        coefD1: 1,
                        coefD2: 1,
                        coefC: 2
                    });
                }
            });

            saveState();
            render();
            showToast("Matières standards chargées !");
        }

        // --- MOTEUR DE RENDU ADAPTÉ ---
        const els = {
            studentsList: document.getElementById('students-list'),
            subjectsList: document.getElementById('subjects-list'),
            gradesTable: document.getElementById('grades-table'),
            gradesThead: document.getElementById('grades-thead'),
            gradesTbody: document.getElementById('grades-tbody'),
            gradesEmpty: document.getElementById('grades-empty')
        };

        function render() {
            const subTitle = document.getElementById('subject-section-title');
            const tableSubtitle = document.getElementById('grades-table-subtitle');
            
            const txtSection = currentSection === "Unique" ? "" : ` ${currentSection}`;

            if (isPrimary(currentClass)) {
                subTitle.innerHTML = `<i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Domaines & Coef.`;
                tableSubtitle.textContent = `(Classe : ${currentClass}${txtSection}) • N1=Note 1, N2=Note 2, Év=Évaluation`;
                document.getElementById('new-subject-name').placeholder = "Nom du domaine / activité";
                document.getElementById('modal-sub-label').textContent = "Nom du domaine d'apprentissage";
                document.getElementById('modal-coef-label').textContent = "Coefficients internes (Moyenne domaine)";
                document.getElementById('label-modal-d1').textContent = "Note 1";
                document.getElementById('label-modal-d2').textContent = "Note 2";
                document.getElementById('label-modal-c').textContent = "Éval.";
            } else {
                subTitle.innerHTML = `<i class="fa-solid fa-book-open text-emerald-500 w-5"></i> Matières & Coefficients`;
                tableSubtitle.textContent = `(Classe : ${currentClass}${txtSection}) • D1=Devoir 1, D2=Devoir 2, C=Compo`;
                document.getElementById('new-subject-name').placeholder = "Nom de la matière";
                document.getElementById('modal-sub-label').textContent = "Nom de la matière";
                document.getElementById('modal-coef-label').textContent = "Coefficients internes (Moyenne matière)";
                document.getElementById('label-modal-d1').textContent = "D1";
                document.getElementById('label-modal-d2').textContent = "D2";
                document.getElementById('label-modal-c').textContent = "Compo";
            }
            renderStudents();
            renderSubjects();
            renderGradesTable();
        }

        function renderStudents() {
            const students = appState.classes[currentFullKey]?.students || [];
            students.sort((a, b) => a.lastName.localeCompare(b.lastName) || a.firstName.localeCompare(b.firstName));
            els.studentsList.innerHTML = '';
            document.getElementById('students-count').textContent = students.length;
            if (students.length === 0) {
                els.studentsList.innerHTML = `<li class="text-sm text-slate-400 p-3 text-center italic">Aucun élève</li>`;
                return;
            }
            students.forEach(student => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded group border border-transparent transition-colors';
                li.innerHTML = `
                    <div class="min-w-0 flex-1 pr-2">
                        <div class="font-bold text-slate-800 uppercase text-[13px] tracking-wide truncate">${student.lastName} <span class="capitalize text-slate-500 font-medium ml-1">${student.firstName}</span></div>
                        ${student.matricule ? `<div class="text-[10px] text-slate-400">Mat: ${student.matricule}</div>` : ''}
                    </div>
                    <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                        <button onclick="exportCSV('${student.id}')" class="text-slate-400 hover:text-amber-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center" title="Bulletin CSV"><i class="fa-solid fa-file-csv text-xs"></i></button>
                        <button onclick="openStudentModal('${student.id}')" class="text-slate-400 hover:text-indigo-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center" title="Modifier"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="deleteStudent('${student.id}')" class="text-slate-400 hover:text-red-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center" title="Supprimer"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                `;
                els.studentsList.appendChild(li);
            });
        }

        function renderSubjects() {
            const subjects = appState.classes[currentFullKey]?.subjects || [];
            els.subjectsList.innerHTML = '';
            document.getElementById('subjects-count').textContent = subjects.length;
            if (subjects.length === 0) {
                const fallbackText = isPrimary(currentClass) ? "Aucun domaine" : "Aucune matière";
                els.subjectsList.innerHTML = `<li class="text-sm text-slate-400 p-3 text-center italic">${fallbackText}</li>`;
                return;
            }
            subjects.forEach(subject => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-2 hover:bg-slate-50 rounded group border border-transparent transition-colors';
                li.innerHTML = `
                    <div class="flex items-center gap-2 min-w-0 flex-1 pr-2">
                        <span class="font-semibold text-slate-700 text-[13px] truncate">${subject.name}</span>
                        <span class="bg-emerald-50 text-emerald-700 text-[10px] px-1.5 py-0.5 rounded border border-emerald-100 font-bold shrink-0">Coef ${subject.coef}</span>
                    </div>
                    <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                        <button onclick="openSubjectModal('${subject.id}')" class="text-slate-400 hover:text-emerald-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-sliders text-xs"></i></button>
                        <button onclick="deleteSubject('${subject.id}')" class="text-slate-400 hover:text-red-500 bg-white shadow-sm border border-slate-200 w-7 h-7 rounded flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                `;
                els.subjectsList.appendChild(li);
            });
        }

        function renderGradesTable() {
            const students = appState.classes[currentFullKey]?.students || [];
            const subjects = appState.classes[currentFullKey]?.subjects || [];

            if (students.length === 0 || subjects.length === 0) {
                els.gradesTable.classList.add('hidden');
                els.gradesEmpty.classList.remove('hidden');
                return;
            }

            els.gradesTable.classList.remove('hidden');
            els.gradesEmpty.classList.add('hidden');

            // En-tête du tableau de saisie
            let theadHtml = `<tr>
                <th scope="col" class="px-4 py-3 sticky left-0 bg-slate-100 z-10 sticky-left-shadow min-w-[180px]">Nom de l'élève</th>`;
            subjects.forEach(sub => {
                theadHtml += `<th scope="col" colspan="3" class="px-2 py-2 text-center border-l border-slate-200 bg-slate-50 font-bold text-indigo-900 border-b border-indigo-100">${sub.name} <span class="text-[10px] text-slate-500">(x${subjectCoefString(sub)})</span></th>`;
            });
            theadHtml += `<th scope="col" class="px-4 py-3 text-center sticky right-0 bg-slate-100 z-10 sticky-right-shadow">Actions</th></tr>`;

            theadHtml += `tr><th class="sticky left-0 bg-slate-100 sticky-left-shadow border-b border-slate-200"></th>`;
            subjects.forEach(() => {
                theadHtml += `
                    <th class="px-1 py-1 text-center text-[10px] font-bold text-slate-400 bg-white border-l border-slate-100">${isPrimary(currentClass) ? 'N1' : 'D1'}</th>
                    <th class="px-1 py-1 text-center text-[10px] font-bold text-slate-400 bg-white">${isPrimary(currentClass) ? 'N2' : 'D2'}</th>
                    <th class="px-1 py-1 text-center text-[10px] font-bold text-indigo-500 bg-indigo-50/30 border-r border-slate-200">${isPrimary(currentClass) ? 'Év' : 'C'}</th>
                `;
            });
            theadHtml += `<th class="sticky right-0 bg-slate-100 sticky-right-shadow"></th></tr>`;
            els.gradesThead.innerHTML = theadHtml;

            // Lignes des élèves
            els.gradesTbody.innerHTML = '';
            students.forEach(student => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/80 transition-colors';

                let rowHtml = `<td class="px-4 py-2 font-bold text-slate-700 uppercase tracking-wide sticky left-0 bg-white group-hover:bg-slate-50 z-10 sticky-left-shadow truncate max-w-[200px]">${student.lastName} <span class="capitalize text-slate-500 font-normal ml-1">${student.firstName}</span></td>`;

                subjects.forEach(sub => {
                    const grade = appState.classes[currentFullKey].grades[student.id]?.[sub.id] || { d1: '', d2: '', c: '' };
                    rowHtml += `
                        <td class="p-1 border-l border-slate-100"><input type="text" value="${grade.d1||''}" onchange="updateGrade('${student.id}','${sub.id}','d1',this.value)" class="w-10 text-center rounded border border-slate-200 py-1 text-xs focus:ring-1 focus:ring-amber-500 focus:outline-none"></td>
                        <td class="p-1"><input type="text" value="${grade.d2||''}" onchange="updateGrade('${student.id}','${sub.id}','d2',this.value)" class="w-10 text-center rounded border border-slate-200 py-1 text-xs focus:ring-1 focus:ring-amber-500 focus:outline-none"></td>
                        <td class="p-1 border-r border-slate-200 bg-indigo-50/10"><input type="text" value="${grade.c||''}" onchange="updateGrade('${student.id}','${sub.id}','c',this.value)" class="w-11 text-center rounded border border-indigo-200 py-1 text-xs font-bold focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-indigo-50/30 text-indigo-900"></td>
                    `;
                });

                rowHtml += `
                    <td class="px-4 py-2 text-center sticky right-0 bg-white group-hover:bg-slate-50 z-10 sticky-right-shadow">
                        <button onclick="printReportCard('${student.id}')" class="text-amber-600 hover:text-amber-700 font-bold bg-amber-50 px-2 py-1 rounded text-xs border border-amber-200 shadow-sm transition-colors"><i class="fa-solid fa-print"></i> Ouvrir</button>
                    </td>
                `;
                tr.innerHTML = rowHtml;
                els.gradesTbody.appendChild(tr);
            });
        }

        function subjectCoefString(sub) {
            return `${sub.coef} | ${sub.coefD1||1}-${sub.coefD2||1}-${sub.coefC||2}`;
        }

        function updateGrade(studentId, subjectId, field, value) {
            if (!appState.classes[currentFullKey].grades[studentId]) {
                appState.classes[currentFullKey].grades[studentId] = {};
            }
            if (!appState.classes[currentFullKey].grades[studentId][subjectId]) {
                appState.classes[currentFullKey].grades[studentId][subjectId] = { d1: '', d2: '', c: '' };
            }
            
            // Formatage virgule en point
            let formatted = value.trim().replace(',', '.');
            if (formatted !== '' && isNaN(formatted)) {
                showToast("Veuillez saisir une note valide", "error");
                return;
            }
            
            appState.classes[currentFullKey].grades[studentId][subjectId][field] = formatted;
            saveState();
        }

        // --- ENREGISTREMENT ÉLÈVES ---
        document.getElementById('add-student-form').addEventListener('submit', e => {
            e.preventDefault();
            const first = document.getElementById('new-student-first').value.trim();
            const last = document.getElementById('new-student-last').value.trim();

            if (!appState.classes[currentFullKey]) return;

            appState.classes[currentFullKey].students.push({
                id: generateId(),
                firstName: first,
                lastName: last,
                matricule: '',
                birthDate: '',
                absences: 0,
                retards: 0
            });

            saveState();
            document.getElementById('add-student-form').reset();
            document.getElementById('new-student-first').focus();
            render();
            showToast(`Élève ${last} ajouté avec succès`);
        });

        function deleteStudent(id) {
            if (!confirm("Voulez-vous vraiment supprimer cet élève ainsi que ses notes ?")) return;
            appState.classes[currentFullKey].students = appState.classes[currentFullKey].students.filter(s => s.id !== id);
            if (appState.classes[currentFullKey].grades[id]) delete appState.classes[currentFullKey].grades[id];
            saveState();
            render();
            showToast("Élève supprimé");
        }

        // --- ENREGISTREMENT MATIÈRES ---
        document.getElementById('add-subject-form').addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('new-subject-name').value.trim();
            const coef = parseFloat(document.getElementById('new-subject-coef').value);

            if (!appState.classes[currentFullKey]) return;

            appState.classes[currentFullKey].subjects.push({
                id: generateId(),
                name: name,
                coef: coef,
                coefD1: 1,
                coefD2: 1,
                coefC: 2
            });

            saveState();
            document.getElementById('add-subject-form').reset();
            document.getElementById('new-subject-name').focus();
            render();
            showToast(`Matière/Domaine créé(e)`);
        });

        function deleteSubject(id) {
            if (!confirm("Supprimer cette matière ? Les notes associées seront perdues.")) return;
            appState.classes[currentFullKey].subjects = appState.classes[currentFullKey].subjects.filter(sub => sub.id !== id);
            
            // Nettoyage des notes internes
            Object.keys(appState.classes[currentFullKey].grades).forEach(studentId => {
                if (appState.classes[currentFullKey].grades[studentId][id]) {
                    delete appState.classes[currentFullKey].grades[studentId][id];
                }
            });

            saveState();
            render();
            showToast("Matière supprimée");
        }

        // --- MODALE ÉLÈVES ---
        function openStudentModal(id) {
            const s = appState.classes[currentFullKey].students.find(item => item.id === id);
            if (!s) return;
            document.getElementById('edit-student-id').value = s.id;
            document.getElementById('edit-student-first').value = s.firstName || '';
            document.getElementById('edit-student-last').value = s.lastName || '';
            document.getElementById('edit-student-mat').value = s.matricule || '';
            document.getElementById('edit-student-birth').value = s.birthDate || '';
            document.getElementById('edit-student-abs').value = s.absences || 0;
            document.getElementById('edit-student-ret').value = s.retards || 0;
            document.getElementById('student-modal').classList.remove('hidden');
        }

        function saveStudentModal() {
            const id = document.getElementById('edit-student-id').value;
            const s = appState.classes[currentFullKey].students.find(item => item.id === id);
            if (!s) return;

            s.firstName = document.getElementById('edit-student-first').value.trim();
            s.lastName = document.getElementById('edit-student-last').value.trim();
            s.matricule = document.getElementById('edit-student-mat').value.trim();
            s.birthDate = document.getElementById('edit-student-birth').value.trim();
            s.absences = parseInt(document.getElementById('edit-student-abs').value) || 0;
            s.retards = parseInt(document.getElementById('edit-student-ret').value) || 0;

            saveState();
            closeModal('student-modal');
            render();
            showToast("Fiche élève mise à jour");
        }

        // --- MODALE MATIÈRES ---
        function openSubjectModal(id) {
            const sub = appState.classes[currentFullKey].subjects.find(item => item.id === id);
            if (!sub) return;
            document.getElementById('edit-sub-id').value = sub.id;
            document.getElementById('edit-sub-name').value = sub.name || '';
            document.getElementById('edit-sub-coef').value = sub.coef || 1;
            document.getElementById('edit-sub-d1').value = sub.coefD1 !== undefined ? sub.coefD1 : 1;
            document.getElementById('edit-sub-d2').value = sub.coefD2 !== undefined ? sub.coefD2 : 1;
            document.getElementById('edit-sub-c').value = sub.coefC !== undefined ? sub.coefC : 2;
            document.getElementById('subject-modal').classList.remove('hidden');
        }

        function saveSubjectModal() {
            const id = document.getElementById('edit-sub-id').value;
            const sub = appState.classes[currentFullKey].subjects.find(item => item.id === id);
            if (!sub) return;

            sub.name = document.getElementById('edit-sub-name').value.trim();
            sub.coef = parseFloat(document.getElementById('edit-sub-coef').value) || 1;
            sub.coefD1 = parseFloat(document.getElementById('edit-sub-d1').value) || 0;
            sub.coefD2 = parseFloat(document.getElementById('edit-sub-d2').value) || 0;
            sub.coefC = parseFloat(document.getElementById('edit-sub-c').value) || 0;

            saveState();
            closeModal('subject-modal');
            render();
            showToast("Paramètres de l'élément enregistrés");
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        // --- IMPRESSIONS ET EXPORTS ---
        window.exportCSV = function (studentId) {
            const student = appState.classes[currentFullKey].students.find(s => s.id === studentId);
            const subjects = appState.classes[currentFullKey].subjects;
            if (!student) return;

            let csv = `\uFEFFBulletin de Notes\nNom;${student.lastName};Prenom;${student.firstName};Classe;${currentClass}${currentSection === "Unique" ? "" : " " + currentSection}\n\nMatiere;D1;D2;Compo\n`;
            subjects.forEach(sub => {
                const g = appState.classes[currentFullKey].grades[student.id]?.[sub.id] || {};
                csv += `${sub.name};${g.d1||''};${g.d2||''};${g.c||''}\n`;
            });
            csv += `\nAbsences;${student.absences || 0};Retards;${student.retards || 0}\n`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Bulletin_${currentClass}${currentSection === "Unique" ? "" : "_" + currentSection}_${student.lastName}_${student.firstName}.csv`;
            link.click();
        };

        window.exportAllCSV = function () {
            const students = appState.classes[currentFullKey]?.students || [];
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");
            students.forEach((s, i) => setTimeout(() => exportCSV(s.id), i * 250));
            showToast("Téléchargement lancé...");
        };

        window.printReportCard = function (studentId) {
            const suffixKey = `${currentClass}_${currentSection}`;
            window.open(`bulletin.html?class=${encodeURIComponent(suffixKey)}&student=${encodeURIComponent(studentId)}`, '_blank');
        };

        window.printAllReportCards = function () {
            const students = appState.classes[currentFullKey]?.students || [];
            if (students.length === 0) return showToast("Aucun élève dans la classe", "error");
            if (students.length > 6 && !confirm(`Ouvrir ${students.length} onglets d'impression ?`)) return;
            students.forEach((s, i) => setTimeout(() => printReportCard(s.id), i * 300));
            showToast("Génération des bulletins lancée...");
        };

        // Rendu initial
        render();
    </script>
</body>

</html>
