<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes - Gestion Scolaire</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #64748b;
            --success: #059669;
            --bg: #f1f5f9;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 { color: #1e293b; text-align: center; }

        /* Menu de navigation rapide */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: white; color: var(--secondary); border: 1px solid #cbd5e1; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Card container */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }

        /* Tableau Responsif */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8fafc; color: var(--secondary); padding: 12px; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        /* Inputs de notes optimisés */
        .input-grade {
            width: 60px;
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
        }
        .input-grade:focus { border-color: var(--primary); outline: none; background: #eff6ff; }

        /* DESIGN MOBILE (Responsive) */
        @media (max-width: 768px) {
            thead { display: none; } /* Cache les titres du tableau */
            
            tr { 
                display: block; 
                border: 1px solid #e2e8f0; 
                border-radius: 10px; 
                margin-bottom: 15px; 
                padding: 10px; 
                background: #ffffff;
            }

            td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
                border: none; 
                padding: 8px 5px; 
                border-bottom: 1px solid #f8fafc;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--secondary);
                font-size: 12px;
            }

            .input-grade { width: 80px; height: 40px; font-size: 16px; } /* Plus gros pour les doigts */
        }

        .no-data { text-align: center; padding: 40px; color: var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <h1>GestNotes - 6ème & Primaire</h1>

    <div class="nav-bar no-print">
        <button class="btn-primary" onclick="initDemoData()">Charger Démo (6ème)</button>
        <button class="btn-secondary" onclick="exportData()">Sauvegarder (Local)</button>
    </div>

    <div class="card no-print">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div>
                <label>Classe</label><br>
                <select id="select-classe" style="width:100%; padding:8px;" onchange="refreshTable()">
                    <option value="6eme_A">6ème A</option>
                    <option value="6eme_B">6ème B</option>
                </select>
            </div>
            <div>
                <label>Matière</label><br>
                <select id="select-matiere" style="width:100%; padding:8px;" onchange="refreshTable()">
                    <option value="maths">Mathématiques</option>
                    <option value="francais">Français</option>
                    <option value="svt">SVT</option>
                </select>
            </div>
            <div>
                <label>Semestre</label><br>
                <select id="select-period" style="width:100%; padding:8px;" onchange="refreshTable()">
                    <option value="1">1er Semestre</option>
                    <option value="2">2ème Semestre</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Élève</th>
                        <th>Devoir 1</th>
                        <th>Devoir 2</th>
                        <th>Composition</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="grades-body">
                    </tbody>
            </table>
        </div>
        <div id="empty-msg" class="no-data" style="display:none;">Aucun élève trouvé.</div>
    </div>
</div>

<script>
    // Structure globale des données
    let GEST_DATA = JSON.parse(localStorage.getItem('gestnotes_v4')) || {
        classes: {
            "6eme_A": {
                students: [
                    { id: "s1", firstName: "Abdou", lastName: "DIOP", matricule: "SN001" },
                    { id: "s2", firstName: "Mariama", lastName: "SOW", matricule: "SN002" }
                ],
                subjects: [
                    { id: "maths", name: "Mathématiques", coef: 4 },
                    { id: "francais", name: "Français", coef: 5 }
                ],
                grades: { "1": {}, "2": {} }
            }
        }
    };

    function refreshTable() {
        const classId = document.getElementById('select-classe').value;
        const subId = document.getElementById('select-matiere').value;
        const period = document.getElementById('select-period').value;
        
        const tbody = document.getElementById('grades-body');
        const classData = GEST_DATA.classes[classId];
        
        tbody.innerHTML = '';

        if (!classData || classData.students.length === 0) {
            document.getElementById('empty-msg').style.display = 'block';
            return;
        }
        document.getElementById('empty-msg').style.display = 'none';

        classData.students.forEach(student => {
            const tr = document.createElement('tr');
            const g = classData.grades[period][student.id]?.[subId] || { d1: '', d2: '', c: '' };

            tr.innerHTML = `
                <td data-label="Élève">
                    <div style="font-weight:bold">${student.lastName}</div>
                    <div style="font-size:11px; color:gray;">${student.firstName}</div>
                </td>
                <td data-label="Devoir 1">
                    <input type="number" step="0.25" inputmode="decimal" class="input-grade" 
                        data-student="${student.id}" data-field="d1" value="${g.d1}">
                </td>
                <td data-label="Devoir 2">
                    <input type="number" step="0.25" inputmode="decimal" class="input-grade" 
                        data-student="${student.id}" data-field="d2" value="${g.d2}">
                </td>
                <td data-label="Composition">
                    <input type="number" step="0.25" inputmode="decimal" class="input-grade" 
                        data-student="${student.id}" data-field="c" value="${g.c}">
                </td>
                <td data-label="Action">
                    <button class="btn-secondary" onclick="viewBulletin('${classId}', '${student.id}', '${period}')">PDF</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        setupNavigation();
    }

    // Navigation clavier (Entrée pour descendre)
    function setupNavigation() {
        const inputs = document.querySelectorAll('.input-grade');
        inputs.forEach((input, index) => {
            // Sauvegarde auto lors du changement
            input.onchange = (e) => {
                const classId = document.getElementById('select-classe').value;
                const subId = document.getElementById('select-matiere').value;
                const period = document.getElementById('select-period').value;
                const sId = e.target.dataset.student;
                const field = e.target.dataset.field;

                if(!GEST_DATA.classes[classId].grades[period][sId]) {
                    GEST_DATA.classes[classId].grades[period][sId] = {};
                }
                if(!GEST_DATA.classes[classId].grades[period][sId][subId]) {
                    GEST_DATA.classes[classId].grades[period][sId][subId] = {d1:'', d2:'', c:''};
                }
                
                GEST_DATA.classes[classId].grades[period][sId][subId][field] = e.target.value;
                localStorage.setItem('gestnotes_v4', JSON.stringify(GEST_DATA));
            };

            // Touche Entrée pour passer au suivant
            input.onkeydown = (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    const next = inputs[index + 1];
                    if (next) {
                        next.focus();
                        next.select();
                    }
                }
            };
        });
    }

    function viewBulletin(cId, sId, p) {
        window.location.href = `bulletin.html?class=${cId}&student=${sId}&period=${p}`;
    }

    function initDemoData() {
        localStorage.setItem('gestnotes_v4', JSON.stringify(GEST_DATA));
        refreshTable();
        alert("Données initialisées !");
    }

    // Lancement au démarrage
    window.onload = refreshTable;
</script>

</body>
</html>
