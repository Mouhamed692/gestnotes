<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestNotes – Administration scolaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 8px -4px rgba(0, 0, 0, 0.05);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 8px -4px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="text-slate-800">
    <nav class="bg-indigo-900 text-white px-6 py-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white text-indigo-900 p-2 rounded-xl shadow-inner font-black text-xl tracking-wider">GN</div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">GestNotes PRO</h1>
                    <p class="text-xs text-indigo-200">Système Intégré de Suivi Scolaire</p>
                </div>
            </div>
            <div class="flex items-center gap-4 text-sm bg-indigo-950/50 px-4 py-2 rounded-lg border border-indigo-800/50">
                <div><span class="text-indigo-300">Année :</span> <span id="nav-year" class="font-semibold">2025-2026</span></div>
                <div class="w-px h-4 bg-indigo-800"></div>
                <div><span class="text-indigo-300">Période :</span> <span id="nav-period" class="font-semibold">Semestre 1</span></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 bg-slate-50 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid font-semibold text-indigo-600 fa-table-list"></i> Saisie Époustouflante des Notes
                    </h2>
                    <p id="grades-table-subtitle" class="text-sm text-slate-500 mt-1">Chargement des données...</p>
                </div>
            </div>

            <div class="overflow-x-auto relative" style="max-height: 70vh;">
                <div id="grades-empty" class="hidden p-12 text-center">
                    <div class="w-16 h-16 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-folder-open text-2xl"></i>
                    </div>
                    <p class="text-slate-600 font-medium">Aucun élève ou matière configuré pour cette classe.</p>
                </div>

                <table id="grades-table" class="w-full border-collapse text-left text-sm">
                    <thead id="grades-thead" class="sticky top-0 bg-slate-100 z-40 border-b border-slate-200">
                        </thead>
                    <tbody id="grades-tbody" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Simulation d'état de base de GestNotes pour démonstration autonome
        // (S'intègre automatiquement avec votre localStorage)
        let currentClass = "6ème";
        let currentSection = "A";
        let currentFullKey = `${currentClass}_${currentSection}`;

        let appState = JSON.parse(localStorage.getItem('appState')) || {
            settings: { year: "2025-2026", period: "Semestre 1" },
            classes: {
                "6ème_A": {
                    students: [
                        { id: "st1", lastName: "DIOP", firstName: "Moussa", absences: 0, retards: 0 },
                        { id: "st2", lastName: "FAYE", firstName: "Mariama", absences: 1, retards: 0 },
                        { id: "st3", lastName: "NIDIAYE", firstName: "Fatou", absences: 0, retards: 2 }
                    ],
                    subjects: [
                        { id: "sub1", name: "Mathématiques", coef: 4 },
                        { id: "sub2", name: "Français", coef: 5 },
                        { id: "sub3", name: "Anglais", coef: 2 }
                    ],
                    grades: {} // Structure propre : {"st1": {"sub1": {"d1":"14", "d2":"12", "c":"15"}}}
                }
            }
        };

        function saveState() {
            localStorage.setItem('appState', JSON.stringify(appState));
        }

        // --- EN-TÊTE ET SYNC DE BASE ---
        document.getElementById('nav-year').textContent = appState.settings?.year || "2025-2026";
        document.getElementById('nav-period').textContent = appState.settings?.period || "Semestre 1";

        // --- FONCTION RENDU ÉPOUSTOUFLANT ---
        window.renderGradesTable = function () {
            const isPrimary = ["CP", "CE1", "CE2", "CM1", "CM2"].includes(currentClass);
            const table = document.getElementById('grades-table');
            const thead = document.getElementById('grades-thead');
            const tbody = document.getElementById('grades-tbody');
            const emptyState = document.getElementById('grades-empty');

            if (!table || !thead || !tbody || !emptyState) return;

            thead.innerHTML = '';
            tbody.innerHTML = '';

            const data = appState.classes[currentFullKey];
            if (!data || data.students.length === 0 || data.subjects.length === 0) {
                table.classList.add('hidden');
                emptyState.classList.remove('hidden');
                document.getElementById('grades-table-subtitle').textContent = '';
                return;
            }

            table.classList.remove('hidden');
            emptyState.add ? emptyState.classList.add('hidden') : emptyState.classList.add('hidden');
            document.getElementById('grades-table-subtitle').textContent = `${currentClass} ${currentSection} • ${data.students.length} Éléve(s) • ${data.subjects.length} Matière(s)`;

            // 1. GÉNÉRATION EN-TÊTE
            let headerRow = `<tr>
                <th class="p-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50 border-r w-48 sm:w-56 z-30 sticky-left-shadow">Élève</th>
            `;

            data.subjects.forEach(sub => {
                headerRow += `
                    <th class="p-2 text-center text-xs font-semibold text-slate-600 uppercase tracking-wider border-r bg-slate-50/70 min-w-[210px] sm:min-w-[250px]">
                        <div class="truncate text-[12px] font-bold text-slate-800 border-b border-slate-200/60 pb-1 mb-1 px-1" title="${sub.name}">${sub.name} <span class="text-indigo-600 font-normal">(x${sub.coef})</span></div>
                        <div class="grid grid-cols-4 gap-1 text-[10px] text-slate-400 font-bold px-1">
                            <div>Dev. 1</div>
                            <div>Dev. 2</div>
                            <div class="text-amber-700 bg-amber-50 rounded">Comp.</div>
                            <div class="text-indigo-600 bg-indigo-50 rounded">Moy.</div>
                        </div>
                    </th>
                `;
            });

            headerRow += `
                <th class="p-3 text-center text-xs font-black text-white uppercase tracking-wider bg-indigo-600 sticky right-0 z-30 w-24 border-l sticky-right-shadow">Moy. Gén.</th>
                <th class="p-3 text-center text-xs font-bold text-slate-500 uppercase tracking-wider bg-slate-50 sticky right-0 z-20 w-16 text-center">Action</th>
            </tr>`;
            thead.innerHTML = headerRow;

            // 2. RENDU DES LIGNES ÉLÈVES (STYLE PREMIUM)
            data.students.sort((a, b) => a.lastName.localeCompare(b.lastName)).forEach(st => {
                let rowHtml = `
                    <td class="p-3 border-b border-slate-100 text-sm font-medium text-slate-900 sticky left-0 bg-white z-10 border-r shadow-sm truncate sticky-left-shadow" title="${st.lastName} ${st.firstName}">
                        <span class="uppercase font-bold text-slate-800 text-xs sm:text-sm">${st.lastName}</span> <span class="text-slate-500 font-normal text-xs sm:text-sm">${st.firstName}</span>
                    </td>
                `;

                let totalWeightedPoints = 0;
                let totalCoefficients = 0;

                data.subjects.forEach(sub => {
                    const gradeData = data.grades[st.id] ? (data.grades[st.id][sub.id] || {}) : {};
                    
                    const d1Str = gradeData.d1 ?? '';
                    const d2Str = gradeData.d2 ?? '';
                    const compStr = gradeData.c ?? '';

                    const d1 = parseFloat(d1Str.replace(',', '.'));
                    const d2 = parseFloat(d2Str.replace(',', '.'));
                    const comp = parseFloat(compStr.replace(',', '.'));

                    // Formule identique au bulletin scolaire
                    let subAvg = null;
                    let sumDevoir = 0;
                    let countDevoir = 0;

                    if (!isNaN(d1)) { sumDevoir += d1; countDevoir++; }
                    if (!isNaN(d2)) { sumDevoir += d2; countDevoir++; }

                    let moyenneDevoirs = countDevoir > 0 ? sumDevoir / countDevoir : null;

                    if (moyenneDevoirs !== null && !isNaN(comp)) {
                        subAvg = (moyenneDevoirs + (comp * 2)) / 3;
                    } else if (moyenneDevoirs !== null && isNaN(comp)) {
                        subAvg = moyenneDevoirs;
                    } else if (moyenneDevoirs === null && !isNaN(comp)) {
                        subAvg = comp;
                    }

                    let subAvgDisplay = subAvg !== null ? subAvg.toFixed(2).replace('.', ',') : '-';

                    rowHtml += `
                        <td class="p-2 border-b border-slate-100 border-r bg-white">
                            <div class="grid grid-cols-4 gap-1 items-center text-center">
                                <input type="text" value="${d1Str}" onchange="window.updateGrade('${st.id}','${sub.id}','d1',this.value)" 
                                    class="w-full h-8 text-center rounded border border-slate-200 bg-slate-50/60 text-xs font-semibold focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="-">
                                
                                <input type="text" value="${d2Str}" onchange="window.updateGrade('${st.id}','${sub.id}','d2',this.value)" 
                                    class="w-full h-8 text-center rounded border border-slate-200 bg-slate-50/60 text-xs font-semibold focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="-">
                                
                                <input type="text" value="${compStr}" onchange="window.updateGrade('${st.id}','${sub.id}','c',this.value)" 
                                    class="w-full h-8 text-center rounded border border-amber-200 bg-amber-50/40 text-slate-900 font-bold focus:bg-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all" placeholder="-">
                                
                                <div class="w-full h-8 text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-100/60 flex items-center justify-center rounded select-none shadow-sm">${subAvgDisplay}</div>
                            </div>
                        </td>
                    `;

                    if (subAvg !== null) {
                        totalWeightedPoints += subAvg * sub.coef;
                        totalCoefficients += sub.coef;
                    }
                });

                // 3. BADGES DES MOYENNES GÉNÉRALES
                let genAvgDisplay = '-';
                let badgeColor = 'bg-slate-100 text-slate-600';

                if (totalCoefficients > 0) {
                    const genAvg = totalWeightedPoints / totalCoefficients;
                    genAvgDisplay = genAvg.toFixed(2).replace('.', ',');
                    
                    if (genAvg >= 14) badgeColor = 'bg-emerald-50 text-emerald-700 border border-emerald-200 shadow-sm';
                    else if (genAvg >= 10) badgeColor = 'bg-blue-50 text-blue-700 border border-blue-200 shadow-sm';
                    else badgeColor = 'bg-rose-50 text-rose-700 border border-rose-200 shadow-sm';
                }

                rowHtml += `
                    <td class="p-3 border-b border-slate-100 text-center sticky right-12 bg-slate-50 z-10 border-l sticky-right-shadow">
                        <span class="inline-flex items-center justify-center px-2.5 py-1 rounded-md text-xs font-black min-w-[60px] ${badgeColor}">
                            ${genAvgDisplay}
                        </span>
                    </td>
                    <td class="p-3 border-b border-slate-100 text-center sticky right-0 bg-white z-10 text-center">
                        <button onclick="window.printReportCard('${st.id}')" 
                            class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-8 h-8 rounded-full shadow flex items-center justify-center transition-all" title="Imprimer le bulletin de cet élève">
                            <i class="fa-solid fa-print text-xs"></i>
                        </button>
                    </td>
                `;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/30 transition-colors duration-100";
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        };

        // --- ENREGISTREMENT & UPDATE AUTOMATIQUE EN DIRECT ---
        window.updateGrade = function (studentId, subjectId, field, value) {
            if (!appState.classes[currentFullKey]) return;
            
            if (!appState.classes[currentFullKey].grades[studentId]) {
                appState.classes[currentFullKey].grades[studentId] = {};
            }
            if (!appState.classes[currentFullKey].grades[studentId][subjectId]) {
                appState.classes[currentFullKey].grades[studentId][subjectId] = {};
            }

            if (value.trim() === '') {
                delete appState.classes[currentFullKey].grades[studentId][subjectId][field];
            } else {
                appState.classes[currentFullKey].grades[studentId][subjectId][field] = value.trim();
            }
            
            saveState();
            window.renderGradesTable(); // Calcule et rafraîchit l'affichage instantanément
        };

        // --- ACTION IMPRIMANTE INDIVIDUELLE ---
        window.printReportCard = function (studentId) {
            alert(`Ouverture du bulletin pour l'élève ID: ${studentId}\\nLien généré: bulletin.html?class=${encodeURIComponent(currentFullKey)}&student=${encodeURIComponent(studentId)}`);
            // Décommentez la ligne ci-dessous en production pour l'ouvrir sur votre serveur local :
            // window.open(`bulletin.html?class=${encodeURIComponent(currentFullKey)}&student=${encodeURIComponent(studentId)}`, '_blank');
        };

        // Lancement au chargement de la page
        document.addEventListener("DOMContentLoaded", () => {
            window.renderGradesTable();
        });
    </script>
</body>

</html>
